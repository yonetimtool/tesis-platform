<!-- Yönetio favicon.
     KARAR: tam master logo DEGIL, basitlestirilmis isaret kullanilir. Master
     16/32px'e indirilip gozle bakildi (uc bina + insanlar + yay birbirine
     karisiyor, okunmuyor). Burada launcher ikonuyla bagi korumak icin ayni
     mavi→teal gradyan yuvarlak-kare zemin + uzerinde beyaz basitlestirilmis
     isaret (merkez bina + chevron/cati) var.
     Gradyan uclari master'in kose piksellerinden orneklendi. -->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" role="img" aria-label="Yönetio">
  <defs>
    <linearGradient id="yonetio-bg" x1="0" y1="100" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E3C91"/>
      <stop offset="1" stop-color="#1DB2B6"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="url(#yonetio-bg)"/>
  <!-- Isaret %74 olcekte ortalanir; mobil YonetioSimpleMarkPainter geometrisi. -->
  <g transform="translate(13 13) scale(0.74)" fill="#FFFFFF">
    <path d="M35 24 L58 9 L66 9 L66 50 L35 50 Z"/>
    <path d="M9 78 L50 44 L91 78 Z"/>
  </g>
</svg>
