  /tasks/{id}/completions:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [tasks]
      summary: Gorev tamamlama gecmisi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/TaskCompletion" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [tasks]
      summary: Gorevi tamamla (kanit gonder)
      description: |
        Idempotency-Key header ZORUNLU (offline cift gonderim korumasi, scan deseni).
        Foto icin: once POST /uploads/presign ile foto_key + PUT URL alinir, dosya
        dogrudan MinIO'ya yuklenir, sonra burada foto_key gonderilir.

        FOTO ZORUNLULUGU (mobil §11 #2): gorevde `foto_zorunlu=true` ise
        `foto_key` OLMADAN tamamlama **422** doner (anlamli mesajla).

        NFC eslesmesi NORMALIZE (mobil §11 #3): gorevin checkpoint'i varsa
        gonderilen `nfc_tag_uid` strip + upper sonrasi karsilastirilir
        (buyuk/kucuk harf, bas/son bosluk farki 422 dusurmez).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCompletionCreate" }
      responses:
        "201":
          description: Tamamlama kaydedildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskCompletion" }
        "200":
          description: Idempotent tekrar — mevcut kayit
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskCompletion" }
        "400":
          description: Idempotency-Key eksik veya gecersiz govde
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Ayni Idempotency-Key farkli govde ile gonderildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /task-completions:
    get:
      tags: [tasks]
      summary: Gorev tamamlama gecmisi (tum gorevler; tarih/tip/atanan filtreli)
      description: |
        TUM gorevlerin tamamlanma GECMISI. /tasks/{id}/completions tek gorev
        icindir; bu uc capraz-gorev gecmise donuk sorgu icindir ("gecen hafta
        hangi gorevler tamamlandi, kim, hangi tip"). tamamlanma_zamani DESC.
        /patrol-windows ile ayni desen: ozet sayilar (toplam + tip dagilimi)
        FILTRELENMIS TUM kume uzerinden response.ozet'te doner.
        RBAC (gorev-yonetimi goruntuleme): admin + yonetici + security +
        tesis_gorevlisi; resident 403. tenant-izole (RLS).
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: baslangic
          in: query
          description: "tamamlanma_zamani >= bu an (UTC, ISO-8601)"
          schema: { type: string, format: date-time }
        - name: bitis
          in: query
          description: "tamamlanma_zamani < bu an (UTC, ISO-8601; yari-acik)"
          schema: { type: string, format: date-time }
        - name: tip
          in: query
          schema: { $ref: "#/components/schemas/TaskTip" }
        - name: task_id
          in: query
          schema: { type: string, format: uuid }
        - name: tamamlayan_user_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Tamamlama listesi + ozet
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items, ozet]
                    properties:
                      ozet: { $ref: "#/components/schemas/TaskCompletionOzet" }
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/TaskCompletionHistory" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /landscape/schedule:
    get:
      tags: [tasks]
      summary: Peyzaj bakim takvimi (yaklasan isler, sirali)
      description: |
        tip=peyzaj ve sonraki_planlanan dolu aktif gorevler, sonraki_planlanan'a
        gore ARTAN sirada. (Mevcut Task semasi yeniden kullanilir.)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Takvim
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Task" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /task-categories:
    get:
      tags: [tasks]
      summary: Gorev kategorileri (yonetici-tanimli, A6)
      description: |
        Tenant'a ozel kategori seti. OKUMA gorev goren roller
        (admin/yonetici/security/tesis_gorevlisi); resident 403.
        Varsayilan yalniz aktif kategoriler (`aktif=false` ile pasifler).
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: aktif
          in: query
          schema: { type: boolean, default: true }
      responses:
        "200":
          description: Liste (ad sirali)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/TaskCategory" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [tasks]
      summary: Kategori olustur (admin + yonetici)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCategoryCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskCategory" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /task-categories/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    delete:
      tags: [tasks]
      summary: Kategori sil — SOFT-DELETE (admin + yonetici)
      description: |
        aktif=false yapar (gorev gecmisi kategoriye referans verebilir; hard
        silme kaydi koparir). Pasif kategoriye yeni gorev yazilamaz (422).
      responses:
        "204": { description: Pasiflestirildi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /uploads/presign:
    post:
      tags: [uploads]
      summary: Foto yukleme icin presigned PUT URL uret
      description: |
        Backend foto_key uretir ve MinIO icin presigned PUT URL doner. Istemci
        dosyayi bu URL'e PUT eder, sonra foto_key'i ilgili completion'da,
        duyuru olusturmada veya talep acmada gonderir. RBAC:
        admin/security/tesis_gorevlisi + yonetici (duyuru gorseli) +
        resident (sikayet/oneri gorseli).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PresignRequest" }
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PresignResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # ASSETS (demirbas envanteri) + zimmet (checkout/checkin)
  # ================================================================= #
  /assets:
    get:
      tags: [assets]
      summary: Demirbas listesi
      description: |
        Her item ACIK zimmet ozeti tasir: `acik_zimmet` (null | {alan_user_id,
        alan_user_ad, alinma_zamani}) — mobil history taramadan gosterir
        (mobil §13 #2/#5). `nfc_tag_uid` TAM eslesme filtresi UID->asset
        cozumunu tek istege indirir (mobil §13 #1). `checked_out_by` acik
        zimmet filtresi: `me` = token kullanicisinin uzerindekiler (mobil §13
        #3); `<uuid>` degeri YALNIZ admin (baskasi 403), gecersiz deger 422.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: kategori
          in: query
          schema: { $ref: "#/components/schemas/AssetKategori" }
        - name: durum
          in: query
          schema: { $ref: "#/components/schemas/AssetDurum" }
        - name: aktif
          in: query
          schema: { type: boolean }
        - name: nfc_tag_uid
          in: query
          description: Tam eslesme — UID okutup asset'i tek istekle cozmek icin
          schema: { type: string }
        - name: checked_out_by
          in: query
          description: "'me' veya user UUID (UUID yalniz admin) — acik zimmeti bu kullanicida olanlar"
          schema: { type: string }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Asset" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [assets]
      summary: Demirbas olustur
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssetCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: nfc_tag_uid bu tenant'ta zaten kayitli
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /assets/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [assets]
      summary: Demirbas detay
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [assets]
      summary: Demirbas guncelle (kismi)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssetUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [assets]
      summary: Demirbas sil
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /assets/{id}/checkout:
    parameters:
      - $ref: "#/components/parameters/PathId"
    post:
      tags: [assets]
      summary: Demirbasi al (zimmetle)
      description: |
        Idempotency-Key ZORUNLU (scan deseni). nfc_tag_uid verilirse asset'in
        nfc'siyle eslesmeli. alan_user_id token'dan. Zaten zimmetliyse 409.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckoutRequest" }
      responses:
        "201":
          description: Zimmetlendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetCheckout" }
        "200":
          description: Idempotent tekrar — mevcut kayit
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetCheckout" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Demirbas zaten zimmetli (veya ayni key farkli govde)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /assets/{id}/checkin:
    parameters:
      - $ref: "#/components/parameters/PathId"
    post:
      tags: [assets]
      summary: Demirbasi birak (zimmeti kapat)
      description: |
        Acik zimmeti kapatir (birakma_zamani=now). Idempotency-Key ZORUNLU.
        nfc_tag_uid verilirse asset'in nfc'siyle eslesmeli. Acik zimmet yoksa 409.

        SAHIPLIK (mobil §13 #6): checkin'i YALNIZ acik zimmetin sahibi
        (alan_user_id == token user) veya ADMIN (yonetim mudahalesi)
        yapabilir; baska kullanici 403 `forbidden`
        ("Zimmet baskasinin uzerinde..."). security/tesis_gorevlisi baskasinin
        zimmetini KAPATAMAZ.

        Kapatan kullanici `birakan_user_id` olarak kaydedilir (cevapta ve
        history'de `birakan_user_ad` ile birlikte doner).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckinRequest" }
      responses:
        "200":
          description: Birakildi (zimmet kapatildi / idempotent tekrar)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetCheckout" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Acik zimmet yok (demirbas zaten musait)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /assets/{id}/history:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [assets]
      summary: Demirbas zimmet gecmisi
      description: |
        Siralama `alma_zamani` uzerinden; VARSAYILAN `desc` (en yeni ustte —
        mobil §13 #4). Eski (en eski ustte) davranis icin `?order=asc`.
        Item'larda `alan_user_ad` dolu gelir (id + ad birlikte, mobil §13 #5).
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: order
          in: query
          description: "alma_zamani sirasi (varsayilan: desc = en yeni ustte)"
          schema: { type: string, enum: [asc, desc], default: desc }
      responses:
        "200":
          description: Gecmis
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/AssetCheckout" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ================================================================= #
  # EMERGENCY (acil durum) + tenant settings (yonetim numarasi)
  # ================================================================= #
  /emergency:
    get:
      tags: [emergency]
      summary: Acil durum listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: durum
          in: query
          schema: { $ref: "#/components/schemas/EmergencyDurum" }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/EmergencyAlert" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [emergency]
      summary: Acil durum tetikle (panik butonu — TUM roller, resident dahil)
      description: |
        Idempotency-Key ZORUNLU (panik aninda mukerrer basim korumasi). tetikleyen
        token'dan. Alarm kaydi + yuksek oncelikli 'acil_durum' notification uretir.
        RBAC: tetikleme TUM rollere acik (resident dahil); liste/cozme admin+yonetici.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmergencyCreate" }
      responses:
        "201":
          description: Alarm olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmergencyAlert" }
        "200":
          description: Idempotent tekrar — mevcut alarm
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmergencyAlert" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Ayni Idempotency-Key farkli govde ile gonderildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /emergency/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    patch:
      tags: [emergency]
      summary: Acil durumu coz
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmergencyResolve" }
      responses:
        "200":
          description: Cozuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmergencyAlert" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # DEVICES (FCM push token kaydi)
  # ================================================================= #
  /devices:
    post:
      tags: [devices]
      summary: Cihaz push token kaydet (kendi cihazi; her rol)
      description: |
        Giris yapmis kullanici kendi cihaz FCM token'ini kaydeder. Ayni token
        (tenant icinde UNIQUE) tekrar gonderilirse guncellenir + aktiflesir
        (idempotent upsert). user_id token'dan turetilir.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeviceRegister" }
      responses:
        "201":
          description: Kaydedildi (veya guncellendi)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Device" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [devices]
      summary: Tenant cihazlari (admin, debug)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Device" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /devices/{fcm_token}:
    delete:
      tags: [devices]
      summary: Kendi cihaz token'ini pasiflestir (logout/uninstall)
      parameters:
        - name: fcm_token
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Pasiflestirildi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /tenant/settings:
    get:
      tags: [tenant]
      summary: Tenant ayarlari (acil durum yonetim numarasi dahil)
      description: "Mobil, acil durumda aranacak `acil_durum_telefon`'u buradan okur (tel: link)."
      responses:
        "200":
          description: Ayarlar
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantSettings" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    patch:
      tags: [tenant]
      summary: Tenant ayarlarini guncelle (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TenantSettingsUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantSettings" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # AIDAT — unit (daire) + sakin + tahakkuk + odeme
  # ================================================================= #
  /units:
    get:
      tags: [aidat]
      summary: Daire listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: blok
          in: query
          schema: { type: string }
        - name: aktif
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Unit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [aidat]
      summary: Daire olustur (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UnitCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Unit" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Daire no bu tesiste zaten kayitli
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /units/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [aidat]
      summary: Daire detay
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Unit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [aidat]
      summary: Daire guncelle (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UnitUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Unit" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [aidat]
      summary: Daire sil (admin)
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /units/{id}/layout:
    parameters:
      - $ref: "#/components/parameters/PathId"
    patch:
      tags: [aidat]
      summary: Daire yerlesimini guncelle (admin+yonetici)
      description: |
        Daire fiziksel yerlesimini (blok/kat/sira) girer/gunceller — bina
        semasi verisi. RBAC: admin + yonetici (digerleri 403). Yerlesim
        anonimligi etkilemez (sikayetci verisi tasimaz). Yonetici mobilden
        yonetebilsin diye genel daire CRUD (admin-only) disinda ayri uctur.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UnitLayoutUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Unit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /units/by-no/{unit_no}/residents:
    parameters:
      - name: unit_no
        in: path
        required: true
        description: Daire numarasi (orn. A-12) — guvenlik daire NO'sunu bilir
        schema: { type: string, minLength: 1, maxLength: 50 }
    get:
      tags: [visitors]
      summary: Dairenin AKTIF sakinleri (hedef sakin secicisi)
      description: |
        Ziyaretci kaydinda guvenligin HEDEF sakini secmesi icin dairenin AKTIF
        sakinlerini (user_id + ad) doner. RBAC: security + admin + yonetici;
        resident 403 (komsularini listeleyemez). unit_no tenant icinde
        cozulur; bulunamazsa 404. RLS ile tenant izole.
      responses:
        "200":
          description: Aktif sakin listesi (ad'a gore sirali)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UnitResidentBrief" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /units/{id}/residents:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [aidat]
      summary: Dairenin sakinleri
      responses:
        "200":
          description: Sakin listesi
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UnitResident" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [aidat]
      summary: Daireye sakin ata (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResidentAssign" }
      responses:
        "201":
          description: Atandi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnitResident" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /units/{id}/residents/{user_id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
      - name: user_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [aidat]
      summary: Sakini daireden cikar (bitis=now) (admin)
      responses:
        "204": { description: Cikarildi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /units/{id}/dues:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [aidat]
      summary: Dairenin borc durumu (tahakkuk - odeme = bakiye)
      responses:
        "200":
          description: Borc durumu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnitDuesStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /dues/assessments:
    get:
      tags: [aidat]
      summary: Tahakkuk listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: unit_id
          in: query
          schema: { type: string, format: uuid }
        - name: donem
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/DuesAssessment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [aidat]
      summary: Tahakkuk olustur (tek daire veya toplu donem) (admin)
      description: |
        `unit_id` verilirse TEK daire (ayni daire+donem ikinci kez → 409). `unit_id`
        yoksa TOPLU: `unit_ids` (verilmezse tum aktif daireler); mevcut donemler atlanir.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DuesAssessmentCreate" }
      responses:
        "201":
          description: "Olusturuldu (toplu modda created + atlanan)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DuesAssessmentResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Tek daire modunda ayni donem zaten var
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /dues/payments:
    get:
      tags: [aidat]
      summary: Odeme listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: unit_id
          in: query
          schema: { type: string, format: uuid }
        - name: donem
          in: query
          description: "'YYYY-MM' — donem bazli rapor filtresi (payment.donem uzerinden)"
          schema: { type: string }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/DuesPayment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [aidat]
      summary: Manuel odeme kaydi (admin)
      description: |
        Gercek tahsilat YOK (soyut). Idempotency-Key ZORUNLU (cift kayit korumasi).
        kaydeden token'dan. Bakiye = toplam tahakkuk - basarili odemeler.

        DONEM ATFI (panel raporu): `donem` ('YYYY-MM') acikca verilebilir;
        verilmezse `assessment_id` varsa ONUN doneminden turer; ikisi de yoksa
        NULL kalir (serbest odeme). Rapor `GET /dues/payments?donem=` ile
        serbest odemeleri de doneme atfedebilir.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DuesPaymentCreate" }
      responses:
        "201":
          description: Odeme kaydedildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DuesPayment" }
        "200":
          description: Idempotent tekrar — mevcut kayit
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DuesPayment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Ayni Idempotency-Key farkli govde ile gonderildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /me/dues:
    get:
      tags: [aidat]
      summary: Sakinin kendi dairelerinin borc durumu (resident)
      responses:
        "200":
          description: Borc durumu listesi
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/UnitDuesStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ================================================================= #
  # BUTCE (Wave 2A — yonetim tarafi; sakin seffafligi Wave 2B)
  # Para HER YERDE integer KURUS (float asla).
  # ================================================================= #
  /budget/categories:
    get:
      tags: [budget]
      summary: Butce kategorileri (yonetim)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: tip
          in: query
          schema: { $ref: "#/components/schemas/BudgetTip" }
        - name: aktif
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Liste (ad ASC)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/BudgetCategory" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [budget]
      summary: Kategori olustur (dinamik; yonetici/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BudgetCategoryCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BudgetCategory" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Ayni tip icinde ayni ad zaten var
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /budget/categories/{category_id}:
    patch:
      tags: [budget]
      summary: Kategori guncelle — aktif=false SOFT-DELETE'tir
      description: |
        Hard DELETE ucu bilincli olarak YOK: hareketi olan kategori
        silinemez (FK RESTRICT); pasiflestirilen (aktif=false) kategoriye
        YENI kayit yazilamaz ama eski kayitlar kategorisini korur.
      parameters:
        - name: category_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BudgetCategoryUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BudgetCategory" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Ayni tip icinde ayni ad zaten var
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /budget/entries:
    get:
      tags: [budget]
      summary: Defter kayitlari (tarih DESC; yonetim)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: tip
          in: query
          schema: { $ref: "#/components/schemas/BudgetTip" }
        - name: kategori_id
          in: query
          schema: { type: string, format: uuid }
        - name: kaynak
          in: query
          schema: { $ref: "#/components/schemas/BudgetKaynak" }
        - name: donem
          in: query
          description: "'YYYY-MM' ay filtresi (baslangic/bitis'e gore oncelikli)"
          schema: { type: string, example: "2026-07" }
        - name: baslangic
          in: query
          schema: { type: string, format: date }
        - name: bitis
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/BudgetEntry" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [budget]
      summary: Manuel gelir/gider kaydi (yonetici/admin)
      description: |
        `tip` GONDERILMEZ — secilen kategoriden turetilir. Pasif kategoriye
        yeni kayit yazilamaz (422). kaynak her zaman 'manuel' olur
        (aidat_odeme kayitlarini sistem uretir).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BudgetEntryCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BudgetEntry" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /budget/entries/{entry_id}:
    patch:
      tags: [budget]
      summary: Manuel kaydi duzenle (aidat_odeme kayitlari duzenlenemez)
      parameters:
        - name: entry_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BudgetEntryUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BudgetEntry" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [budget]
      summary: Manuel kaydi sil (aidat_odeme kayitlari silinemez → 422)
      parameters:
        - name: entry_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /budget/summary:
    get:
      tags: [budget]
      summary: "Kasa ozeti: gelir, gider, bakiye (+kategori kirilimi)"
      description: |
        bakiye = toplam gelir - toplam gider (NEGATIF olabilir). Tum tutarlar
        integer KURUS. Filtresiz cagri tum zamanlari kapsar.
        SEFFAFLIK (Wave 2B): AGREGAT oldugu icin TUM rollere aciktir —
        sakin/saha sitenin toplamlarini gorur; defter satirlari ve kategori
        yonetimi yonetimde (admin+yonetici) kalir.
      parameters:
        - name: donem
          in: query
          schema: { type: string, example: "2026-07" }
        - name: baslangic
          in: query
          schema: { type: string, format: date }
        - name: bitis
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Ozet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BudgetSummary" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # RAPORLAR (Wave 2B — cepten finansal ozet; salt okuma)
  # ================================================================= #
  /reports/financial-summary:
    get:
      tags: [reports]
      summary: Cepten finansal ozet (rol-duyarli icerik)
      description: |
        Telefon ekranina uygun kompakt ozet. TUM roller AGREGAT kismi alir:
        donem geliri/gideri/kasa + en yuksek gider kategorileri (ilk 5).
        `tahsilat` blogu (donem tahakkuku, tahsilat, tahsilat orani, geciken
        daire sayisi) YALNIZ yonetimde (admin+yonetici) dolar; sakin/saha
        icin `null` doner — daire/kisi duzeyinde veri sizdirilmaz.
        Parametresiz cagri tum zamanlari kapsar. Para integer KURUS.
      parameters:
        - name: donem
          in: query
          schema: { type: string, example: "2026-07" }
      responses:
        "200":
          description: Ozet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FinancialSummary" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # ODEME WEBHOOK (public ama imza-korumali)
  # ================================================================= #
  /webhooks/payments/{provider}:
    post:
      tags: [webhooks]
      summary: Saglayici odeme bildirimi (iyzico/paytr)
      description: |
        PUBLIC (token YOK) ama IMZA-KORUMALI. Saglayici ode​me sonucunu bildirir.
        Imza/hash provider secret ile dogrulanir; gecersizse 401 ve hicbir islem
        yapilmaz. provider_ref'ten tenant guvenli cozulur (SECURITY DEFINER).
        IDEMPOTENT (provider+event_id). Tutar (kurus) odeme ile karsilastirilir;
        uyusmazsa 400. Govde/imza formati saglayiciya ozeldir (iyzico: JSON +
        `x-iyz-signature` header; paytr: form-encoded + `hash` alani).
      security: []   # public; guvenlik imzayla saglanir
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string, enum: [iyzico, paytr] }
      requestBody:
        required: true
        content:
          application/json: { schema: { type: object } }
          application/x-www-form-urlencoded: { schema: { type: object } }
      responses:
        "200":
          description: Islendi (veya idempotent tekrar)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  durum: { $ref: "#/components/schemas/DuesDurum" }
        "400":
          description: Tutar uyusmazligi / gecersiz govde
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Imza gecersiz
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "404":
          description: Saglayici/odeme referansi bulunamadi
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

  # ================================================================= #
  # USERS (personel + sakin yonetimi) — admin
  # ================================================================= #
  /users:
    get:
      tags: [users]
      summary: Kullanici listesi (admin)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: role
          in: query
          schema: { $ref: "#/components/schemas/UserRole" }
        - name: is_active
          in: query
          schema: { type: boolean }
        - name: q
          in: query
          description: Ad/email icinde arama (opsiyonel)
          schema: { type: string }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/UserListItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [users]
      summary: Kullanici olustur (admin)
      description: |
        Her rol (admin/yonetici/security/tesis_gorevlisi/resident) olusturulabilir. parola bcrypt ile
        hash'lenir; password_hash YANITTA donmez. email tenant icinde benzersiz.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: email bu tenant'ta zaten kayitli
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "422": { $ref: "#/components/responses/ValidationError" }

  /users/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [users]
      summary: Kullanici detay (admin)
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [users]
      summary: Kullanici guncelle (admin)
      description: |
        ad/telefon/role/is_active ve opsiyonel email/parola. parola verilirse yeniden
        hash'lenir. Kullanici SILINMEZ; pasiflestirme icin is_active=false kullanin.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: email bu tenant'ta zaten kayitli
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "422": { $ref: "#/components/responses/ValidationError" }

  /users/{id}/contact:
    parameters:
      - $ref: "#/components/parameters/PathId"
    patch:
      tags: [users]
      summary: Iletisim ayari — telefon + arama rizasi (admin + yonetici)
      description: |
        Rol-bazli arama (C1a) icin YALNIZ telefon + aranabilir (riza) gunceller.
        admin + yonetici yetkili; rol/parola/is_active gibi hassas alanlara
        DOKUNMAZ (tam PATCH admin-only kalir — yetki yukseltme yok). Numara
        yonetim tarafindan girilir; kullanici bu turda kendi yonetmez.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserContactUpdate" }
      responses:
        "200":
          description: Guncellendi (tek-kayit yonetim gorunumu — telefon doner)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /call-target/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [call-target]
      summary: Rol-bazli arama hedefi cozumu (numara-gizlilik kapisi)
      description: |
        Callee'nin telefonu YALNIZ (1) arayan rol o callee rolunu arayabiliyorsa
        (security->yonetici/resident; resident->security) VE (2) callee.aranabilir
        = true iken aciklanir. Aksi halde numara ASLA donmez: yetkisiz yon 403,
        rizasiz/numarasiz 404. Arayan roller: security + resident (digerleri 403).
        Amaç-sınırlı (yalniz arama), toplu listelenmez (KVKK). Kanal C1a'da 'phone'
        (cihaz ceviricisi, tel:); C1b baska kanallar ekleyecek.
      responses:
        "200":
          description: "Cozuldu — numara + tel: URI (yalniz burada aciklanir)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CallTarget" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ================================================================= #
  # INTEGRATIONS (C1b — dis sistem entegrasyon konfig + SSRF-korumali tetik;
  # admin+yonetici yonetir; sir write-only; tetik ic/ozel hedefleri reddeder)
  # ================================================================= #
  /integrations:
    get:
      tags: [integrations]
      summary: Entegrasyon listesi (admin+yonetici)
      description: Sir (auth_secret) DONMEZ; yerine auth_secret_set (bool).
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: aktif
          in: query
          required: false
          schema: { type: boolean }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Integration" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [integrations]
      summary: Entegrasyon olustur (admin+yonetici)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IntegrationCreate" }
      responses:
        "201":
          description: Olusturuldu (sir DONMEZ)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Integration" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /integrations/presets:
    get:
      tags: [integrations]
      summary: Preset sablonlari (form on-doldurma; admin+yonetici)
      description: >
        Generic webhook uzerinde makul varsayilanlar (webhook/megaphone/
        smarthome). Gercek cihaz surucusu DEGIL — duzenlenebilir sablonlar.
      responses:
        "200":
          description: Preset listesi
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/IntegrationPreset" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /integrations/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [integrations]
      summary: Entegrasyon detay (admin+yonetici; sir DONMEZ)
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Integration" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [integrations]
      summary: Entegrasyon guncelle (admin+yonetici)
      description: >
        auth_secret WRITE-ONLY (verilirse yeniden sifrelenir; auth_type=none ise
        temizlenir). endpoint_url http(s) olmali (tam SSRF kapisi tetikte).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IntegrationUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Integration" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [integrations]
      summary: Entegrasyon sil (admin+yonetici)
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /integrations/{id}/trigger:
    parameters:
      - $ref: "#/components/parameters/PathId"
    post:
      tags: [integrations]
      summary: Entegrasyonu tetikle — SSRF-korumali HTTP gonderir (admin+yonetici)
      description: |
        payload_template ({{message}}/{{title}}) render edilir; auth siri (varsa)
        header'a eklenir; **SSRF kapisindan gecen** URL'e HTTP istegi gonderilir.
        Ic/ozel/metadata/loopback/link-local hedefler REDDEDILIR (DNS cozulup
        IP denetlenir — DNS-rebinding korumasi). Redirect TAKIP EDILMEZ. Donen
        {ok, status, error}: 2xx -> ok=true; SSRF engeli / ag / HTTP hatasi ->
        ok=false + error.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IntegrationTrigger" }
      responses:
        "200":
          description: Tetik sonucu (ok/status/error)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IntegrationTriggerResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ================================================================= #
  # UNIT-COMPLAINTS (D1 — sakin -> HEDEF DAIRE; TAM ANONIM. Yonetimin ayri
  # /complaints modulunden BAGIMSIZ. complainant_user_id HICBIR yanitta YOK.)
  # ================================================================= #
  /blocks:
    get:
      tags: [building]
      summary: Bina bloklari (admin+yonetici)
      description: >
        Bina bloklari + her blogu kullanan daire sayisi (unit_sayisi). D-viz
        Rev-1 bina yerlesimi yonetimi; Rev-2 gorsel editoru bunu kullanir.
      responses:
        "200":
          description: Blok listesi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BlockList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [building]
      summary: Bina blogu olustur (admin+yonetici)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BlockCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Block" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /blocks/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    patch:
      tags: [building]
      summary: Bina blogu guncelle (admin+yonetici)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BlockUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Block" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [building]
      summary: Bina blogu sil (admin+yonetici) — kullanan daire varsa 409
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /unit-complaints:
    get:
      tags: [unit-complaints]
      summary: Daire sikayetleri (YALNIZ yonetim — denetim, complainant dolu)
      description: >
        Rev-1 KADEME: YALNIZ admin+yonetici (denetim). kategori+tarih+durum +
        `notlar` + `complainant_user_id`/`complainant_ad` doner. resident/
        security/tesis_gorevlisi ERISEMEZ (403); kimlik onlara asla sizmaz.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: target_unit_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: durum
          in: query
          required: false
          schema: { type: string, enum: [acik, kapali] }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/UnitComplaint" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [unit-complaints]
      summary: Daire sikayeti ac (YALNIZ resident, KENDI blogu) — anonim
      description: >
        Sakin bir HEDEF daireyi bildirir. Hedef daire sakinin KENDI blogunda
        olmali (blok disi -> 403). complainant_user_id token'dan alinir, spam
        korumasi + denetim icin saklanir; resident'a DONMEZ. Spam (Rev-1.1):
        ayni daireye ayni KATEGORIDE 7 gunde en fazla 1 (farkli kategori
        serbest; durumdan bagimsiz) -> aksi 409.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UnitComplaintCreate" }
      responses:
        "201":
          description: Acildi (complainant DONMEZ)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnitComplaint" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: >
            Haftalik spam limiti: bu daire icin bu KATEGORIDE 7 gunde 1 sikayet
            (farkli kategori serbest).
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "422": { $ref: "#/components/responses/ValidationError" }
  /unit-complaints/mine:
    get:
      tags: [unit-complaints]
      summary: Kendi sikayetlerim (YALNIZ resident) — gitti mi geri bildirimi
      description: >
        Sakin YALNIZ kendi actigi sikayetleri gorur: hedef unit_no + kategori +
        tarih + durum (+ kendi notu). Baska sakinlerin kayitlari, yogunluk/renk,
        ve complainant (kendisi) YOKTUR. Diger roller 403.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: durum
          in: query
          required: false
          schema: { type: string, enum: [acik, kapali] }
      responses:
        "200":
          description: Kendi sikayet listem
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/UnitComplaint" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /unit-complaints/density:
    get:
      tags: [unit-complaints]
      summary: Daire-basi yogunluk (sayi + renk) — YALNIZ yonetim
      description: >
        Rev-1: YALNIZ admin+yonetici. Her daire icin ACIK sikayet sayisi + renk
        (0-2 yesil, 3-4 sari, 5+ kirmizi). residentlar sayilari GOREMEZ (403);
        yapi gorunumu icin /building-map (rol-farkinda) kullanilir.
      responses:
        "200":
          description: Yogunluk
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnitDensity" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /unit-complaints/building-map:
    get:
      tags: [unit-complaints]
      summary: Cizilebilir bina semasi (ROL-FARKINDA) — tum roller
      description: >
        blok -> kat -> daire yapisi (2D kat plani). ROL-FARKINDA
        (shows_density): yonetici/admin sayim+renk gorur; resident YALNIZ kendi
        blogunun yapisini (sayim/renk null — sikayet secici); security/
        tesis_gorevlisi tum yapiyi (sayim/renk null). Yerlesimi eksik daireler
        'unplaced'. complainant hicbir role donmez.
      responses:
        "200":
          description: Bina haritasi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BuildingMap" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /unit-complaints/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    patch:
      tags: [unit-complaints]
      summary: Sikayeti kapat (admin+yonetici) — sikayet edeni GORMEDEN
      description: >
        Yonetim yalniz durumu degistirir (kapali); ACIK sayimi duser (renk
        feedback). complainant yine DONMEZ.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UnitComplaintDecision" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnitComplaint" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

# =================================================================== #
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token. `Authorization: Bearer <token>`. Bkz. /contracts/auth.md"

  parameters:
    Limit:
      name: limit
      in: query
      description: Sayfa boyutu (varsayilan 50, max 200)
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    Offset:
      name: offset
      in: query
      description: Atlanan kayit sayisi
      schema: { type: integer, minimum: 0, default: 0 }
    PathId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Istemci tarafindan uretilen benzersiz anahtar (UUID onerilir)
      schema: { type: string, minLength: 8, maxLength: 200 }

  responses:
    BadRequest:
      description: Gecersiz istek
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Kimlik dogrulama gerekli / gecersiz token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Rol bu islem icin yetkili degil
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Kayit bulunamadi (tenant kapsaminda)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Cakisma (benzersizlik / iliskili kayit)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Govde dogrulama hatasi
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RateLimited:
      description: Cok fazla istek
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    # ---------------------------- ortak ---------------------------- #
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Makine-okunabilir hata kodu
              example: validation_error
            message:
              type: string
              description: Insan-okunabilir aciklama
              example: "baslangic_saat bitis_saat'ten once olmali"
            details:
              type: array
              description: Alan bazli dogrulama hatalari (opsiyonel)
              items:
                type: object
                properties:
                  field: { type: string }
                  message: { type: string }

    Page:
      type: object
      required: [meta]
      properties:
        meta: { $ref: "#/components/schemas/PageMeta" }

    PageMeta:
      type: object
      required: [limit, offset, total]
      properties:
        limit: { type: integer, example: 50 }
        offset: { type: integer, example: 0 }
        total:
          type: integer
          description: Filtreye uyan toplam kayit sayisi
          example: 137

    GunTipi:
      type: string
      enum: [her_gun, hafta_ici, hafta_sonu, resmi_tatil]

    UserRole:
      type: string
      enum: [admin, yonetici, security, tesis_gorevlisi, resident]

    # --------------------------- devices --------------------------- #
    DevicePlatform:
      type: string
      enum: [android, ios, web]
    DeviceRegister:
      type: object
      required: [fcm_token, platform]
      properties:
        fcm_token: { type: string }
        platform: { $ref: "#/components/schemas/DevicePlatform" }
    Device:
      type: object
      required: [id, user_id, fcm_token, platform, aktif, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        fcm_token: { type: string }
        platform: { $ref: "#/components/schemas/DevicePlatform" }
        aktif: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # password_hash ASLA donmez (guvenlik).
    User:
      type: object
      required: [id, ad, role, is_active, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string }
        email:
          type: string
          format: email
          nullable: true
          description: Personelde zorunlu; resident'ta opsiyonel (daire ile girer)
        telefon:
          type: string
          nullable: true
          description: >
            Rol-bazli arama numarasi. YALNIZ tek-kayit yonetim gorunumunde
            (bu sema) doner; LISTEDE donmez (KVKK — bkz. UserListItem). Arayanlara
            yalniz /call-target ile riza+yetki kapisindan gecince aciklanir.
        aranabilir:
          type: boolean
          description: Telefonla aranmaya riza (C1a). Yonetim girer; /call-target kapisi.
        role: { $ref: "#/components/schemas/UserRole" }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
    UserListItem:
      type: object
      description: >
        Kullanici LISTE ogesi — telefon YOK (data-minimization: numaralar toplu
        listelenmez). aranabilir (riza bayragi, PII degil) yonetim gorunurlugu icin.
      required: [id, ad, role, is_active, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string }
        email: { type: string, format: email, nullable: true }
        aranabilir: { type: boolean }
        role: { $ref: "#/components/schemas/UserRole" }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
    UserCreate:
      type: object
      required: [ad, email, role, password]
      properties:
        ad: { type: string }
        email: { type: string, format: email }
        telefon: { type: string, nullable: true }
        aranabilir: { type: boolean, default: false }
        role: { $ref: "#/components/schemas/UserRole" }
        password: { type: string, format: password, minLength: 8 }
    UserUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string }
        email: { type: string, format: email }
        telefon: { type: string, nullable: true }
        aranabilir: { type: boolean }
        role: { $ref: "#/components/schemas/UserRole" }
        is_active: { type: boolean }
        password: { type: string, format: password, minLength: 8 }
    UserContactUpdate:
      type: object
      description: Rol-bazli arama iletisim ayari (admin+yonetici) — en az bir alan
      minProperties: 1
      properties:
        telefon: { type: string, nullable: true, maxLength: 40 }
        aranabilir: { type: boolean }
    CallTarget:
      type: object
      description: >
        Cozulmus arama hedefi (C1a). Numara YALNIZ burada, yetki+riza kapisindan
        gecince doner. channel C1a'da 'phone'; C1b baska kanallar ekleyecek.
      required: [user_id, ad, role, channel, telefon, tel_uri]
      properties:
        user_id: { type: string, format: uuid }
        ad: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }
        channel: { type: string, enum: [phone], description: "C1a: phone; C1b genisletir" }
        telefon: { type: string }
        tel_uri: { type: string, example: "tel:+905321112203" }

    # ----------------------- integrations (C1b) -------------------- #
    Integration:
      type: object
      description: >
        Entegrasyon konfig CIKTISI — auth_secret ASLA donmez (write-only);
        yerine auth_secret_set (bool). channel_type C1a kanal soyutlamasini
        genisletir.
      required: [id, ad, channel_type, endpoint_url, http_method, auth_type, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string }
        channel_type: { type: string, enum: [webhook, megaphone, smarthome] }
        endpoint_url: { type: string, description: "Public http(s); SSRF kapisi tetikte" }
        http_method: { type: string, enum: [GET, POST, PUT, PATCH] }
        headers_json:
          type: object
          additionalProperties: { type: string }
          description: Gizli OLMAYAN ek header'lar
        auth_type: { type: string, enum: [none, bearer, api_key] }
        auth_secret_set:
          type: boolean
          description: Sirrin VARLIGI (sir kendisi donmez — write-only)
        payload_template:
          type: string
          description: "{{message}} / {{title}} yer tutuculu govde sablonu"
        aktif: { type: boolean }
        created_at: { type: string, format: date-time }
    IntegrationCreate:
      type: object
      required: [ad, endpoint_url]
      properties:
        ad: { type: string, minLength: 1, maxLength: 200 }
        channel_type: { type: string, enum: [webhook, megaphone, smarthome], default: webhook }
        endpoint_url:
          type: string
          maxLength: 2000
          description: http(s) olmali (tam SSRF kapisi tetik aninda)
        http_method: { type: string, enum: [GET, POST, PUT, PATCH], default: POST }
        headers_json:
          type: object
          additionalProperties: { type: string }
        auth_type: { type: string, enum: [none, bearer, api_key], default: none }
        auth_secret:
          type: string
          maxLength: 4000
          writeOnly: true
          description: WRITE-ONLY — KEK ile sifreli saklanir; GET'te donmez
        payload_template: { type: string, maxLength: 8000, default: "" }
        aktif: { type: boolean, default: true }
    IntegrationUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string, minLength: 1, maxLength: 200 }
        channel_type: { type: string, enum: [webhook, megaphone, smarthome] }
        endpoint_url: { type: string, maxLength: 2000 }
        http_method: { type: string, enum: [GET, POST, PUT, PATCH] }
        headers_json:
          type: object
          additionalProperties: { type: string }
        auth_type: { type: string, enum: [none, bearer, api_key] }
        auth_secret: { type: string, maxLength: 4000, writeOnly: true }
        payload_template: { type: string, maxLength: 8000 }
        aktif: { type: boolean }
    IntegrationPreset:
      type: object
      required: [key, channel_type, http_method, headers_json, payload_template]
      properties:
        key: { type: string, example: webhook-generic }
        channel_type: { type: string, enum: [webhook, megaphone, smarthome] }
        http_method: { type: string, enum: [GET, POST, PUT, PATCH] }
        headers_json:
          type: object
          additionalProperties: { type: string }
        payload_template: { type: string }
    IntegrationTrigger:
      type: object
      description: Opsiyonel — payload_template yer tutucularini doldurur
      properties:
        message: { type: string, maxLength: 2000 }
        title: { type: string, maxLength: 500 }
    IntegrationTriggerResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, description: 2xx ise true }
        status: { type: integer, nullable: true, description: HTTP durum (ag hatasinda null) }
        error: { type: string, nullable: true, description: SSRF engeli / ag / HTTP hatasi }

    # ---------------------- unit-complaints (D1) ------------------- #
    UnitComplaint:
      type: object
      description: >
        Daire sikayeti ciktisi (Rev-1 KADEMELI). complainant_user_id +
        complainant_ad + notlar YALNIZ yonetim (admin+yonetici) icin dolu
        (denetim); resident/security/gorevli liste/density'ye ERISEMEZ (403).
      required: [id, target_unit_id, kategori, durum, created_at]
      properties:
        id: { type: string, format: uuid }
        target_unit_id: { type: string, format: uuid }
        unit_no: { type: string, nullable: true }
        kategori: { type: string, enum: [gurultu, kapi_onu_ayakkabi, zarar_verme, diger] }
        notlar:
          type: string
          nullable: true
          description: YALNIZ admin+yonetici icin dolu; diger rollerde null
        durum: { type: string, enum: [acik, kapali] }
        created_at: { type: string, format: date-time }
        complainant_user_id:
          type: string
          format: uuid
          nullable: true
          description: YALNIZ yonetim (denetim) icin dolu; resident/saha icin null
        complainant_ad: { type: string, nullable: true, description: Sikayet edenin adi (yalniz yonetim) }
    UnitComplaintCreate:
      type: object
      required: [target_unit_id]
      properties:
        target_unit_id:
          type: string
          format: uuid
          description: >
            Bildirilen HEDEF daire — sakinin KENDI blogunda olmali (blok disi 403).
        kategori:
          type: string
          enum: [gurultu, kapi_onu_ayakkabi, zarar_verme, diger]
          default: diger
        notlar: { type: string, nullable: true, minLength: 1, maxLength: 1000 }
    UnitComplaintDecision:
      type: object
      required: [durum]
      properties:
        durum: { type: string, enum: [acik, kapali] }
    UnitDensityItem:
      type: object
      description: Daire-basi ANONIM yogunluk (sikayet eden YOK)
      required: [target_unit_id, unit_no, acik_sayisi, renk]
      properties:
        target_unit_id: { type: string, format: uuid }
        unit_no: { type: string }
        blok: { type: string, nullable: true }
        acik_sayisi: { type: integer, description: ACIK sikayet sayisi }
        renk: { type: string, enum: [yesil, sari, kirmizi] }
    UnitDensity:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/UnitDensityItem" }

    # ---------------- bina semasi (D-viz Rev-1 — ROL-FARKINDA) ------------- #
    BuildingMapUnit:
      type: object
      description: >
        Haritada tek daire. complaint_count/color YALNIZ yonetim (admin+
        yonetici) icin dolu; resident/security/gorevli icin null (yapi gorunumu).
        benim_sikayetim/benim_acik_sayisi YALNIZ resident icin anlamli — kendi
        kayitlarindan turer (Rev-1.1: sakin KENDI sikayet ettigi daireleri
        harita uzerinde isaretli gorur; genel yogunluk sizmaz).
      required: [unit_id, unit_no]
      properties:
        unit_id: { type: string, format: uuid }
        unit_no: { type: string }
        blok: { type: string, nullable: true }
        kat: { type: integer, nullable: true }
        sira: { type: integer, nullable: true }
        complaint_count:
          type: integer
          nullable: true
          description: ACIK sikayet sayisi — yalniz yonetim; digerinde null
        color:
          type: string
          enum: [yesil, sari, kirmizi]
          nullable: true
          description: Yogunluk rengi — yalniz yonetim; digerinde null
        benim_sikayetim:
          type: boolean
          default: false
          description: >
            resident: bu daireye KENDI (oturum acmis sakin) sikayeti var mi
            (yalniz kendi kayitlarindan). Diger rollerde false.
        benim_acik_sayisi:
          type: integer
          nullable: true
          description: >
            resident: KENDI acik sikayet sayim (0 dahil). Genel sayim DEGIL;
            diger rollerde null.
    BuildingMapKat:
      type: object
      required: [kat, units]
      properties:
        kat: { type: integer }
        units:
          type: array
          items: { $ref: "#/components/schemas/BuildingMapUnit" }
    BuildingMapBlok:
      type: object
      required: [blok, katlar]
      properties:
        blok: { type: string }
        katlar:
          type: array
          items: { $ref: "#/components/schemas/BuildingMapKat" }
    BuildingMap:
      type: object
      description: >
        Cizilebilir yapi: blok -> kat -> daire; yerlesimi eksik daireler
        'unplaced' kovada. ROL-FARKINDA: shows_density yonetimde true (sayim+
        renk dolu); resident/security/gorevli icin false (yalniz yapi). resident
        YALNIZ kendi blogunu gorur. complainant hicbir role donmez.
      required: [shows_density, bloklar, unplaced]
      properties:
        shows_density:
          type: boolean
          description: true = complaint_count/color dolu (yonetim); false = yapi
        bloklar:
          type: array
          items: { $ref: "#/components/schemas/BuildingMapBlok" }
        unplaced:
          type: array
          items: { $ref: "#/components/schemas/BuildingMapUnit" }

    # ---------------- bina blok (D-viz Rev-1) ---------------- #
    Block:
      type: object
      required: [id, ad, unit_sayisi, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string, description: Blok etiketi (kisa alfanumerik) }
        kat_sayisi: { type: integer, nullable: true }
        unit_sayisi: { type: integer, description: Bu blogu kullanan daire sayisi }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    BlockCreate:
      type: object
      required: [ad]
      properties:
        ad: { type: string, minLength: 1, maxLength: 8, pattern: "^[A-Za-z0-9]+$" }
        kat_sayisi: { type: integer, nullable: true, minimum: 0, maximum: 200 }
    BlockUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string, minLength: 1, maxLength: 8, pattern: "^[A-Za-z0-9]+$" }
        kat_sayisi: { type: integer, nullable: true, minimum: 0, maximum: 200 }
    BlockList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Block" }

    PatrolWindowDurum:
      type: string
      enum: [bekliyor, tamamlandi, kacirildi]

    # ----------------------------- auth ---------------------------- #
    LoginRequest:
      type: object
      description: |
        PERSONEL girisi (admin/yonetici/security/tesis_gorevlisi — email ile).
        Sakin (resident) girisi icin `POST /auth/login-resident` kullanilir.
      required: [tenant_slug, email, password]
      properties:
        tenant_slug:
          type: string
          description: |
            Tenant kisa adi (slug). email tenant-ici benzersiz oldugu icin login
            tenant'i bu alanla belirler. Sadece kucuk harf/rakam/tire.
          example: "acme-plaza"
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
    ResidentLoginRequest:
      type: object
      required: [tenant_slug, unit_no, password]
      properties:
        tenant_slug:
          type: string
          example: "acme-plaza"
        unit_no:
          type: string
          description: Daire no (unit.no; tenant-ici benzersiz)
          example: "A-12"
        password:
          type: string
          format: password
          minLength: 8
          description: Sakinin kalici parolasi VEYA ilk giriste gecici kod
    ResidentLoginResponse:
      type: object
      required: [password_setup_required]
      properties:
        password_setup_required:
          type: boolean
          description: |
            true => gecici kodla ilk giris; `setup_token` ile
            `POST /auth/set-password` ZORUNLU (oturum token'i verilmedi).
            false => normal oturum; TokenPair alanlari dolu.
        setup_token:
          type: string
          nullable: true
          description: Kisa omurlu (~10 dk) parola-kurulum token'i
        access_token: { type: string, nullable: true }
        refresh_token: { type: string, nullable: true }
        token_type: { type: string, nullable: true, example: Bearer }
        expires_in: { type: integer, nullable: true, example: 900 }
    SetPasswordRequest:
      type: object
      required: [setup_token, new_password]
      properties:
        setup_token: { type: string }
        new_password: { type: string, format: password, minLength: 8 }
    ResidentCreate:
      type: object
      required: [unit_no, ad]
      properties:
        unit_no: { type: string, example: "A-12" }
        blok:
          type: string
          nullable: true
          description: Yalniz YENI acilan daireye islenir
        ad: { type: string, example: "Ayse Yilmaz" }
        email:
          type: string
          format: email
          nullable: true
          description: Sakinde OPSIYONEL (giris anahtari degildir)
        telefon: { type: string, nullable: true }
        rol_tipi: { $ref: "#/components/schemas/ResidentRol" }
    ResidentCreated:
      type: object
      required: [user_id, unit_id, unit_no, ad, temp_code]
      properties:
        user_id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid }
        unit_no: { type: string, example: "A-12" }
        ad: { type: string }
        email: { type: string, nullable: true }
        temp_code:
          type: string
          example: "K7MR-2QWX"
          description: |
            TEK SEFERLIK gecici giris kodu — YALNIZ bu yanitta duz metin
            doner (yonetici sakine iletir). Sunucuda bcrypt hash'i saklanir;
            sakin kalici parolasini belirleyince silinir.
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [Bearer], example: Bearer }
        expires_in:
          type: integer
          description: Access token gecerlilik suresi (saniye)
          example: 900

    # ---------------------------- shift ---------------------------- #
    Shift:
      type: object
      required: [id, ad, baslangic_saat, bitis_saat, gun_tipi, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string, example: "Gece Vardiyasi" }
        baslangic_saat:
          type: string
          description: "Gun-ici saat (HH:MM, tenant.timezone'a gore)"
          example: "00:00"
        bitis_saat:
          type: string
          description: "HH:MM. bitis < baslangic ise ertesi gune sarkar"
          example: "08:00"
        gun_tipi: { $ref: "#/components/schemas/GunTipi" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ShiftCreate:
      type: object
      required: [ad, baslangic_saat, bitis_saat]
      properties:
        ad: { type: string }
        baslangic_saat: { type: string, example: "00:00" }
        bitis_saat: { type: string, example: "08:00" }
        gun_tipi: { $ref: "#/components/schemas/GunTipi" }
    ShiftUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string }
        baslangic_saat: { type: string }
        bitis_saat: { type: string }
        gun_tipi: { $ref: "#/components/schemas/GunTipi" }

    # -------------------------- checkpoint ------------------------- #
    Checkpoint:
      type: object
      required: [id, ad, nfc_tag_uid, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string, example: "A Blok Giris" }
        nfc_tag_uid: { type: string, example: "04:A3:B2:C1:90:00" }
        gps_lat: { type: number, format: double, nullable: true, example: 41.015137 }
        gps_lng: { type: number, format: double, nullable: true, example: 28.979530 }
        aktif: { type: boolean }
        sdm_aktif:
          type: boolean
          description: "NTAG424 SDM anahtari kayitli mi (anahtarin kendisi ASLA donmez)"
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CheckpointCreate:
      type: object
      required: [ad, nfc_tag_uid]
      properties:
        ad: { type: string }
        nfc_tag_uid: { type: string }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        aktif: { type: boolean, default: true }
    CheckpointUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string }
        nfc_tag_uid: { type: string }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        aktif: { type: boolean }

    # -------------------------- patrol plan ------------------------ #
    PatrolPlan:
      type: object
      required: [id, ad, baslangic_saat, bitis_saat, periyot_dakika, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string, example: "Gece Devriyesi" }
        shift_id: { type: string, format: uuid, nullable: true }
        baslangic_saat:
          type: string
          description: "HH:MM, tenant.timezone'a gore (orn 00:00)"
          example: "00:00"
        bitis_saat:
          type: string
          example: "06:00"
        periyot_dakika:
          type: integer
          minimum: 1
          description: "Pencere periyodu (orn 60 => saat basi)"
          example: 60
        aktif: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    PatrolPlanDetail:
      allOf:
        - $ref: "#/components/schemas/PatrolPlan"
        - type: object
          properties:
            checkpoints:
              type: array
              items: { $ref: "#/components/schemas/PatrolPlanCheckpoint" }
    PatrolPlanCreate:
      type: object
      required: [ad, baslangic_saat, bitis_saat, periyot_dakika]
      properties:
        ad: { type: string }
        shift_id: { type: string, format: uuid, nullable: true }
        baslangic_saat: { type: string, example: "00:00" }
        bitis_saat: { type: string, example: "06:00" }
        periyot_dakika: { type: integer, minimum: 1, example: 60 }
        aktif: { type: boolean, default: true }
    PatrolPlanUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string }
        shift_id: { type: string, format: uuid, nullable: true }
        baslangic_saat: { type: string }
        bitis_saat: { type: string }
        periyot_dakika: { type: integer, minimum: 1 }
        aktif: { type: boolean }

    PatrolPlanCheckpoint:
      type: object
      required: [checkpoint_id, sira]
      properties:
        checkpoint_id: { type: string, format: uuid }
        sira: { type: integer, minimum: 0, example: 0 }
        checkpoint:
          allOf:
            - $ref: "#/components/schemas/Checkpoint"
          nullable: true
          description: "Detay yanitlarinda genisletilmis checkpoint (opsiyonel)"
    PatrolPlanCheckpointAssign:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [checkpoint_id]
            properties:
              checkpoint_id: { type: string, format: uuid }
              sira:
                type: integer
                minimum: 0
                description: "Verilmezse dizi index'i kullanilir"

    # ---------------------------- scans ---------------------------- #
    ScanCreate:
      type: object
      required: [nfc_tag_uid, okutma_zamani]
      properties:
        nfc_tag_uid:
          type: string
          description: "Okutulan NFC etiketi; backend checkpoint'e eslestirir"
          example: "04:A3:B2:C1:90:00"
        checkpoint_id:
          type: string
          format: uuid
          nullable: true
          description: "Istemci biliyorsa; yoksa nfc_tag_uid ile cozumlenir"
        patrol_window_id:
          type: string
          format: uuid
          nullable: true
          description: "Ad-hoc okutmada bos birakilabilir; backend de eslestirebilir"
        okutma_zamani:
          type: string
          format: date-time
          description: "Cihazin okuttugu an (UTC). Offline gecikmeli gonderilebilir."
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        foto_url:
          type: string
          nullable: true
          description: "Onceden yuklenmis fotografin URL'i"
        imza_dogrulandi:
          type: boolean
          default: false
          deprecated: true
          description: >-
            DEPRECATED + YOK SAYILIR: deger artik SUNUCUDA NTAG424 SDM
            dogrulamasiyla hesaplanir; govdedeki girdi etkisizdir (eski mobil
            surumler kirilmaz). SDM icin sdm_picc_data + sdm_cmac gonderin.
        sdm_picc_data:
          type: string
          nullable: true
          minLength: 32
          maxLength: 32
          description: "NTAG424 SDM ENCPICCData (16B, hex) — etiketin NDEF ciktisindan"
          example: "EF963FF7828658A599F3041510671E88"
        sdm_cmac:
          type: string
          nullable: true
          minLength: 16
          maxLength: 16
          description: "NTAG424 SDMMAC (8B, hex) — sdm_picc_data ile BIRLIKTE gonderilir"
          example: "94EED9EE65337086"
    ScanEvent:
      type: object
      required: [id, guard_id, checkpoint_id, nfc_tag_uid, okutma_zamani, imza_dogrulandi, created_at]
      properties:
        id: { type: string, format: uuid }
        guard_id:
          type: string
          format: uuid
          description: "Token'dan turetilir (okutmayi yapan kullanici)"
        checkpoint_id: { type: string, format: uuid }
        patrol_window_id: { type: string, format: uuid, nullable: true }
        nfc_tag_uid: { type: string }
        okutma_zamani: { type: string, format: date-time }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        foto_url: { type: string, nullable: true }
        imza_dogrulandi:
          type: boolean
          description: "SUNUCU hesaplar: NTAG424 SDM dogrulamasi gecerliyse true"
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }

    # -------------------------- dashboard -------------------------- #
    DashboardLive:
      type: object
      required: [generated_at, aktif_turlar, son_alarmlar]
      properties:
        generated_at: { type: string, format: date-time }
        aktif_turlar:
          type: array
          items: { $ref: "#/components/schemas/AktifTur" }
        son_alarmlar:
          type: array
          items: { $ref: "#/components/schemas/Alarm" }
    AktifTur:
      type: object
      required: [patrol_window_id, patrol_plan_id, pencere_baslangic, pencere_bitis, durum]
      properties:
        patrol_window_id: { type: string, format: uuid }
        patrol_plan_id: { type: string, format: uuid }
        patrol_plan_ad: { type: string }
        pencere_baslangic: { type: string, format: date-time }
        pencere_bitis: { type: string, format: date-time }
        durum: { $ref: "#/components/schemas/PatrolWindowDurum" }
        beklenen_checkpoint_sayisi: { type: integer }
        okutulan_checkpoint_sayisi: { type: integer }
    # Tur penceresi gecmisi (GET /patrol-windows ogesi).
    PatrolWindowHistory:
      type: object
      required:
        [id, patrol_plan_id, pencere_baslangic, pencere_bitis, durum,
         beklenen_checkpoint_sayisi, okutulan_checkpoint_sayisi]
      properties:
        id: { type: string, format: uuid }
        patrol_plan_id: { type: string, format: uuid }
        plan_adi: { type: string, nullable: true }
        pencere_baslangic: { type: string, format: date-time }
        pencere_bitis: { type: string, format: date-time }
        durum: { $ref: "#/components/schemas/PatrolWindowDurum" }
        beklenen_checkpoint_sayisi: { type: integer }
        okutulan_checkpoint_sayisi: { type: integer }
    PatrolWindowOzet:
      type: object
      required: [toplam, tamamlandi, kacirildi, bekliyor]
      description: "Filtrelenmis TUM kume uzerinden sayilar (sayfa ile sinirli degil)."
      properties:
        toplam: { type: integer }
        tamamlandi: { type: integer }
        kacirildi: { type: integer }
        bekliyor: { type: integer }
    # GET /me/patrol-window — aktif pencere + checkpoint bazinda okutma durumu.
    MePatrolCheckpoint:
      type: object
      required: [checkpoint_id, ad, sira, okutuldu]
      properties:
        checkpoint_id: { type: string, format: uuid }
        ad: { type: string }
        sira: { type: integer }
        okutuldu:
          type: boolean
          description: "PENCERE-GENELI: herhangi bir elemanin pencere araligindaki okutmasi sayilir."
        okutma_zamani:
          type: string
          format: date-time
          nullable: true
          description: "Penceredeki ILK scan'in zamani (okutulmadiysa null)."
        okutan_user_id:
          type: string
          format: uuid
          nullable: true
          description: "Penceredeki ILK scan'i yapan kullanici (okutulmadiysa null)."
    MePatrolWindowInfo:
      type: object
      required: [id, patrol_plan_id, pencere_baslangic, pencere_bitis, durum]
      properties:
        id: { type: string, format: uuid }
        patrol_plan_id: { type: string, format: uuid }
        plan_adi: { type: string, nullable: true }
        pencere_baslangic: { type: string, format: date-time }
        pencere_bitis: { type: string, format: date-time }
        durum: { $ref: "#/components/schemas/PatrolWindowDurum" }
    MePatrolWindowItem:
      allOf:
        - $ref: "#/components/schemas/MePatrolWindowInfo"
        - type: object
          required: [checkpoints]
          properties:
            checkpoints:
              type: array
              description: "Plana atanmis AKTIF checkpoint'ler, sira ASC."
              items: { $ref: "#/components/schemas/MePatrolCheckpoint" }
    MePatrolWindowResponse:
      type: object
      required: [generated_at, window, checkpoints, windows]
      properties:
        generated_at: { type: string, format: date-time }
        window:
          nullable: true
          description: "Bitisi en yakin aktif pencere; aktif pencere yoksa null."
          allOf:
            - $ref: "#/components/schemas/MePatrolWindowInfo"
        checkpoints:
          type: array
          description: "window'un checkpoint listesi; window null ise []."
          items: { $ref: "#/components/schemas/MePatrolCheckpoint" }
        windows:
          type: array
          description: "TUM aktif pencereler (pencere_bitis ASC); genelde 0-1 eleman."
          items: { $ref: "#/components/schemas/MePatrolWindowItem" }
    Alarm:
      type: object
      required: [tip, olusma_zamani, mesaj]
      properties:
        tip:
          type: string
          enum: [kacirilan_tur, eksik_checkpoint, gecikmis_okutma, acil_durum]
          example: kacirilan_tur
        olusma_zamani: { type: string, format: date-time }
        mesaj: { type: string }
        patrol_window_id: { type: string, format: uuid, nullable: true }
        checkpoint_id: { type: string, format: uuid, nullable: true }

    # ------------------------- notifications ----------------------- #
    Announcement:
      type: object
      required: [id, baslik, govde, olusturan_user_id, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        baslik: { type: string, maxLength: 200 }
        govde: { type: string, maxLength: 5000 }
        foto_key:
          type: string
          nullable: true
          description: Opsiyonel gorsel — /uploads/presign ile alinan obje anahtari
        foto_url:
          type: string
          nullable: true
          description: Goruntuleme icin kisa omurlu presigned GET URL (foto_key varsa)
        olusturan_user_id: { type: string, format: uuid }
        olusturan_ad:
          type: string
          nullable: true
          description: Gonderen kullanicinin adi (liste/detayda join ile)
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AnnouncementCreate:
      type: object
      required: [baslik, govde]
      properties:
        baslik: { type: string, minLength: 1, maxLength: 200 }
        govde: { type: string, minLength: 1, maxLength: 5000 }
        foto_key:
          type: string
          nullable: true
          description: "Opsiyonel gorsel: once /uploads/presign ile alinan obje anahtari"
    AnnouncementUpdate:
      type: object
      properties:
        baslik: { type: string, minLength: 1, maxLength: 200 }
        govde: { type: string, minLength: 1, maxLength: 5000 }
        foto_key:
          type: string
          nullable: true
          description: Acikca null gonderilirse gorsel kaldirilir; alan yoksa dokunulmaz

    ComplaintKategori:
      type: string
      enum: [gurultu, goruntu, diger]
      description: |
        Talep turu: gurultu (gurultu kirliligi), goruntu (goruntu kirliligi),
        diger (genel). Opsiyoneldir; eski kayitlarda null (belirtilmemis).
        Ileriki gurultu-istatistikleri bu alana dayanir.
    Complaint:
      type: object
      required: [id, acan_user_id, baslik, mesaj, durum, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        acan_user_id: { type: string, format: uuid }
        acan_ad:
          type: string
          nullable: true
          description: Acan sakinin adi (yonetim listesinde join ile)
        baslik: { type: string, maxLength: 200 }
        mesaj: { type: string, maxLength: 5000 }
        kategori:
          allOf: [{ $ref: "#/components/schemas/ComplaintKategori" }]
          nullable: true
        foto_key:
          type: string
          nullable: true
          description: Opsiyonel gorsel — /uploads/presign ile alinan obje anahtari
        foto_url:
          type: string
          nullable: true
          description: Goruntuleme icin kisa omurlu presigned GET URL (foto_key varsa)
        durum: { type: string, enum: [acik, inceleniyor, cozuldu] }
        yonetici_yaniti: { type: string, nullable: true, maxLength: 5000 }
        yanitlayan_user_id: { type: string, format: uuid, nullable: true }
        yanit_zamani: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ComplaintCreate:
      type: object
      required: [baslik, mesaj]
      properties:
        baslik: { type: string, minLength: 1, maxLength: 200 }
        mesaj: { type: string, minLength: 1, maxLength: 5000 }
        kategori:
          allOf: [{ $ref: "#/components/schemas/ComplaintKategori" }]
          nullable: true
          description: Opsiyonel tur; verilmezse null (geriye uyumlu)
        foto_key:
          type: string
          nullable: true
          description: "Opsiyonel gorsel: once /uploads/presign ile alinan obje anahtari"
    ComplaintUpdate:
      type: object
      description: En az bir alan gerekli (bos govde 422)
      properties:
        durum: { type: string, enum: [acik, inceleniyor, cozuldu] }
        yonetici_yaniti: { type: string, minLength: 1, maxLength: 5000 }

    Visitor:
      type: object
      description: |
        Ziyaretci LOG kaydi + tam gecmis satiri (onay/red YOK). GSM'e hazir:
        hedef sakinin telefonu app_user.telefon'da; ileride gercek arama adimi
        ayri kolon/tablo ile eklenebilir — yeniden tasarim yok.
      required: [id, unit_id, ziyaretci_ad, kaydeden_user_id, target_resident_user_id, created_at]
      properties:
        id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid }
        unit_no:
          type: string
          nullable: true
          description: Daire numarasi (join ile — guvenlik/sakin ekrani icin)
        ziyaretci_ad: { type: string, maxLength: 200 }
        notlar:
          type: string
          nullable: true
          description: Opsiyonel not ("not" SQL anahtar sozcugu; alan adi notlar)
        kaydeden_user_id:
          type: string
          format: uuid
          description: Kaydi acan guvenlik
        kaydeden_ad: { type: string, nullable: true }
        target_resident_user_id:
          type: string
          format: uuid
          description: >
            TEK hedef sakin — bilgilendirme push'u + gorunurluk YALNIZ onda
            (tek hedef modeli). Ayni dairedeki diger sakinler (es) bu kaydi
            gormez.
        target_resident_ad: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
    VisitorCreate:
      type: object
      description: >
        unit_id VEYA unit_no alanlarindan TAM BiRi verilmeli (aksi 422).
        target_resident_user_id o dairenin AKTIF sakini olmali (aksi 422
        invalid_reference).
      required: [ziyaretci_ad, target_resident_user_id]
      properties:
        unit_id: { type: string, format: uuid, nullable: true }
        unit_no:
          type: string
          nullable: true
          minLength: 1
          maxLength: 50
          description: Daire numarasi (orn. A-12) — sunucuda tenant icinde cozulur
        ziyaretci_ad: { type: string, minLength: 1, maxLength: 200 }
        target_resident_user_id:
          type: string
          format: uuid
          description: >
            Guvenligin sectigi TEK hedef sakin (o dairenin aktif sakini). Push +
            gorunurluk + karar YALNIZ bu sakinde.
        notlar: { type: string, nullable: true, minLength: 1, maxLength: 1000 }

    Kargo:
      type: object
      description: Kargo/paket kaydi + tam gecmis satiri (visitor deseni)
      required: [id, unit_id, firma, durum, kaydeden_user_id, created_at]
      properties:
        id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid }
        unit_no:
          type: string
          nullable: true
          description: Daire numarasi (join ile)
        firma: { type: string, maxLength: 200, description: Kargo firmasi/tasiyici }
        foto_key:
          type: string
          nullable: true
          description: Opsiyonel paket fotografi — /uploads/presign ile alinan obje anahtari
        foto_url:
          type: string
          nullable: true
          description: Goruntuleme icin kisa omurlu presigned GET URL (foto_key varsa)
        notlar:
          type: string
          nullable: true
          description: Opsiyonel not ("not" SQL anahtar sozcugu; alan adi notlar)
        durum: { type: string, enum: [bekliyor, teslim_alindi] }
        kaydeden_user_id:
          type: string
          format: uuid
          description: Kaydi acan guvenlik
        kaydeden_ad: { type: string, nullable: true }
        teslim_alan_user_id:
          type: string
          format: uuid
          nullable: true
          description: Teslim alan sakin (teslim alinmadiysa null)
        teslim_alan_ad: { type: string, nullable: true }
        teslim_zamani: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    KargoCreate:
      type: object
      description: unit_id VEYA unit_no alanlarindan TAM BiRi verilmeli (aksi 422)
      required: [firma]
      properties:
        unit_id: { type: string, format: uuid, nullable: true }
        unit_no:
          type: string
          nullable: true
          minLength: 1
          maxLength: 50
          description: Daire numarasi (orn. A-12) — sunucuda tenant icinde cozulur
        firma: { type: string, minLength: 1, maxLength: 200 }
        foto_key:
          type: string
          nullable: true
          description: "Opsiyonel paket fotografi: once /uploads/presign ile alinan obje anahtari"
        notlar: { type: string, nullable: true, minLength: 1, maxLength: 1000 }
    KargoUpdate:
      type: object
      description: Sakin teslim isareti — tek gecerli deger (geri donus yok)
      required: [durum]
      properties:
        durum: { type: string, enum: [teslim_alindi] }

    UnitAccessRequest:
      type: object
      description: >
        Yonetici tek-seferlik daire erisim izni (talep+izin tek satirda).
        onaylandi & used=false => gecerli izin; yonetici o dairenin ziyaretci/
        kargo kaydini ILK okudugunda used=true olur (one-shot, suresiz).
      required: [id, unit_id, granted_to_yonetici_user_id, durum, used, requested_at]
      properties:
        id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid }
        unit_no: { type: string, nullable: true, description: Daire no (join ile) }
        granted_to_yonetici_user_id:
          type: string
          format: uuid
          description: >
            Talebi acan yonetici VEYA admin (izin ona verilir; isim tarihsel —
            admin de erisim talebi acabilir).
        yonetici_ad: { type: string, nullable: true }
        granted_by_resident_user_id:
          type: string
          format: uuid
          nullable: true
          description: Karari veren sakin (karara kadar null)
        resident_ad: { type: string, nullable: true }
        durum: { type: string, enum: [bekliyor, onaylandi, reddedildi] }
        used:
          type: boolean
          description: true = izin tuketildi (yonetici bir kez gordu); tekrar 403
        requested_at: { type: string, format: date-time }
        decided_at: { type: string, format: date-time, nullable: true }
        used_at: { type: string, format: date-time, nullable: true }
    UnitAccessRequestCreate:
      type: object
      description: unit_id VEYA unit_no alanlarindan TAM BiRi verilmeli (aksi 422)
      properties:
        unit_id: { type: string, format: uuid, nullable: true }
        unit_no:
          type: string
          nullable: true
          minLength: 1
          maxLength: 50
          description: Daire numarasi (orn. A-12) — sunucuda tenant icinde cozulur
    UnitAccessRequestDecision:
      type: object
      description: Sakin karari — onay/red ('bekliyor'a geri donus yok)
      required: [durum]
      properties:
        durum: { type: string, enum: [onaylandi, reddedildi] }
    BulkAccessRequestResult:
      type: object
      description: >
        Toplu izin talebi sonucu. created = yeni acilan bekleyen talep sayisi;
        skipped = zaten acik/onayli oldugu icin atlanan daire sayisi; items =
        yeni acilan talepler. Per-daire sakin RIZASI korunur (baypas yok).
      required: [created, skipped, items]
      properties:
        created: { type: integer }
        skipped: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/UnitAccessRequest" }
    GrantedUnit:
      type: object
      description: Talebi acanin SU AN goruntuleyebilecegi daire (onayli+kullanilmamis)
      required: [request_id, unit_id]
      properties:
        request_id: { type: string, format: uuid, description: Izin (talep) kaydinin id'si }
        unit_id: { type: string, format: uuid }
        unit_no: { type: string, nullable: true }
        decided_at: { type: string, format: date-time, nullable: true }
    GrantedUnitsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/GrantedUnit" }

    OrtakAlan:
      type: object
      required: [id, ad, aktif, acilis, kapanis, slot_dakika, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string, maxLength: 200, example: Havuz }
        aciklama: { type: string, nullable: true, maxLength: 1000 }
        aktif:
          type: boolean
          description: false = kaldirilmis (soft-delete; rezerve edilemez)
        acilis:
          type: string
          example: "08:00"
          description: >-
            Musaitlik acilis saati ("HH:MM"). Alan her gun [acilis, kapanis)
            araliginda rezerve edilebilir.
        kapanis: { type: string, example: "22:00", description: 'Kapanis ("HH:MM"), > acilis' }
        slot_dakika:
          type: integer
          example: 60
          description: Slot izgara uzunlugu (dk) — GET /common-areas/{id}/slots buradan uretir
        created_at: { type: string, format: date-time }
    OrtakAlanCreate:
      type: object
      required: [ad]
      properties:
        ad: { type: string, minLength: 1, maxLength: 200 }
        aciklama: { type: string, nullable: true, minLength: 1, maxLength: 1000 }
        acilis: { type: string, default: "00:00", description: 'Verilmezse tum-gun ("HH:MM")' }
        kapanis: { type: string, default: "23:59:59", description: '> acilis olmali' }
        slot_dakika: { type: integer, default: 60, minimum: 1, maximum: 1440 }
    OrtakAlanUpdate:
      type: object
      description: En az bir alan gerekli
      properties:
        ad: { type: string, minLength: 1, maxLength: 200 }
        aciklama: { type: string, nullable: true, minLength: 1, maxLength: 1000 }
        aktif: { type: boolean }
        acilis: { type: string, description: '"HH:MM"; kapanis ile birlikte > acilis olmali' }
        kapanis: { type: string, description: '"HH:MM"' }
        slot_dakika: { type: integer, minimum: 1, maximum: 1440 }
    Slot:
      type: object
      required: [baslangic, bitis, dolu]
      description: >-
        Bir gunun tek slotu — ROL-FARKINDA. resident/saha: yalniz dolu/bos
        (kimlik + kisi sayisi YOK). admin/yonetici: dolu slotta ayrica rezerve
        eden daire (unit_no) + kisi_sayisi (denetim).
      properties:
        baslangic: { type: string, example: "10:00" }
        bitis: { type: string, example: "11:00" }
        dolu:
          type: boolean
          description: true = bu slotla kesisen ONAYLI rezervasyon var
        rezerve_edilebilir:
          type: boolean
          default: false
          description: >-
            Istekteki SAKIN bu slotu SIMDI rezerve edebilir mi (24s penceresi +
            gunluk kota + son-dakika istisnasi). Yonetimde her zaman false.
        sebep:
          type: string
          nullable: true
          enum: [dolu, gecti, cok_erken, gunluk]
          description: Rezerve edilemme sebebi (rezerve_edilebilir=false iken)
        unit_no:
          type: string
          nullable: true
          description: >-
            YALNIZ admin/yonetici + dolu slot: rezerve eden daire no
            (resident/saha icin DAIMA null — gizlilik).
        kisi_sayisi:
          type: integer
          nullable: true
          description: YALNIZ admin/yonetici + dolu slot: rezerve edilen kisi sayisi
        benim:
          type: boolean
          default: false
          description: >-
            YALNIZ resident: bu dolu slot istekteki sakinin KENDI rezervasyonu
            mu. Istemci baslangic/bitis + simdi ile aktif(yesil)/gecmis(kirmizi)
            rengini secer. Baskasinin dolu slotu benim=false + kimlik/kisi null.
    AlanSlotResponse:
      type: object
      required: [alan_id, tarih, slot_dakika, items]
      properties:
        alan_id: { type: string, format: uuid }
        tarih: { type: string, format: date }
        slot_dakika: { type: integer }
        items: { type: array, items: { $ref: "#/components/schemas/Slot" } }

    Rezervasyon:
      type: object
      required: [id, alan_id, unit_id, tarih, baslangic, bitis, kisi_sayisi,
                 durum, talep_eden_user_id, created_at]
      properties:
        id: { type: string, format: uuid }
        alan_id: { type: string, format: uuid }
        alan_ad: { type: string, nullable: true, description: Alan adi (join ile) }
        unit_id: { type: string, format: uuid }
        unit_no: { type: string, nullable: true, description: Daire numarasi (join ile) }
        tarih: { type: string, format: date }
        baslangic: { type: string, example: "10:00", description: '"HH:MM"' }
        bitis: { type: string, example: "12:00", description: '"HH:MM" — baslangictan sonra' }
        kisi_sayisi: { type: integer, minimum: 1 }
        notlar:
          type: string
          nullable: true
          description: Opsiyonel not ("not" SQL anahtar sozcugu; alan adi notlar)
        durum: { type: string, enum: [onaylandi, iptal] }
        talep_eden_user_id: { type: string, format: uuid }
        talep_eden_ad: { type: string, nullable: true }
        iptal_eden_user_id:
          type: string
          format: uuid
          nullable: true
          description: Iptal eden (sakin/yonetim); yalniz durum='iptal'de dolu
        iptal_eden_ad: { type: string, nullable: true }
        iptal_zamani: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    RezervasyonCreate:
      type: object
      required: [alan_id, tarih, baslangic, bitis, kisi_sayisi]
      properties:
        alan_id: { type: string, format: uuid }
        tarih: { type: string, format: date }
        baslangic: { type: string, example: "10:00" }
        bitis: { type: string, example: "12:00", description: baslangictan sonra olmali }
        kisi_sayisi: { type: integer, minimum: 1, maximum: 1000 }
        unit_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Opsiyonel — sakinin birden fazla aktif dairesi varsa secim;
            kendi dairesi olmali (aksi 422). Verilmezse ilk aktif daire.
        notlar: { type: string, nullable: true, minLength: 1, maxLength: 1000 }

    Etkinlik:
      type: object
      description: |
        Etkinlik + SEFFAF katilim sayilari. Sayilar herkese acik;
        kim-katiliyor listesi URUN GEREGI donmez (kimlik degil yalniz sayi).
        benim_durumum istekteki kullanicinin KENDI beyanidir.
      required: [id, baslik, aciklama, tarih, olusturan_user_id,
                 katiliyorum_sayisi, katilmiyorum_sayisi, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        baslik: { type: string, maxLength: 200, example: Mac izleme aksami }
        aciklama: { type: string, maxLength: 5000 }
        tarih: { type: string, format: date-time, description: Etkinlik zamani }
        konum: { type: string, nullable: true, maxLength: 500 }
        olusturan_user_id: { type: string, format: uuid }
        olusturan_ad: { type: string, nullable: true }
        katiliyorum_sayisi: { type: integer, minimum: 0 }
        katilmiyorum_sayisi: { type: integer, minimum: 0 }
        benim_durumum:
          type: string
          enum: [katiliyorum, katilmiyorum]
          nullable: true
          description: Istekteki kullanicinin kendi RSVP'si (beyan yoksa null)
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    EtkinlikCreate:
      type: object
      required: [baslik, aciklama, tarih]
      properties:
        baslik: { type: string, minLength: 1, maxLength: 200 }
        aciklama: { type: string, minLength: 1, maxLength: 5000 }
        tarih: { type: string, format: date-time }
        konum: { type: string, nullable: true, minLength: 1, maxLength: 500 }
    EtkinlikUpdate:
      type: object
      description: En az bir alan gerekli
      properties:
        baslik: { type: string, minLength: 1, maxLength: 200 }
        aciklama: { type: string, minLength: 1, maxLength: 5000 }
        tarih: { type: string, format: date-time }
        konum: { type: string, nullable: true, maxLength: 500 }
    EtkinlikRsvp:
      type: object
      description: Kullanici basina TEK kayit; tekrar PUT beyani degistirir
      required: [durum]
      properties:
        durum: { type: string, enum: [katiliyorum, katilmiyorum] }

    SiteKurali:
      type: object
      required: [id, baslik, icerik, sira, olusturan_user_id,
                 created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        baslik: { type: string, maxLength: 200, example: Havuz Saatleri }
        icerik: { type: string, maxLength: 10000 }
        foto_key:
          type: string
          nullable: true
          description: Opsiyonel gorsel — /uploads/presign ile alinan obje anahtari
        foto_url:
          type: string
          nullable: true
          description: Goruntuleme icin kisa omurlu presigned GET URL (foto_key varsa)
        sira: { type: integer, minimum: 0, description: Liste sirasi (kucuk once) }
        olusturan_user_id: { type: string, format: uuid }
        olusturan_ad: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    SiteKuraliCreate:
      type: object
      required: [baslik, icerik]
      properties:
        baslik: { type: string, minLength: 1, maxLength: 200 }
        icerik: { type: string, minLength: 1, maxLength: 10000 }
        foto_key:
          type: string
          nullable: true
          description: "Opsiyonel gorsel: once /uploads/presign ile alinan obje anahtari"
        sira: { type: integer, minimum: 0, default: 0 }
    SiteKuraliUpdate:
      type: object
      description: En az bir alan gerekli
      properties:
        baslik: { type: string, minLength: 1, maxLength: 200 }
        icerik: { type: string, minLength: 1, maxLength: 10000 }
        foto_key:
          type: string
          nullable: true
          description: Acikca null gonderilirse gorsel kaldirilir; alan yoksa dokunulmaz
        sira: { type: integer, minimum: 0 }

    Notification:
      type: object
      required: [id, tip, mesaj, okundu, created_at]
      properties:
        id: { type: string, format: uuid }
        tip:
          type: string
          enum: [kacirilan_tur, eksik_checkpoint, gecikmis_okutma]
          example: kacirilan_tur
        patrol_window_id: { type: string, format: uuid, nullable: true }
        patrol_plan_id: { type: string, format: uuid, nullable: true }
        checkpoint_id: { type: string, format: uuid, nullable: true }
        task_id: { type: string, format: uuid, nullable: true }
        mesaj: { type: string }
        okundu: { type: boolean }
        created_at: { type: string, format: date-time }
    NotificationUpdate:
      type: object
      required: [okundu]
      properties:
        okundu: { type: boolean }

    # ----------------------------- tasks --------------------------- #
    TaskTip:
      type: string
      enum: [temizlik, kontrol, ilaclama, bakim, peyzaj, diger]
    Task:
      type: object
      required: [id, tip, ad, foto_zorunlu, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        tip: { $ref: "#/components/schemas/TaskTip" }
        ad: { type: string, example: "Cop toplama" }
        aciklama: { type: string, nullable: true }
        atanan_user_id: { type: string, format: uuid, nullable: true }
        checkpoint_id: { type: string, format: uuid, nullable: true }
        kategori_id:
          type: string
          format: uuid
          nullable: true
          description: "Yonetici-tanimli kategori (A6); null = kategorisiz"
        periyot_dakika:
          type: integer
          minimum: 1
          nullable: true
          description: "Tekrar araligi (dakika); tek seferlikse null"
        sonraki_planlanan:
          type: string
          format: date-time
          nullable: true
          description: "Bir sonraki planlanan an (UTC); peyzaj takvimi. Tamamlaninca ilerler."
        foto_zorunlu:
          type: boolean
          description: "true ise completion foto_key olmadan kabul edilmez (422) — mobil §11 #2"
        aktif: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    TaskCreate:
      type: object
      required: [tip, ad]
      properties:
        tip: { $ref: "#/components/schemas/TaskTip" }
        ad: { type: string }
        aciklama: { type: string, nullable: true }
        atanan_user_id: { type: string, format: uuid, nullable: true }
        checkpoint_id: { type: string, format: uuid, nullable: true }
        kategori_id: { type: string, format: uuid, nullable: true }
        periyot_dakika: { type: integer, minimum: 1, nullable: true }
        sonraki_planlanan: { type: string, format: date-time, nullable: true }
        foto_zorunlu: { type: boolean, default: false }
        aktif: { type: boolean, default: true }
    TaskUpdate:
      type: object
      minProperties: 1
      properties:
        tip: { $ref: "#/components/schemas/TaskTip" }
        ad: { type: string }
        aciklama: { type: string, nullable: true }
        atanan_user_id: { type: string, format: uuid, nullable: true }
        checkpoint_id: { type: string, format: uuid, nullable: true }
        kategori_id: { type: string, format: uuid, nullable: true }
        periyot_dakika: { type: integer, minimum: 1, nullable: true }
        sonraki_planlanan: { type: string, format: date-time, nullable: true }
        foto_zorunlu: { type: boolean }
        aktif: { type: boolean }

    TaskCategory:
      type: object
      required: [id, ad, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string, example: "Havuz bakimi" }
        aktif: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time, nullable: true }
    TaskCategoryCreate:
      type: object
      required: [ad]
      properties:
        ad: { type: string, minLength: 1, maxLength: 100 }

    TaskCompletion:
      type: object
      required: [id, task_id, tamamlayan_user_id, tamamlanma_zamani, idempotency_key, created_at]
      properties:
        id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        tamamlayan_user_id:
          type: string
          format: uuid
          description: "Token'dan turetilir"
        tamamlanma_zamani: { type: string, format: date-time }
        nfc_tag_uid: { type: string, nullable: true }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        foto_key: { type: string, nullable: true }
        foto_url: { type: string, nullable: true }
        notlar: { type: string, nullable: true }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }
    # Capraz-gorev tamamlama gecmisi ogesi (GET /task-completions). foto_url/gps
    # YOK; kanit varligi foto_var/nfc_dogrulandi bool olarak yeter.
    TaskCompletionHistory:
      type: object
      required:
        [id, task_id, tip, tamamlayan_user_id, tamamlanma_zamani, foto_var, nfc_dogrulandi]
      properties:
        id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        task_adi: { type: string, nullable: true }
        tip: { $ref: "#/components/schemas/TaskTip" }
        tamamlayan_user_id: { type: string, format: uuid }
        tamamlanma_zamani: { type: string, format: date-time }
        foto_var: { type: boolean, description: "foto_key dolu mu" }
        nfc_dogrulandi: { type: boolean, description: "nfc_tag_uid okutuldu mu" }
        notlar: { type: string, nullable: true }
    TaskCompletionOzet:
      type: object
      required: [toplam, temizlik, kontrol, ilaclama, peyzaj]
      description: |
        Filtrelenmis TUM kume uzerinden. `toplam` her tipi sayar; ayrik alanlar
        ana tip dagilimidir (bakim/diger toplama dahil, ayrica kirilmaz).
      properties:
        toplam: { type: integer }
        temizlik: { type: integer }
        kontrol: { type: integer }
        ilaclama: { type: integer }
        peyzaj: { type: integer }
    TaskCompletionCreate:
      type: object
      required: [tamamlanma_zamani]
      properties:
        tamamlanma_zamani: { type: string, format: date-time }
        nfc_tag_uid:
          type: string
          nullable: true
          description: "Verilirse task.checkpoint_id'nin nfc'si ile eslesmeli"
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        foto_key:
          type: string
          nullable: true
          description: "Once /uploads/presign ile alinan obje anahtari"
        notlar: { type: string, nullable: true }

    # ---------------------------- uploads -------------------------- #
    PresignRequest:
      type: object
      required: [content_type]
      properties:
        content_type:
          type: string
          example: "image/jpeg"
          description: "Yuklenecek dosyanin MIME tipi"
        dosya_adi:
          type: string
          nullable: true
          description: "Opsiyonel; uzanti foto_key icin kullanilabilir"
    PresignResponse:
      type: object
      required: [foto_key, upload_url, method, expires_in]
      properties:
        foto_key:
          type: string
          description: "Completion'da gonderilecek obje anahtari (tenant ile namespace'li)"
        upload_url:
          type: string
          description: "Presigned PUT URL — istemci dosyayi buraya PUT eder"
        method: { type: string, enum: [PUT], example: PUT }
        expires_in:
          type: integer
          description: "URL gecerlilik suresi (saniye)"
          example: 900

    # ---------------------------- assets --------------------------- #
    AssetKategori:
      type: string
      enum: [ekipman, arac, alet, diger]
    AssetDurum:
      type: string
      enum: [musait, zimmetli, bakimda]
    Asset:
      type: object
      required: [id, ad, durum, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string, example: "Cim bicme makinesi" }
        kategori: { $ref: "#/components/schemas/AssetKategori" }
        nfc_tag_uid: { type: string, nullable: true }
        durum: { $ref: "#/components/schemas/AssetDurum" }
        aciklama: { type: string, nullable: true }
        aktif: { type: boolean }
        acik_zimmet:
          nullable: true
          allOf: [{ $ref: "#/components/schemas/AcikZimmet" }]
          description: "Acik zimmet ozeti; zimmetli degilse null (mobil §13 #2/#5)"
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AcikZimmet:
      type: object
      required: [alan_user_id, alan_user_ad, alinma_zamani]
      properties:
        alan_user_id: { type: string, format: uuid }
        alan_user_ad: { type: string, example: "Guard A" }
        alinma_zamani: { type: string, format: date-time }
    AssetCreate:
      type: object
      required: [ad]
      properties:
        ad: { type: string }
        kategori: { $ref: "#/components/schemas/AssetKategori" }
        nfc_tag_uid: { type: string, nullable: true }
        aciklama: { type: string, nullable: true }
        aktif: { type: boolean, default: true }
    AssetUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string }
        kategori: { $ref: "#/components/schemas/AssetKategori" }
        nfc_tag_uid: { type: string, nullable: true }
        durum: { $ref: "#/components/schemas/AssetDurum" }
        aciklama: { type: string, nullable: true }
        aktif: { type: boolean }

    AssetCheckout:
      type: object
      required: [id, asset_id, alan_user_id, alma_zamani, idempotency_key, created_at]
      properties:
        id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        alan_user_id:
          type: string
          format: uuid
          description: "Token'dan turetilir (alan kullanici)"
        alan_user_ad:
          type: string
          nullable: true
          description: "Alan kullanicinin adi (id + ad birlikte; mobil §13 #5)"
        birakan_user_id:
          type: string
          format: uuid
          nullable: true
          description: "Zimmeti kapatan (sahibi veya admin); acik zimmette NULL"
        birakan_user_ad:
          type: string
          nullable: true
          description: "Birakan kullanicinin adi (id + ad birlikte)"
        alma_zamani: { type: string, format: date-time }
        birakma_zamani:
          type: string
          format: date-time
          nullable: true
          description: "NULL => hala uzerinde (acik zimmet)"
        alma_nfc_tag_uid: { type: string, nullable: true }
        birakma_nfc_tag_uid: { type: string, nullable: true }
        alma_gps_lat: { type: number, format: double, nullable: true }
        alma_gps_lng: { type: number, format: double, nullable: true }
        birakma_gps_lat: { type: number, format: double, nullable: true }
        birakma_gps_lng: { type: number, format: double, nullable: true }
        notlar: { type: string, nullable: true }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }
    CheckoutRequest:
      type: object
      properties:
        nfc_tag_uid:
          type: string
          nullable: true
          description: "Okutulan etiket; verilirse asset.nfc_tag_uid ile eslesmeli"
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        notlar: { type: string, nullable: true }
    CheckinRequest:
      type: object
      properties:
        nfc_tag_uid:
          type: string
          nullable: true
          description: "Okutulan etiket; verilirse asset.nfc_tag_uid ile eslesmeli"
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        notlar: { type: string, nullable: true }

    # --------------------------- emergency ------------------------- #
    EmergencyDurum:
      type: string
      enum: [acik, cozuldu]
    EmergencyAlert:
      type: object
      required: [id, tetikleyen_user_id, tetiklenme_zamani, durum, idempotency_key, created_at]
      properties:
        id: { type: string, format: uuid }
        tetikleyen_user_id:
          type: string
          format: uuid
          description: "Token'dan turetilir (tetikleyen)"
        tetiklenme_zamani: { type: string, format: date-time }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        durum: { $ref: "#/components/schemas/EmergencyDurum" }
        cozen_user_id: { type: string, format: uuid, nullable: true }
        cozulme_zamani: { type: string, format: date-time, nullable: true }
        notlar: { type: string, nullable: true }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }
    EmergencyCreate:
      type: object
      properties:
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        notlar: { type: string, nullable: true }
    EmergencyResolve:
      type: object
      properties:
        notlar: { type: string, nullable: true }

    # ------------------------ tenant settings ---------------------- #
    TenantSettings:
      type: object
      required: [tenant_id, ad, slug, timezone]
      properties:
        tenant_id: { type: string, format: uuid }
        ad: { type: string }
        slug: { type: string }
        timezone: { type: string }
        acil_durum_telefon:
          type: string
          nullable: true
          description: "Acil durumda mobilin arayacagi yonetim numarasi (tel:)"
    TenantSettingsUpdate:
      type: object
      minProperties: 1
      properties:
        acil_durum_telefon: { type: string, nullable: true }
        timezone: { type: string }
        ad: { type: string }

    # ----------------------------- aidat --------------------------- #
    ResidentRol:
      type: string
      enum: [malik, kiraci]
    DuesYontem:
      type: string
      enum: [elden, havale, kart, diger]
    DuesDurum:
      type: string
      enum: [basarili, bekliyor, iptal]

    Unit:
      type: object
      required: [id, no, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        no: { type: string, example: "A-12" }
        blok: { type: string, nullable: true, description: "Blok etiketi (kisa alfanumerik)" }
        # Fiziksel yerlesim (bina semasi) — nullable; girilmemis daire haritada "yerlesimsiz".
        kat: { type: integer, nullable: true, description: "Kat (0=zemin)" }
        sira: { type: integer, nullable: true, description: "Kattaki sira/konum" }
        metrekare: { type: number, format: double, nullable: true }
        aktif: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    UnitCreate:
      type: object
      required: [no]
      properties:
        no: { type: string }
        blok: { type: string, nullable: true, maxLength: 8, pattern: "^[A-Za-z0-9]+$" }
        kat: { type: integer, nullable: true, minimum: -5, maximum: 200 }
        sira: { type: integer, nullable: true, minimum: 0, maximum: 999 }
        metrekare: { type: number, format: double, nullable: true }
        aktif: { type: boolean, default: true }
    UnitUpdate:
      type: object
      minProperties: 1
      properties:
        no: { type: string }
        blok: { type: string, nullable: true, maxLength: 8, pattern: "^[A-Za-z0-9]+$" }
        kat: { type: integer, nullable: true, minimum: -5, maximum: 200 }
        sira: { type: integer, nullable: true, minimum: 0, maximum: 999 }
        metrekare: { type: number, format: double, nullable: true }
        aktif: { type: boolean }
    UnitLayoutUpdate:
      type: object
      minProperties: 1
      description: |
        Daire fiziksel yerlesimi (blok/kat/sira) — bina semasi girisi. YALNIZ
        admin+yonetici (PATCH /units/{id}/layout). Alan null gonderilirse
        yerlesimden cikarilir; en az bir alan gerekir.
      properties:
        blok: { type: string, nullable: true, maxLength: 8, pattern: "^[A-Za-z0-9]+$" }
        kat: { type: integer, nullable: true, minimum: -5, maximum: 200 }
        sira: { type: integer, nullable: true, minimum: 0, maximum: 999 }

    UnitResident:
      type: object
      required: [id, unit_id, user_id]
      properties:
        id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        rol_tipi: { $ref: "#/components/schemas/ResidentRol" }
        baslangic: { type: string, format: date-time, nullable: true }
        bitis: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    UnitResidentBrief:
      type: object
      description: Dairenin aktif sakini (hedef sakin secicisi — user_id + ad)
      required: [user_id, ad]
      properties:
        user_id: { type: string, format: uuid }
        ad: { type: string, description: Sakinin gorunen adi }
    ResidentAssign:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid
          description: "role=resident bir app_user (ayni tenant)"
        rol_tipi: { $ref: "#/components/schemas/ResidentRol" }
        baslangic: { type: string, format: date-time, nullable: true }

    DuesAssessment:
      type: object
      required: [id, unit_id, donem, tutar_kurus, created_at]
      properties:
        id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid }
        donem: { type: string, example: "2026-06" }
        tutar_kurus:
          type: integer
          minimum: 1
          description: "KURUS (minor units); para asla float degil"
        son_odeme_tarihi: { type: string, format: date, nullable: true }
        aciklama: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
    DuesAssessmentCreate:
      type: object
      required: [donem, tutar_kurus]
      properties:
        unit_id:
          type: string
          format: uuid
          nullable: true
          description: "Verilirse TEK daire; yoksa toplu"
        unit_ids:
          type: array
          nullable: true
          description: "Toplu modda hedef daireler; yoksa tum aktif daireler"
          items: { type: string, format: uuid }
        donem: { type: string, example: "2026-06" }
        tutar_kurus: { type: integer, minimum: 1 }
        son_odeme_tarihi: { type: string, format: date, nullable: true }
        aciklama: { type: string, nullable: true }
    DuesAssessmentResult:
      type: object
      required: [created, atlanan]
      properties:
        created:
          type: array
          items: { $ref: "#/components/schemas/DuesAssessment" }
        atlanan:
          type: integer
          description: "Zaten var olan (donem) tahakkuk sayisi (toplu modda atlanan)"

    DuesPayment:
      type: object
      required: [id, unit_id, tutar_kurus, odeme_zamani, yontem, durum, kaydeden_user_id, idempotency_key, created_at]
      properties:
        id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid }
        assessment_id: { type: string, format: uuid, nullable: true }
        tutar_kurus: { type: integer, minimum: 1 }
        odeme_zamani: { type: string, format: date-time }
        donem:
          type: string
          nullable: true
          example: "2026-06"
          description: "Odemenin atfedildigi donem; serbest odemede NULL olabilir"
        yontem: { $ref: "#/components/schemas/DuesYontem" }
        durum: { $ref: "#/components/schemas/DuesDurum" }
        makbuz_no: { type: string, nullable: true }
        provider: { type: string, nullable: true, description: "manual|iyzico|paytr" }
        provider_ref: { type: string, nullable: true, description: "Saglayici referansi (webhook bunu kullanir)" }
        odeme_url:
          type: string
          nullable: true
          description: "Yalniz kart akisi init yanitinda: saglayici odeme sayfasi URL'i (kalici degil)"
        kaydeden_user_id: { type: string, format: uuid }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }
    DuesPaymentCreate:
      type: object
      required: [unit_id, tutar_kurus, yontem]
      properties:
        unit_id: { type: string, format: uuid }
        assessment_id: { type: string, format: uuid, nullable: true }
        tutar_kurus: { type: integer, minimum: 1 }
        yontem: { $ref: "#/components/schemas/DuesYontem" }
        makbuz_no: { type: string, nullable: true }
        odeme_zamani:
          type: string
          format: date-time
          nullable: true
          description: "Verilmezse sunucu now()"
        donem:
          type: string
          nullable: true
          example: "2026-06"
          description: "Verilmezse assessment'tan turer; o da yoksa NULL kalir"

    UnitDuesStatus:
      type: object
      required: [unit_id, no, toplam_tahakkuk_kurus, toplam_odenen_kurus, bakiye_kurus]
      properties:
        unit_id: { type: string, format: uuid }
        no: { type: string }
        toplam_tahakkuk_kurus: { type: integer }
        toplam_odenen_kurus:
          type: integer
          description: "Yalniz durum='basarili' odemeler"
        bakiye_kurus:
          type: integer
          description: "toplam_tahakkuk - toplam_odenen (pozitif = borc)"
        assessments:
          type: array
          items: { $ref: "#/components/schemas/DuesAssessment" }
        payments:
          type: array
          items: { $ref: "#/components/schemas/DuesPayment" }

    # ---------------------------- butce ----------------------------- #
    BudgetTip:
      type: string
      enum: [gelir, gider]
    BudgetKaynak:
      type: string
      enum: [manuel, aidat_odeme]
      description: |
        manuel = elle girilen kayit; aidat_odeme = basarili aidat odemesinden
        OTOMATIK uretilen gelir kaydi (ilgili_payment_id dolu; duzenlenemez/
        silinemez — idempotent: ayni odemeden ikinci kayit uretilmez).
    BudgetCategory:
      type: object
      required: [id, ad, tip, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string, example: "Elektrik" }
        tip: { $ref: "#/components/schemas/BudgetTip" }
        aktif:
          type: boolean
          description: false = soft-delete (yeni kayit yazilamaz; eskiler korunur)
        created_at: { type: string, format: date-time }
    BudgetCategoryCreate:
      type: object
      required: [ad, tip]
      properties:
        ad: { type: string, minLength: 1, maxLength: 100 }
        tip: { $ref: "#/components/schemas/BudgetTip" }
    BudgetCategoryUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string, minLength: 1, maxLength: 100 }
        aktif: { type: boolean }
    BudgetEntry:
      type: object
      required: [id, kategori_id, tip, tutar_kurus, tarih, kaynak, created_by, created_at]
      properties:
        id: { type: string, format: uuid }
        kategori_id: { type: string, format: uuid }
        kategori_ad: { type: string, nullable: true }
        tip: { $ref: "#/components/schemas/BudgetTip" }
        tutar_kurus:
          type: integer
          minimum: 1
          description: KURUS (integer; float ASLA)
          example: 120000
        tarih: { type: string, format: date }
        aciklama: { type: string, nullable: true }
        kaynak: { $ref: "#/components/schemas/BudgetKaynak" }
        ilgili_payment_id:
          type: string
          format: uuid
          nullable: true
          description: kaynak=aidat_odeme ise kaynak odeme (dues_payment.id)
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
    BudgetEntryCreate:
      type: object
      required: [kategori_id, tutar_kurus, tarih]
      description: "`tip` gonderilmez — kategoriden turetilir."
      properties:
        kategori_id: { type: string, format: uuid }
        tutar_kurus: { type: integer, minimum: 1, description: KURUS }
        tarih: { type: string, format: date }
        aciklama: { type: string, nullable: true, maxLength: 1000 }
    BudgetEntryUpdate:
      type: object
      minProperties: 1
      description: Yalniz kaynak=manuel kayitlar (aidat_odeme → 422)
      properties:
        kategori_id: { type: string, format: uuid }
        tutar_kurus: { type: integer, minimum: 1 }
        tarih: { type: string, format: date }
        aciklama: { type: string, nullable: true, maxLength: 1000 }
    BudgetCategorySummaryItem:
      type: object
      required: [kategori_id, ad, tip, toplam_kurus]
      properties:
        kategori_id: { type: string, format: uuid }
        ad: { type: string }
        tip: { $ref: "#/components/schemas/BudgetTip" }
        toplam_kurus: { type: integer }
    BudgetSummary:
      type: object
      required: [toplam_gelir_kurus, toplam_gider_kurus, bakiye_kurus, kategoriler]
      properties:
        toplam_gelir_kurus: { type: integer }
        toplam_gider_kurus: { type: integer }
        bakiye_kurus:
          type: integer
          description: gelir - gider (kasa; NEGATIF olabilir)
        kategoriler:
          type: array
          items: { $ref: "#/components/schemas/BudgetCategorySummaryItem" }

    # --------------------- finansal ozet (Wave 2B) ------------------ #
    GiderKalemi:
      type: object
      required: [ad, toplam_kurus]
      properties:
        ad: { type: string, example: "Elektrik" }
        toplam_kurus: { type: integer }
    TahsilatOzet:
      type: object
      required: [tahakkuk_kurus, tahsilat_kurus, geciken_daire_sayisi]
      description: YALNIZ yonetim yanitinda dolar (sakin/saha icin null)
      properties:
        tahakkuk_kurus: { type: integer }
        tahsilat_kurus:
          type: integer
          description: Yalniz durum='basarili' odemeler
        tahsilat_orani_yuzde:
          type: integer
          nullable: true
          description: round(100*tahsilat/tahakkuk); tahakkuk 0 ise null
        geciken_daire_sayisi:
          type: integer
          description: Donem tahakkuku tam odenmemis daire sayisi
    FinancialSummary:
      type: object
      required:
        [toplam_gelir_kurus, toplam_gider_kurus, bakiye_kurus, en_yuksek_giderler]
      properties:
        donem: { type: string, nullable: true, example: "2026-07" }
        toplam_gelir_kurus: { type: integer }
        toplam_gider_kurus: { type: integer }
        bakiye_kurus: { type: integer, description: NEGATIF olabilir }
        en_yuksek_giderler:
          type: array
          description: En yuksek gider kategorileri (ilk 5, buyukten kucuge)
          items: { $ref: "#/components/schemas/GiderKalemi" }
        tahsilat:
          allOf: [{ $ref: "#/components/schemas/TahsilatOzet" }]
          nullable: true
