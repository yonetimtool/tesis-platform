openapi: 3.0.3
info:
  title: Tesis Guvenlik & Operasyon API
  version: "0.1.0"
  description: |
    Multi-tenant tesis guvenlik & operasyon SaaS — v0 sozlesmesi.
    Backend (FastAPI) ile Mobil (Flutter) ve Panel (Next.js) gelistiricilerinin
    paralel calismasi icin tek dogruluk kaynagidir.

    Konvansiyonlar (detay: /contracts/README.md):
      * Tum zamanlar ISO8601 UTC (`...Z`). tenant.timezone ile yorumlanir.
      * Hata zarfi: `{ "error": { "code": "...", "message": "..." } }`.
      * Sayfalama: `limit` (varsayilan 50, max 200) + `offset`. Liste yanitlari
        `PageMeta` icerir.
      * Auth: JWT Bearer (bkz. /contracts/auth.md). Tenant her zaman token'dan
        cikarilir — istemci tenant_id gondermez/secemez.
      * `POST /scans` icin `Idempotency-Key` header zorunlu.

servers:
  # NOT: base path /v0 KALDIRILDI — gercek backend endpoint'leri /v0 ONEKI OLMADAN
  # sunuyor (orn. /auth/login, /scans). Base = host:port.
  - url: https://api.example.com
    description: production
  - url: http://localhost:8000
    description: yerel gelistirme

tags:
  - name: auth
  - name: shifts
  - name: checkpoints
  - name: patrol-plans
  - name: scans
  - name: dashboard
  - name: me

security:
  - bearerAuth: []

paths:
  # ================================================================= #
  # AUTH
  # ================================================================= #
  /auth/login:
    post:
      tags: [auth]
      summary: Email + parola ile giris
      security: []   # public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Basarili
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Hatali kimlik bilgisi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /auth/login-resident:
    post:
      tags: [auth]
      summary: Sakin girisi — daire no + (gecici kod VEYA kalici parola)
      description: |
        SAKIN (resident) girisi personelden AYRIDIR: email yerine
        `tenant_slug + unit_no + password` alinir. Ayni dairede birden fazla
        sakin olabilir; hesap, girilen degerin hangi sakinin parola/kod
        hash'iyle eslestigine gore cozulur (her sakinin kendi parolasi +
        kendi tek seferlik gecici kodu vardir).

        * Kalici parola eslesirse: `password_setup_required=false` + tam
          token cifti (personel TokenPair ile ayni alanlar).
        * GECICI KOD eslesirse (ilk giris): `password_setup_required=true` +
          `setup_token` doner; oturum token'i VERILMEZ. Istemci
          `POST /auth/set-password` ile kalici parolayi belirlemek ZORUNDADIR.
      security: []   # public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResidentLoginRequest"
      responses:
        "200":
          description: Basarili (normal oturum VEYA parola kurulumu gerekli)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResidentLoginResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Hatali daire no / kod / parola / tesis
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /auth/set-password:
    post:
      tags: [auth]
      summary: Ilk giris sonrasi ZORUNLU kalici parola belirleme (sakin)
      description: |
        `login-resident`'in gecici kodla dondurdugu kisa omurlu `setup_token`
        (~10 dk) ile cagirilir. Basarida parola kaydedilir (bcrypt), gecici
        kod SILINIR (tek kullanimlik) ve tam oturum (TokenPair) doner —
        sakin tekrar giris yapmak zorunda kalmaz.
      security: []   # setup_token govdede tasinir
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPasswordRequest"
      responses:
        "200":
          description: Parola belirlendi; oturum acildi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Gecersiz/suresi dolmus/kullanilmis setup_token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /residents:
    post:
      tags: [auth]
      summary: Sakin hesabi olustur (yonetici) — daire + gecici kod
      description: |
        Yonetici (veya admin) daire + sakin hesabini tek adimda acar. Ayni
        `unit_no` varsa YENI daire acilmaz, mevcuta baglanir (ayni dairede
        coklu sakin). Yanittaki `temp_code` YALNIZ BU YANITTA bir kez duz
        metin doner — yonetici sakine iletir; sunucuda bcrypt hash'i saklanir
        ve sakin kalici parolasini belirleyince gecersizlesir.
        RBAC: admin + yonetici (unit CRUD'un admin-only olmasindan ayri,
        sakin acma akisidir).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResidentCreate"
      responses:
        "201":
          description: Sakin olusturuldu (gecici kod bir kez gosterilir)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResidentCreated"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: email bu tenant'ta zaten kayitli
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /auth/refresh:
    post:
      tags: [auth]
      summary: Refresh token ile yeni access (+rotated refresh) al
      security: []   # refresh token govdede tasinir
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Yeni token cifti
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Gecersiz / suresi dolmus / iptal edilmis refresh token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ================================================================= #
  # SHIFTS
  # ================================================================= #
  /shifts:
    get:
      tags: [shifts]
      summary: Vardiya listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: gun_tipi
          in: query
          schema: { $ref: "#/components/schemas/GunTipi" }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Shift" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [shifts]
      summary: Vardiya olustur
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ShiftCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Shift" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /shifts/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [shifts]
      summary: Vardiya detay
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Shift" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [shifts]
      summary: Vardiya guncelle (kismi)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ShiftUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Shift" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [shifts]
      summary: Vardiya sil
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  # ================================================================= #
  # CHECKPOINTS
  # ================================================================= #
  /checkpoints:
    get:
      tags: [checkpoints]
      summary: Checkpoint listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: aktif
          in: query
          schema: { type: boolean }
        - name: nfc_tag_uid
          in: query
          description: NFC etiket UID ile esleme/arama
          schema: { type: string }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Checkpoint" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [checkpoints]
      summary: Checkpoint olustur (nfc_tag_uid eslemesi dahil)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckpointCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkpoint" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: nfc_tag_uid bu tenant'ta zaten kayitli
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /checkpoints/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [checkpoints]
      summary: Checkpoint detay
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkpoint" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [checkpoints]
      summary: Checkpoint guncelle (kismi)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckpointUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkpoint" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [checkpoints]
      summary: Checkpoint sil
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /checkpoints/{id}/sdm-key:
    parameters:
      - $ref: "#/components/parameters/PathId"
    put:
      tags: [checkpoints]
      summary: NTAG424 SDM anahtarini kaydet/kapat (yalniz admin)
      description: |
        Checkpoint'e yapisik NTAG424 DNA etiketinin SDM (SDMFileRead) AES-128
        anahtarini kaydeder: `{ "key": "<32 hex>" }`. Anahtar sunucuda `SDM_KEK`
        (env) ile AES-GCM SIFRELI saklanir ve HICBIR response'ta geri donmez;
        yalniz `Checkpoint.sdm_aktif` gorunur. Kayit sirasinda replay sayaci
        (`sdm_son_sayac`) 0'lanir — yeni anahtar = yeni/yeniden provision edilmis
        etiket varsayimi. `{ "key": null }` SDM'i kapatir.

        `SDM_KEK` yapilandirilmamissa (bos/32 karakterden kisa) **500
        `config_error`** — anahtar yazma reddedilir.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
                  nullable: true
                  description: "AES-128 anahtar, 32 hex karakter; null = SDM kapat"
                  example: "00112233445566778899AABBCCDDEEFF"
      responses:
        "200":
          description: Kaydedildi/kapatildi (anahtar donmez; sdm_aktif gorunur)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkpoint" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "500":
          description: SDM_KEK yapilandirilmamis (config_error)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ================================================================= #
  # PATROL PLANS
  # ================================================================= #
  /patrol-plans:
    get:
      tags: [patrol-plans]
      summary: Devriye plani listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: aktif
          in: query
          schema: { type: boolean }
        - name: shift_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/PatrolPlan" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [patrol-plans]
      summary: Devriye plani olustur
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatrolPlanCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PatrolPlan" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /patrol-plans/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [patrol-plans]
      summary: Devriye plani detay (checkpoint listesi dahil)
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PatrolPlanDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [patrol-plans]
      summary: Devriye plani guncelle (kismi)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatrolPlanUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PatrolPlan" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [patrol-plans]
      summary: Devriye plani sil
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /patrol-plans/{id}/checkpoints:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [patrol-plans]
      summary: Plana atanmis checkpoint listesi (sirali)
      responses:
        "200":
          description: Atanmis noktalar
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PatrolPlanCheckpoint" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [patrol-plans]
      summary: Plana checkpoint listesi ata (tam degisim / replace)
      description: |
        Gonderilen liste plani tamamen yeniden tanimlar (idempotent set-replace).
        Listedeki sira, gonderim sirasidir; `sira` alani opsiyoneldir, verilmezse
        dizideki index kullanilir.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatrolPlanCheckpointAssign" }
      responses:
        "200":
          description: Atama guncellendi
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PatrolPlanCheckpoint" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # SCANS  (mobil tur kaniti)
  # ================================================================= #
  /scans:
    post:
      tags: [scans]
      summary: Tur kaniti gonder (NFC okutma)
      description: |
        Mobil istemcinin checkpoint okutma kanitini gonderdigi endpoint.
        Offline kuyruktan cift gonderimi engellemek icin `Idempotency-Key`
        header'i ZORUNLUDUR. Ayni key ile ikinci istek 200 + ilk kaydi doner
        (yeni kayit olusturmaz).

        nfc_tag_uid -> checkpoint eslesmesi NORMALIZE edilir (strip + upper;
        buyuk/kucuk harf ve bas/son bosluk farki eslesmeyi dusurmez) — task
        completion ve asset checkout/checkin ile ayni davranis (mobil §11 #3).

        NTAG424 SDM/SUN dogrulamasi: `imza_dogrulandi` YALNIZ SUNUCUDA hesaplanir
        (govdedeki alan deprecated + yok sayilir). Etiket SDM ciktisi
        `sdm_picc_data` (32 hex) + `sdm_cmac` (16 hex) ile gonderilir. Karar:

        | checkpoint anahtari | SDM alanlari | sonuc |
        |---|---|---|
        | yok | yok/var | kayit `imza_dogrulandi=false` (gecis donemi) |
        | var | yok | kayit `false` (zorlama yok) |
        | var | gecersiz (CMAC/UID/format) | **422 `invalid_signature`** — kayit OLUSMAZ |
        | var | sayac ilerlememis | **422 `replay_detected`** — kayit OLUSMAZ |
        | var | gecerli | kayit `true`; replay sayaci gunceller |

        Idempotent tekrar (ayni Idempotency-Key + ayni govde) SDM dogrulamasini
        ATLAR ve 200 doner — tekrar gonderim replay SANILMAZ.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScanCreate" }
      responses:
        "201":
          description: Kayit olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScanEvent" }
        "200":
          description: Idempotent tekrar — mevcut kayit donduruldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScanEvent" }
        "400":
          description: Idempotency-Key eksik veya gecersiz govde
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: nfc_tag_uid hicbir checkpoint ile eslesmedi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Ayni Idempotency-Key farkli govde ile gonderildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: >-
            Dogrulama hatasi; SDM'e ozgu kodlar: `invalid_signature` (CMAC/UID/
            format gecersiz) ve `replay_detected` (okuma sayaci ilerlememis) —
            iki durumda da scan kaydi OLUSMAZ.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ================================================================= #
  # DASHBOARD
  # ================================================================= #
  /dashboard/live:
    get:
      tags: [dashboard]
      summary: Canli panel — aktif turlar + son alarmlar
      description: |
        Panel (Next.js) icin ozet. Aktif/bekleyen patrol_window'lar ve son
        kacirilan turlardan turetilen alarmlar.
      parameters:
        - name: alarm_limit
          in: query
          description: Donulecek son alarm sayisi
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        "200":
          description: Canli ozet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardLive" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /patrol-windows:
    get:
      tags: [dashboard]
      summary: Tur penceresi gecmisi (tarih araligi + durum filtreli)
      description: |
        Materialize edilmis patrol_window'larin GECMISI. /dashboard/live anlik
        bugunku durumu verir; bu uc gecmise donuk sorgu icindir ("gecen hafta
        hangi turlar tamamlandi/kacirildi"). pencere_baslangic DESC sirali.
        Ozet sayilar (toplam/tamamlandi/kacirildi/bekliyor) FILTRELENMIS TUM
        kume uzerinden response.ozet alaninda doner (sayfa ile sinirli degil).
        RBAC: admin + security (dashboard ile tutarli). tenant-izole (RLS).
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: baslangic
          in: query
          description: "pencere_baslangic >= bu an (UTC, ISO-8601)"
          schema: { type: string, format: date-time }
        - name: bitis
          in: query
          description: "pencere_baslangic < bu an (UTC, ISO-8601; yari-acik aralik)"
          schema: { type: string, format: date-time }
        - name: durum
          in: query
          schema: { $ref: "#/components/schemas/PatrolWindowDurum" }
        - name: patrol_plan_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Tur penceresi listesi + ozet
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items, ozet]
                    properties:
                      ozet: { $ref: "#/components/schemas/PatrolWindowOzet" }
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/PatrolWindowHistory" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /me/patrol-window:
    get:
      tags: [me]
      summary: Aktif devriye penceresi + checkpoint bazinda okutma durumu (mobil)
      description: |
        Mobil icin: "aktif turumda hangi noktalar okutuldu" listesi (cihaz yerel
        kaydina gerek kalmadan). Aktif pencere = SU AN icinde olunan pencere
        (pencere_baslangic <= now < pencere_bitis; /dashboard/live'in aktif tur
        mantigiyla tutarli, tenant-geneli).

        KARAR — birden cok plan ayni anda aktif olabilir: TUM aktif pencereler
        `windows[]` icinde doner (her biri kendi checkpoint listesiyle,
        pencere_bitis ASC sirali). `window` + `checkpoints` alanlari bunlardan
        BITISI EN YAKIN (en acil) olanin sade gorunumudur — tek pencereli
        kullanim icin yeterlidir. Aktif pencere yoksa `window: null` +
        `checkpoints: []` + `windows: []` (200, hata DEGIL).

        checkpoints[]: plana atanmis AKTIF checkpoint'ler, `sira` ile sirali.
        `okutuldu` PENCERE-GENELIDIR — HERHANGI bir elemanin okutmasi sayilir
        (scheduler'in 'tamamlandi' hesabiyla ayni eslesme: checkpoint eslesir +
        okutma_zamani pencere araliginda [baslangic, bitis)). okutma_zamani /
        okutan_user_id o checkpoint'in penceredeki ILK scan'inden gelir.
        RBAC: admin + security (dashboard ile tutarli). tenant-izole (RLS).
      responses:
        "200":
          description: Aktif pencere(ler) + okutma durumu (yoksa null/bos)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MePatrolWindowResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ================================================================= #
  # NOTIFICATIONS
  # ================================================================= #
  /notifications:
    get:
      tags: [notifications]
      summary: Bildirim listesi (kacirilan tur vb.)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: okundu
          in: query
          description: Okundu durumuna gore filtrele
          schema: { type: boolean }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Notification" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /notifications/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    patch:
      tags: [notifications]
      summary: Bildirimi okundu/okunmadi isaretle
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotificationUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Notification" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # ANNOUNCEMENTS (duyuru) — gonderme admin+yonetici, okuma tum roller
  # ================================================================= #
  /announcements:
    get:
      tags: [announcements]
      summary: Duyuru listesi (created_at DESC)
      description: OKUMA tum rollere aciktir (resident dahil) — auth.md §4.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Announcement" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [announcements]
      summary: Duyuru olustur (yonetici mobilden + admin panelden)
      description: |
        Olusturan token'dan alinir. Kayit sonrasi tenant'in TUM aktif
        cihazlarina push denenir (EK gonderim — push hatasi kaydi etkilemez;
        data: tip=duyuru, announcement_id). Opsiyonel gorsel: once
        POST /uploads/presign ile foto_key + PUT URL alinir, dosya PUT edilir,
        foto_key burada gonderilir. Okumada foto_url (presigned GET) doner.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnnouncementCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Announcement" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /announcements/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [announcements]
      summary: Duyuru detayi (tum roller)
      responses:
        "200":
          description: Duyuru
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Announcement" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [announcements]
      summary: Duyuru guncelle (admin + yonetici)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnnouncementUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Announcement" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [announcements]
      summary: Duyuru sil (admin + yonetici)
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ================================================================= #
  # COMPLAINTS (sikayet/oneri) — yasayan/calisandan yonetime talep kanali
  #   acma security+tesis_gorevlisi+resident (yonetici/admin ACAMAZ);
  #   okuma acan roller KENDI + admin+yonetici TUMU;
  #   yanit/durum yalniz admin+yonetici
  # ================================================================= #
  /complaints:
    get:
      tags: [complaints]
      summary: Talep listesi (created_at DESC)
      description: |
        Acan roller (security/tesis_gorevlisi/resident) YALNIZ kendi
        actiklarini gorur; admin+yonetici tenant'taki tum talepleri gorur
        (yonetim gorunumu). Durum ve kategori ile filtrelenebilir.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: durum
          in: query
          required: false
          schema: { type: string, enum: [acik, inceleniyor, cozuldu] }
        - name: kategori
          in: query
          required: false
          schema: { $ref: "#/components/schemas/ComplaintKategori" }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Complaint" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [complaints]
      summary: Talep ac (security + tesis_gorevlisi + resident; yonetici/admin 403)
      description: |
        Acan token'dan alinir; durum=acik baslar. Opsiyonel gorsel: once
        POST /uploads/presign ile foto_key + PUT URL alinir, dosya PUT edilir,
        foto_key burada gonderilir (tenant-namespace dogrulanir). Okumada
        foto_url (presigned GET) doner. Kayit sonrasi admin+yonetici
        cihazlarina push denenir (EK gonderim — push hatasi kaydi etkilemez;
        data: tip=talep, complaint_id).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ComplaintCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Complaint" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /complaints/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [complaints]
      summary: Talep detayi (acan roller kendininki; admin+yonetici hepsi)
      responses:
        "200":
          description: Talep
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Complaint" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [complaints]
      summary: Durum degistir + yonetici yaniti yaz (admin + yonetici)
      description: |
        yonetici_yaniti yazildiginda yanitlayan_user_id ve yanit_zamani
        otomatik damgalanir ve YALNIZ talebi acan sakinin cihazlarina push
        denenir (EK gonderim — hatasi kaydi etkilemez; data: tip=talep_yanit,
        complaint_id). Acan roller (security/tesis_gorevlisi/resident) bu
        uca ERISEMEZ (403).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ComplaintUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Complaint" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # VISITORS (ziyaretci onay akisi: guvenlik kaydeder -> daire sakinlerine
  # push -> ilk yanitlayan sakin onaylar/reddeder -> sonuc guvenlige push)
  # ================================================================= #
  /visitors:
    get:
      tags: [visitors]
      summary: Ziyaretci LOG gecmisi (created_at DESC)
      description: |
        Ziyaretci LOG-ONLY kayittir (onay/red YOK). GIZLILIK (kesin kural,
        KVKK): YALNIZ security tenant'in TUM ziyaretci gecmisini gorur;
        resident YALNIZ KENDINE HEDEFLENEN kayitlari (tek hedef modeli — ayni
        dairedeki es'inkini gormez); tesis_gorevlisi ERISMEZ (403). yonetici VE
        admin VARSAYILAN KAPALI (403): bir daireyi gormek icin once
        /unit-access-request ile tek-seferlik izin alir, sonra ?unit_id= ile
        BiR KEZ gorur (izin o okumada tuketilir). daire/tarih ile filtrelenir.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: unit_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: baslangic
          in: query
          required: false
          description: created_at >= (tarih filtresi)
          schema: { type: string, format: date-time }
        - name: bitis
          in: query
          required: false
          description: created_at < (tarih filtresi)
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Visitor" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [visitors]
      summary: Ziyaretci LOG kaydi ac (YALNIZ security)
      description: |
        Kapidaki guvenlik ziyaretciyi kaydeder (LOG-ONLY — onay/red YOK). Daire
        unit_id VEYA unit_no ile verilir (tam biri; bulunamazsa 422); HEDEF
        sakin (target_resident_user_id) o dairenin aktif sakini olmali (degilse
        422). Kayit sonrasi YALNIZ hedef sakine BILGILENDIRME push'u denenir
        (EK gonderim — push hatasi kaydi etkilemez; data: tip=ziyaretci,
        visitor_id). yonetici/admin kayit ACMAZ (403) — kapi operasyonu
        guvenligindir; gecmisi izinle GET ile okurlar.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VisitorCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Visitor" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /visitors/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [visitors]
      summary: Ziyaretci LOG detayi (resident yalniz kendine hedeflenen)
      description: |
        Ziyaretci LOG-ONLY kayittir; onay/red (PATCH) YOKTUR. Detay yalniz
        okumadir.
      responses:
        "200":
          description: Ziyaretci
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Visitor" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ================================================================= #
  # KARGO (paket takibi: guvenlik kaydeder (daire+firma+opsiyonel foto)
  # -> daire sakinlerine push -> sakin "teslim aldim" isaretler)
  # ================================================================= #
  /kargo:
    get:
      tags: [kargo]
      summary: Kargo gecmisi (created_at DESC)
      description: |
        GIZLILIK (ziyaretci ile ayni, KVKK): YALNIZ security tenant'in TUM
        kargo gecmisini gorur; resident YALNIZ kendi DAIRELERININ paketlerini
        (es de gorur — kargo unit-bazli); tesis_gorevlisi ERISMEZ (403).
        yonetici VE admin VARSAYILAN KAPALI (403): /unit-access-request ile
        tek-seferlik izin alip ?unit_id= ile bir kez gorur (izin tuketilir).
        durum/daire/tarih ile filtrelenir. foto_key varsa okumada foto_url
        (presigned GET) doner.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: durum
          in: query
          required: false
          schema: { type: string, enum: [bekliyor, teslim_alindi] }
        - name: unit_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: baslangic
          in: query
          required: false
          description: created_at >= (tarih filtresi)
          schema: { type: string, format: date-time }
        - name: bitis
          in: query
          required: false
          description: created_at < (tarih filtresi)
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Kargo" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [kargo]
      summary: Kargo kaydi ac (YALNIZ security)
      description: |
        Kapidaki guvenlik gelen paketi kaydeder; durum=bekliyor baslar.
        Daire unit_id VEYA unit_no ile verilir (tam biri; bulunamazsa 422).
        Opsiyonel paket fotografi MEVCUT akisla yuklenir: once
        POST /uploads/presign ile foto_key + PUT URL alinir, dosya PUT edilir,
        foto_key burada gonderilir (tenant-namespace dogrulanir; gorev/talep/
        duyuru ile ayni desen — yeni upload yolu YOK). Kayit sonrasi dairenin
        TUM aktif sakinlerine push denenir ("Kargonuz geldi — <firma>";
        EK gonderim — hatasi kaydi etkilemez; data: tip=kargo, kargo_id).
        yonetici/admin kayit ACMAZ (403) — kapi operasyonu guvenligindir.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/KargoCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Kargo" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /kargo/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [kargo]
      summary: Kargo detayi (resident yalniz kendi dairesininki)
      responses:
        "200":
          description: Kargo
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Kargo" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [kargo]
      summary: Teslim aldim isaretle (YALNIZ o dairenin aktif sakini)
      description: |
        Sakin teslim isareti: durum=teslim_alindi (tek gecerli deger).
        teslim_alan_user_id + teslim_zamani sunucuda damgalanir. Atomik
        durum='bekliyor' kosullu UPDATE: zaten teslim alinmis kayda ikinci
        isaret 409 — kimin teslim aldigi DEGISMEZ (ayni dairede coklu sakin
        guvenli). BASKA dairenin sakini 404 alir (varlik sizdirilmaz).
        Personel rolleri bu uca ERISEMEZ (403). Teslimde geri-push YOK
        (urun karari — kayit-push'u yeterli).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/KargoUpdate" }
      responses:
        "200":
          description: Teslim alindi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Kargo" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # UNIT-ACCESS-REQUEST (yonetici TEK-SEFERLIK ziyaretci/kargo goruntuleme
  # izni: yonetici talep acar -> dairenin sakini onaylar/reddeder -> onay
  # tek-kullanimlik izin; yonetici o dairenin kaydini ILK okudugunda tukenir)
  # ================================================================= #
  /unit-access-request:
    post:
      tags: [unit-access]
      summary: Goruntuleme izni talebi ac (admin VEYA yonetici)
      description: |
        yonetici VEYA admin (ikisi de ziyaretci/kargo icin varsayilan kapali)
        bir dairenin kayitlarini gormek icin izin talebi acar (durum=bekliyor).
        unit_id VEYA unit_no (tam biri; yoksa 422). Dairenin AKTIF sakinlerine
        push (tip=erisim_talebi). Diger roller 403.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UnitAccessRequestCreate" }
      responses:
        "201":
          description: Talep acildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnitAccessRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [unit-access]
      summary: Izin talepleri (requested_at DESC)
      description: |
        Kapsam: yonetici kendi talepleri; resident kendi dairelerine gelen
        talepler; admin tenant tumu. security/tesis_gorevlisi ERISMEZ (403).
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: durum
          in: query
          required: false
          schema: { type: string, enum: [bekliyor, onaylandi, reddedildi] }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/UnitAccessRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /unit-access-request/bulk:
    post:
      tags: [unit-access]
      summary: Tum sakinli daireler icin TOPLU izin talebi (admin/yonetici)
      description: |
        Tenant'taki SAKINLI TUM daireler icin ayni anda bekleyen talep acar ->
        her dairenin AKTIF sakinlerine push (tip=erisim_talebi). PER-DAIRE karar
        sakinde kalir: toplu talep hicbir onayi BAYPAS ETMEZ. Mukerrer bildirim
        spam'ini onlemek icin talebi acanin zaten acik (bekleyen) ya da
        kullanilmamis onayli izni olan daireler ATLANIR. Diger roller 403.
      responses:
        "201":
          description: Toplu talep sonucu (olusan + atlanan)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkAccessRequestResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /unit-access-request/granted-units:
    get:
      tags: [unit-access]
      summary: Su an goruntulenebilir (onayli+kullanilmamis) daireler (admin/yonetici)
      description: |
        Talebi acanin ILK okumada tuketebilecegi daireler (durum=onaylandi,
        used=false) — 'hangi daireler acildi' gorunumu (bulk sonrasi izlenir).
        Bekleyen/reddedilen daireler burada YOKTUR; bir daire okununca (izin
        tuketilince) listeden duser. Diger roller 403.
      responses:
        "200":
          description: Goruntulenebilir daireler
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GrantedUnitsResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /unit-access-request/{id}:
    patch:
      tags: [unit-access]
      summary: Talebi onayla/reddet (YALNIZ o dairenin aktif sakini)
      description: |
        Sakin karari: durum=onaylandi|reddedildi. granted_by_resident_user_id
        + decided_at damgalanir. Atomik durum='bekliyor' kosullu UPDATE: ILK
        karar gecerli, ikinci 409. BASKA dairenin sakini 404 (varlik
        sizdirilmaz); personel/yonetici/admin rol kapisinda 403. onaylandi ->
        TEK-KULLANIMLIK izin (used=false). Sonuc push'u talebi acan yonetici'ye
        (tip=erisim_sonuc).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UnitAccessRequestDecision" }
      responses:
        "200":
          description: Karar verildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnitAccessRequest" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # REZERVASYON (ortak alan: yonetici alan tanimlar -> sakin slot talep
  # eder -> yonetici onaylar/reddeder; onayli slotlar CAKISAMAZ)
  # ================================================================= #
  /common-areas:
    get:
      tags: [rezervasyon]
      summary: Ortak alan listesi (ada gore)
      description: |
        TUM roller okur (sakin neyin rezerve edilebilir oldugunu gormeli).
        Yonetim (admin+yonetici) PASIF alanlari da gorur (duzenleme icin);
        diger roller YALNIZ aktif alanlari gorur.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/OrtakAlan" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [rezervasyon]
      summary: Ortak alan olustur (admin + yonetici)
      description: Ayni adla ikinci alan 409. Silme yok — kaldirma PATCH aktif=false.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrtakAlanCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrtakAlan" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /common-areas/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    patch:
      tags: [rezervasyon]
      summary: Ortak alan duzenle / aktiflik degistir (admin + yonetici)
      description: |
        aktif=false = soft-delete (rezervasyon gecmisi korunur; alan_id FK
        RESTRICT hard-delete'i zaten engeller). En az bir alan gerekli.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrtakAlanUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrtakAlan" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /common-areas/{id}/slots:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [rezervasyon]
      summary: Bir gunun slot izgarasi (dolu/bos + rezerve edilebilirlik) — TUM roller
      description: |
        Alanin musaitliginden (acilis/kapanis/slot_dakika) o gunun TAM slot
        izgarasini uretir; her slot dolu/bos + rezerve_edilebilir + sebep.
        **dolu** = o slotla kesisen ONAYLI bir rezervasyon var (yari-acik
        kesisim; bitisik slot dolu SAYILMAZ). GIZLILIK: kim rezerve etmis
        PAYLASILMAZ (yalniz saat + dolu). **rezerve_edilebilir** yalniz SAKIN
        icin hesaplanir (yonetimde her zaman false — yonetim rezerve etmez):
        zamanlama kurallarina uyan (24s penceresi + gunluk kota + son-dakika
        istisnasi) BOS slot true; degilse false + **sebep**
        (dolu|gecti|cok_erken|gunluk). Pasif alan sakine/sahaya 404, yonetim
        pasif alan slotlarini gorur.
      parameters:
        - name: date
          in: query
          required: true
          schema: { type: string, format: date }
          description: Gun (YYYY-MM-DD)
      responses:
        "200":
          description: Slot listesi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlanSlotResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /reservations:
    get:
      tags: [rezervasyon]
      summary: Rezervasyon listesi (created_at DESC)
      description: |
        admin/yonetici tenant'in TUM rezervasyonlarini gorur; resident YALNIZ
        kendi dairelerinin rezervasyonlarini gorur (daire bazli — es de gorur);
        security/tesis_gorevlisi ERISMEZ (403). alan/durum/tarih ile
        filtrelenir (alan+tarih = gun gorunumu). Onay akisi YOK — durum yalniz
        onaylandi|iptal.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: durum
          in: query
          required: false
          schema: { type: string, enum: [onaylandi, iptal] }
        - name: alan_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: tarih
          in: query
          required: false
          description: Gun filtresi (YYYY-MM-DD)
          schema: { type: string, format: date }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Rezervasyon" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [rezervasyon]
      summary: Bos slotu rezerve et (YALNIZ resident) — ONAY YOK, aninda onaylandi
      description: |
        Sakin bos slotu rezerve eder: alan + tarih + saat araligi (bitis >
        baslangic, ayni gun) + kisi_sayisi (>0). Daire sakinin AKTIF dairesinden
        turetilir (birden fazla dairesi varsa unit_id ile secer — kendi dairesi
        olmali). ONAY AKISI YOK: kayit dogrudan durum=onaylandi olusur + rezerve
        edene onay push'u denenir (data: tip=rezervasyon, rezervasyon_id).
        CAKISMA: ayni alanin ONAYLI rezervasyonuyla kesisen slot 409 — nihai
        guvence INSERT anindaki DB EXCLUDE kisiti (yaris-guvenli).
        ZAMANLAMA (slot baslangicina gore, tenant tz):
          * 24 saat penceresi: slota <24s kala rezerve edilir; erken -> 422
            "Rezervasyon en erken 24 saat kala yapilabilir."; gecmis slot -> 422.
          * gunde bir: sakin, slot-gunune denk 1 aktif rezervasyon tutar;
            ikincisi -> 409 "Bu gun icin zaten bir rezervasyonunuz var."
          * son dakika: slota <10 dk kala BOS slot gunluk kotayi baypas eder.
        MUSAITLIK: aralik alanin [acilis, kapanis] penceresinde olmali — disi
        422. Pasif/olmayan alan 422. Yonetim rezerve ETMEZ (403).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RezervasyonCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Rezervasyon" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /reservations/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [rezervasyon]
      summary: Rezervasyon detayi (resident yalniz kendi dairesininki)
      responses:
        "200":
          description: Rezervasyon
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Rezervasyon" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /reservations/{id}/cancel:
    parameters:
      - $ref: "#/components/parameters/PathId"
    post:
      tags: [rezervasyon]
      summary: Rezervasyonu iptal et (YALNIZ rezerve eden sakin — 10 dk kurali)
      description: |
        Rezervasyonu iptal eder (durum='iptal'); slot bosalir (EXCLUDE disi).
        YALNIZ rezerve eden `resident` KENDI rezervasyonunu iptal eder
        (baskasininki 404 — varlik sizdirilmaz). Yonetim (admin/yonetici) iptal
        ETMEZ — onay akisi yok, yalniz izler (403). Slot baslangicina **10
        dakikadan az kala** (veya baslamis) iptal EDILEMEZ (422 "Rezervasyon
        baslangicina 10 dakikadan az kaldi, iptal edilemez."). iptal_eden_user_id
        + iptal_zamani damgalanir. Zaten iptal edilmis kayda ikinci iptal 409.
        security/tesis_gorevlisi ERISEMEZ (403).
      responses:
        "200":
          description: Iptal edildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Rezervasyon" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # ETKINLIK + RSVP (yonetici olusturur -> sakinlere push -> sakin
  # katiliyorum/katilmiyorum beyani -> SAYILAR HERKESE SEFFAF)
  # ================================================================= #
  /events:
    get:
      tags: [etkinlik]
      summary: Etkinlik listesi (tarih DESC) + seffaf katilim sayilari
      description: |
        TUM roller okur. Her etkinlik SEFFAF sayilarla doner
        (katiliyorum_sayisi + katilmiyorum_sayisi — herkes gorur) ve
        istekteki kullanicinin KENDI beyani (benim_durumum; yoksa null) ile
        gelir. Kim-katiliyor listesi URUN GEREGI donmez — kimlik degil,
        yalniz sayi. Yaklasan/gecmis ayrimini istemci tarih'e gore yapar.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Etkinlik" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [etkinlik]
      summary: Etkinlik olustur (admin + yonetici)
      description: |
        Site yonetimi etkinligi duyurur (orn. cenaze, mac izleme). Kayit
        sonrasi TUM SAKINLERIN cihazlarina push denenir (hedef kitle
        sakinler; personel okur ama push almaz — EK gonderim, hatasi kaydi
        etkilemez; data: tip=etkinlik, etkinlik_id).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EtkinlikCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Etkinlik" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /events/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [etkinlik]
      summary: Etkinlik detayi + seffaf sayilar + kendi beyanim
      responses:
        "200":
          description: Etkinlik
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Etkinlik" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [etkinlik]
      summary: Etkinlik duzenle (admin + yonetici; en az bir alan)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EtkinlikUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Etkinlik" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [etkinlik]
      summary: Etkinlik sil (admin + yonetici; RSVP'ler CASCADE)
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /events/{id}/rsvp:
    parameters:
      - $ref: "#/components/parameters/PathId"
    put:
      tags: [etkinlik]
      summary: RSVP ver/degistir (YALNIZ resident; kullanici basina TEK kayit)
      description: |
        Sakin katilim beyani: katiliyorum | katilmiyorum. Kullanici basina
        TEK kayit — tekrar PUT beyani DEGISTIRIR (ON CONFLICT upsert; cift
        kayit imkansiz, es zamanli PUT'lar guvenli). Yanit guncel SEFFAF
        sayilarla etkinligin kendisidir (UI sayiyi aninda gorur). Personel
        rolleri RSVP veremez (403) — etkinligin muhatabi sakinler; RSVP'de
        ek push YOK (urun karari).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EtkinlikRsvp" }
      responses:
        "200":
          description: Beyan kaydedildi/guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Etkinlik" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # SITE KURALLARI (blog-tarzi: yonetici CRUD, herkes okur; sira ile
  # siralanir, baslikta ?q= ILIKE aramasi)
  # ================================================================= #
  /site-rules:
    get:
      tags: [site-kurallari]
      summary: Kural listesi (sira ASC, esitlikte eski once) + baslik aramasi
      description: |
        TUM roller okur. `?q=` basligi SUNUCU tarafinda ILIKE ile suzer
        (buyuk/kucuk harf duyarsiz; % ve _ joker karakterleri kacislanir —
        arama literal metin uzerinedir; RLS ile tenant-kapsamli, sizinti
        yok). foto_key varsa okumada foto_url (presigned GET) doner.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: q
          in: query
          required: false
          description: Baslik aramasi (ILIKE)
          schema: { type: string, minLength: 1, maxLength: 200 }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/SiteKurali" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [site-kurallari]
      summary: Kural ekle (admin + yonetici)
      description: |
        Opsiyonel gorsel MEVCUT akisla: once POST /uploads/presign ile
        foto_key + PUT URL alinir, dosya PUT edilir, foto_key burada
        gonderilir (tenant-namespace dogrulanir; gorev/talep/duyuru/kargo
        ile ayni desen — yeni upload yolu YOK). Push YOK — kurallar basvuru
        icerigidir (urun karari).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SiteKuraliCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SiteKurali" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /site-rules/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [site-kurallari]
      summary: Kural detayi (tum roller)
      responses:
        "200":
          description: Kural
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SiteKurali" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [site-kurallari]
      summary: Kural duzenle (admin + yonetici; en az bir alan)
      description: foto_key acikca null gonderilirse gorsel kaldirilir.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SiteKuraliUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SiteKurali" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [site-kurallari]
      summary: Kural sil (admin + yonetici; HARD DELETE — salt icerik)
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ================================================================= #
  # TASKS (esnek gorev sistemi) + tamamlama + foto kanit
  # ================================================================= #
  /tasks:
    get:
      tags: [tasks]
      summary: Gorev listesi
      description: |
        `atanan_user_id` filtresi (mobil §11 #1): `me` = token kullanicisina
        atananlar; duz UUID = o kullaniciya atananlar (panel; tum okuyucu
        roller kullanabilir — atama bilgisi zaten listede gorunur, yetki
        siniri degildir). Gecersiz deger 422.

        Gorunurluk (A4): saha rolleri (`security`/`tesis_gorevlisi`) kendi
        ROL GRUBUNA atanan gorevleri + atanmamislari ("Herkes") okur;
        saha-disi kisiye atanmis gorevler gorunmez. Yonetim kisitsiz.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: tip
          in: query
          schema: { $ref: "#/components/schemas/TaskTip" }
        - name: aktif
          in: query
          schema: { type: boolean }
        - name: atanan_user_id
          in: query
          description: "'me' veya user UUID — atanan kullanici filtresi"
          schema: { type: string }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Task" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [tasks]
      summary: Gorev olustur
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /tasks/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [tasks]
      summary: Gorev detay
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
