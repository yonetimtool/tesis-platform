        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Announcement" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [announcements]
      summary: Duyuru olustur (admin + yonetici)
      description: |
        Olusturan token'dan alinir. Kayit sonrasi tenant'in TUM aktif
        cihazlarina push denenir (EK gonderim — push hatasi kaydi etkilemez;
        data: tip=duyuru, announcement_id). Opsiyonel gorsel: once
        POST /uploads/presign ile foto_key + PUT URL alinir, dosya PUT edilir,
        foto_key burada gonderilir. Okumada foto_url (presigned GET) doner.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnnouncementCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Announcement" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /announcements/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [announcements]
      summary: Duyuru detayi (tum roller)
      responses:
        "200":
          description: Duyuru
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Announcement" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [announcements]
      summary: Duyuru guncelle (admin + yonetici)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnnouncementUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Announcement" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [announcements]
      summary: Duyuru sil (admin + yonetici)
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ================================================================= #
  # COMPLAINTS (sikayet/oneri) — sakin -> yonetim talep kanali
  #   acma resident; okuma resident(kendi)+admin+yonetici(tumu);
  #   yanit/durum admin+yonetici; security/tesis_gorevlisi ERISMEZ
  # ================================================================= #
  /complaints:
    get:
      tags: [complaints]
      summary: Talep listesi (created_at DESC)
      description: |
        resident YALNIZ kendi actiklarini gorur; admin+yonetici tenant'taki
        tum talepleri gorur (yonetim gorunumu). Durum ile filtrelenebilir.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: durum
          in: query
          required: false
          schema: { type: string, enum: [acik, inceleniyor, cozuldu] }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Complaint" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [complaints]
      summary: Talep ac (resident)
      description: |
        Acan token'dan alinir; durum=acik baslar. Opsiyonel gorsel: once
        POST /uploads/presign ile foto_key + PUT URL alinir, dosya PUT edilir,
        foto_key burada gonderilir (tenant-namespace dogrulanir). Okumada
        foto_url (presigned GET) doner. Kayit sonrasi admin+yonetici
        cihazlarina push denenir (EK gonderim — push hatasi kaydi etkilemez;
        data: tip=talep, complaint_id).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ComplaintCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Complaint" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /complaints/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [complaints]
      summary: Talep detayi (resident kendininki; admin+yonetici hepsi)
      responses:
        "200":
          description: Talep
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Complaint" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [complaints]
      summary: Durum degistir + yonetici yaniti yaz (admin + yonetici)
      description: |
        yonetici_yaniti yazildiginda yanitlayan_user_id ve yanit_zamani
        otomatik damgalanir ve YALNIZ talebi acan sakinin cihazlarina push
        denenir (EK gonderim — hatasi kaydi etkilemez; data: tip=talep_yanit,
        complaint_id). resident bu uca ERISEMEZ (403).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ComplaintUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Complaint" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # TASKS (esnek gorev sistemi) + tamamlama + foto kanit
  # ================================================================= #
  /tasks:
    get:
      tags: [tasks]
      summary: Gorev listesi
      description: |
        `atanan_user_id` filtresi (mobil §11 #1): `me` = token kullanicisina
        atananlar ("Gorevlerim" tek istekte); duz UUID = o kullaniciya atananlar
        (panel; tum okuyucu roller kullanabilir — atama bilgisi zaten listede
        gorunur, yetki siniri degildir). Gecersiz deger 422.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: tip
          in: query
          schema: { $ref: "#/components/schemas/TaskTip" }
        - name: aktif
          in: query
          schema: { type: boolean }
        - name: atanan_user_id
          in: query
          description: "'me' veya user UUID — atanan kullanici filtresi"
          schema: { type: string }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Task" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [tasks]
      summary: Gorev olustur
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /tasks/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [tasks]
      summary: Gorev detay
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [tasks]
      summary: Gorev guncelle (kismi)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [tasks]
      summary: Gorev sil
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /tasks/{id}/completions:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [tasks]
      summary: Gorev tamamlama gecmisi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/TaskCompletion" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [tasks]
      summary: Gorevi tamamla (kanit gonder)
      description: |
        Idempotency-Key header ZORUNLU (offline cift gonderim korumasi, scan deseni).
        Foto icin: once POST /uploads/presign ile foto_key + PUT URL alinir, dosya
        dogrudan MinIO'ya yuklenir, sonra burada foto_key gonderilir.

        FOTO ZORUNLULUGU (mobil §11 #2): gorevde `foto_zorunlu=true` ise
        `foto_key` OLMADAN tamamlama **422** doner (anlamli mesajla).

        NFC eslesmesi NORMALIZE (mobil §11 #3): gorevin checkpoint'i varsa
        gonderilen `nfc_tag_uid` strip + upper sonrasi karsilastirilir
        (buyuk/kucuk harf, bas/son bosluk farki 422 dusurmez).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCompletionCreate" }
      responses:
        "201":
          description: Tamamlama kaydedildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskCompletion" }
        "200":
          description: Idempotent tekrar — mevcut kayit
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskCompletion" }
        "400":
          description: Idempotency-Key eksik veya gecersiz govde
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Ayni Idempotency-Key farkli govde ile gonderildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /task-completions:
    get:
      tags: [tasks]
      summary: Gorev tamamlama gecmisi (tum gorevler; tarih/tip/atanan filtreli)
      description: |
        TUM gorevlerin tamamlanma GECMISI. /tasks/{id}/completions tek gorev
        icindir; bu uc capraz-gorev gecmise donuk sorgu icindir ("gecen hafta
        hangi gorevler tamamlandi, kim, hangi tip"). tamamlanma_zamani DESC.
        /patrol-windows ile ayni desen: ozet sayilar (toplam + tip dagilimi)
        FILTRELENMIS TUM kume uzerinden response.ozet'te doner.
        RBAC: admin + security. tenant-izole (RLS).
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: baslangic
          in: query
          description: "tamamlanma_zamani >= bu an (UTC, ISO-8601)"
          schema: { type: string, format: date-time }
        - name: bitis
          in: query
          description: "tamamlanma_zamani < bu an (UTC, ISO-8601; yari-acik)"
          schema: { type: string, format: date-time }
        - name: tip
          in: query
          schema: { $ref: "#/components/schemas/TaskTip" }
        - name: task_id
          in: query
          schema: { type: string, format: uuid }
        - name: tamamlayan_user_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Tamamlama listesi + ozet
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items, ozet]
                    properties:
                      ozet: { $ref: "#/components/schemas/TaskCompletionOzet" }
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/TaskCompletionHistory" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /landscape/schedule:
    get:
      tags: [tasks]
      summary: Peyzaj bakim takvimi (yaklasan isler, sirali)
      description: |
        tip=peyzaj ve sonraki_planlanan dolu aktif gorevler, sonraki_planlanan'a
        gore ARTAN sirada. (Mevcut Task semasi yeniden kullanilir.)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Takvim
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Task" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /uploads/presign:
    post:
      tags: [uploads]
      summary: Foto yukleme icin presigned PUT URL uret
      description: |
        Backend foto_key uretir ve MinIO icin presigned PUT URL doner. Istemci
        dosyayi bu URL'e PUT eder, sonra foto_key'i ilgili completion'da,
        duyuru olusturmada veya talep acmada gonderir. RBAC:
        admin/security/tesis_gorevlisi + yonetici (duyuru gorseli) +
        resident (sikayet/oneri gorseli).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PresignRequest" }
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PresignResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # ASSETS (demirbas envanteri) + zimmet (checkout/checkin)
  # ================================================================= #
  /assets:
    get:
      tags: [assets]
      summary: Demirbas listesi
      description: |
        Her item ACIK zimmet ozeti tasir: `acik_zimmet` (null | {alan_user_id,
        alan_user_ad, alinma_zamani}) — mobil history taramadan gosterir
        (mobil §13 #2/#5). `nfc_tag_uid` TAM eslesme filtresi UID->asset
        cozumunu tek istege indirir (mobil §13 #1). `checked_out_by` acik
        zimmet filtresi: `me` = token kullanicisinin uzerindekiler (mobil §13
        #3); `<uuid>` degeri YALNIZ admin (baskasi 403), gecersiz deger 422.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: kategori
          in: query
          schema: { $ref: "#/components/schemas/AssetKategori" }
        - name: durum
          in: query
          schema: { $ref: "#/components/schemas/AssetDurum" }
        - name: aktif
          in: query
          schema: { type: boolean }
        - name: nfc_tag_uid
          in: query
          description: Tam eslesme — UID okutup asset'i tek istekle cozmek icin
          schema: { type: string }
        - name: checked_out_by
          in: query
          description: "'me' veya user UUID (UUID yalniz admin) — acik zimmeti bu kullanicida olanlar"
          schema: { type: string }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Asset" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [assets]
      summary: Demirbas olustur
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssetCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: nfc_tag_uid bu tenant'ta zaten kayitli
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /assets/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [assets]
      summary: Demirbas detay
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [assets]
      summary: Demirbas guncelle (kismi)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssetUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [assets]
      summary: Demirbas sil
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /assets/{id}/checkout:
    parameters:
      - $ref: "#/components/parameters/PathId"
    post:
      tags: [assets]
      summary: Demirbasi al (zimmetle)
      description: |
        Idempotency-Key ZORUNLU (scan deseni). nfc_tag_uid verilirse asset'in
        nfc'siyle eslesmeli. alan_user_id token'dan. Zaten zimmetliyse 409.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckoutRequest" }
      responses:
        "201":
          description: Zimmetlendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetCheckout" }
        "200":
          description: Idempotent tekrar — mevcut kayit
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetCheckout" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Demirbas zaten zimmetli (veya ayni key farkli govde)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /assets/{id}/checkin:
    parameters:
      - $ref: "#/components/parameters/PathId"
    post:
      tags: [assets]
      summary: Demirbasi birak (zimmeti kapat)
      description: |
        Acik zimmeti kapatir (birakma_zamani=now). Idempotency-Key ZORUNLU.
        nfc_tag_uid verilirse asset'in nfc'siyle eslesmeli. Acik zimmet yoksa 409.

        SAHIPLIK (mobil §13 #6): checkin'i YALNIZ acik zimmetin sahibi
        (alan_user_id == token user) veya ADMIN (yonetim mudahalesi)
        yapabilir; baska kullanici 403 `forbidden`
        ("Zimmet baskasinin uzerinde..."). security/tesis_gorevlisi baskasinin
        zimmetini KAPATAMAZ.

        Kapatan kullanici `birakan_user_id` olarak kaydedilir (cevapta ve
        history'de `birakan_user_ad` ile birlikte doner).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckinRequest" }
      responses:
        "200":
          description: Birakildi (zimmet kapatildi / idempotent tekrar)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetCheckout" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Acik zimmet yok (demirbas zaten musait)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /assets/{id}/history:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [assets]
      summary: Demirbas zimmet gecmisi
      description: |
        Siralama `alma_zamani` uzerinden; VARSAYILAN `desc` (en yeni ustte —
        mobil §13 #4). Eski (en eski ustte) davranis icin `?order=asc`.
        Item'larda `alan_user_ad` dolu gelir (id + ad birlikte, mobil §13 #5).
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: order
          in: query
          description: "alma_zamani sirasi (varsayilan: desc = en yeni ustte)"
          schema: { type: string, enum: [asc, desc], default: desc }
      responses:
        "200":
          description: Gecmis
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/AssetCheckout" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ================================================================= #
  # EMERGENCY (acil durum) + tenant settings (yonetim numarasi)
  # ================================================================= #
  /emergency:
    get:
      tags: [emergency]
      summary: Acil durum listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: durum
          in: query
          schema: { $ref: "#/components/schemas/EmergencyDurum" }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/EmergencyAlert" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [emergency]
      summary: Acil durum tetikle (panik butonu)
      description: |
        Idempotency-Key ZORUNLU (panik aninda mukerrer basim korumasi). tetikleyen
        token'dan. Alarm kaydi + yuksek oncelikli 'acil_durum' notification uretir.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmergencyCreate" }
      responses:
        "201":
          description: Alarm olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmergencyAlert" }
        "200":
          description: Idempotent tekrar — mevcut alarm
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmergencyAlert" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Ayni Idempotency-Key farkli govde ile gonderildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /emergency/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    patch:
      tags: [emergency]
      summary: Acil durumu coz
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmergencyResolve" }
      responses:
        "200":
          description: Cozuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmergencyAlert" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # DEVICES (FCM push token kaydi)
  # ================================================================= #
  /devices:
    post:
      tags: [devices]
      summary: Cihaz push token kaydet (kendi cihazi; her rol)
      description: |
        Giris yapmis kullanici kendi cihaz FCM token'ini kaydeder. Ayni token
        (tenant icinde UNIQUE) tekrar gonderilirse guncellenir + aktiflesir
        (idempotent upsert). user_id token'dan turetilir.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeviceRegister" }
      responses:
        "201":
          description: Kaydedildi (veya guncellendi)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Device" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [devices]
      summary: Tenant cihazlari (admin, debug)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Device" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /devices/{fcm_token}:
    delete:
      tags: [devices]
      summary: Kendi cihaz token'ini pasiflestir (logout/uninstall)
      parameters:
        - name: fcm_token
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Pasiflestirildi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /tenant/settings:
    get:
      tags: [tenant]
      summary: Tenant ayarlari (acil durum yonetim numarasi dahil)
      description: "Mobil, acil durumda aranacak `acil_durum_telefon`'u buradan okur (tel: link)."
      responses:
        "200":
          description: Ayarlar
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantSettings" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    patch:
      tags: [tenant]
      summary: Tenant ayarlarini guncelle (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TenantSettingsUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantSettings" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # AIDAT — unit (daire) + sakin + tahakkuk + odeme
  # ================================================================= #
  /units:
    get:
      tags: [aidat]
      summary: Daire listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: blok
          in: query
          schema: { type: string }
        - name: aktif
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Unit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [aidat]
      summary: Daire olustur (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UnitCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Unit" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Daire no bu tesiste zaten kayitli
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /units/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [aidat]
      summary: Daire detay
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Unit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [aidat]
      summary: Daire guncelle (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UnitUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Unit" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [aidat]
      summary: Daire sil (admin)
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /units/{id}/residents:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [aidat]
      summary: Dairenin sakinleri
      responses:
        "200":
          description: Sakin listesi
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UnitResident" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [aidat]
      summary: Daireye sakin ata (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResidentAssign" }
      responses:
        "201":
          description: Atandi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnitResident" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /units/{id}/residents/{user_id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
      - name: user_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [aidat]
      summary: Sakini daireden cikar (bitis=now) (admin)
      responses:
        "204": { description: Cikarildi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /units/{id}/dues:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [aidat]
      summary: Dairenin borc durumu (tahakkuk - odeme = bakiye)
      responses:
        "200":
          description: Borc durumu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnitDuesStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /dues/assessments:
    get:
      tags: [aidat]
      summary: Tahakkuk listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: unit_id
          in: query
          schema: { type: string, format: uuid }
        - name: donem
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/DuesAssessment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [aidat]
      summary: Tahakkuk olustur (tek daire veya toplu donem) (admin)
      description: |
        `unit_id` verilirse TEK daire (ayni daire+donem ikinci kez → 409). `unit_id`
        yoksa TOPLU: `unit_ids` (verilmezse tum aktif daireler); mevcut donemler atlanir.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DuesAssessmentCreate" }
      responses:
        "201":
          description: "Olusturuldu (toplu modda created + atlanan)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DuesAssessmentResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Tek daire modunda ayni donem zaten var
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /dues/payments:
    get:
      tags: [aidat]
      summary: Odeme listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: unit_id
          in: query
          schema: { type: string, format: uuid }
        - name: donem
          in: query
          description: "'YYYY-MM' — donem bazli rapor filtresi (payment.donem uzerinden)"
          schema: { type: string }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/DuesPayment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [aidat]
      summary: Manuel odeme kaydi (admin)
      description: |
        Gercek tahsilat YOK (soyut). Idempotency-Key ZORUNLU (cift kayit korumasi).
        kaydeden token'dan. Bakiye = toplam tahakkuk - basarili odemeler.

        DONEM ATFI (panel raporu): `donem` ('YYYY-MM') acikca verilebilir;
        verilmezse `assessment_id` varsa ONUN doneminden turer; ikisi de yoksa
        NULL kalir (serbest odeme). Rapor `GET /dues/payments?donem=` ile
        serbest odemeleri de doneme atfedebilir.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DuesPaymentCreate" }
      responses:
        "201":
          description: Odeme kaydedildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DuesPayment" }
        "200":
          description: Idempotent tekrar — mevcut kayit
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DuesPayment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Ayni Idempotency-Key farkli govde ile gonderildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /me/dues:
    get:
      tags: [aidat]
      summary: Sakinin kendi dairelerinin borc durumu (resident)
      responses:
        "200":
          description: Borc durumu listesi
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/UnitDuesStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ================================================================= #
  # ODEME WEBHOOK (public ama imza-korumali)
  # ================================================================= #
  /webhooks/payments/{provider}:
    post:
      tags: [webhooks]
      summary: Saglayici odeme bildirimi (iyzico/paytr)
      description: |
        PUBLIC (token YOK) ama IMZA-KORUMALI. Saglayici ode​me sonucunu bildirir.
        Imza/hash provider secret ile dogrulanir; gecersizse 401 ve hicbir islem
        yapilmaz. provider_ref'ten tenant guvenli cozulur (SECURITY DEFINER).
        IDEMPOTENT (provider+event_id). Tutar (kurus) odeme ile karsilastirilir;
        uyusmazsa 400. Govde/imza formati saglayiciya ozeldir (iyzico: JSON +
        `x-iyz-signature` header; paytr: form-encoded + `hash` alani).
      security: []   # public; guvenlik imzayla saglanir
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string, enum: [iyzico, paytr] }
      requestBody:
        required: true
        content:
          application/json: { schema: { type: object } }
          application/x-www-form-urlencoded: { schema: { type: object } }
      responses:
        "200":
          description: Islendi (veya idempotent tekrar)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  durum: { $ref: "#/components/schemas/DuesDurum" }
        "400":
          description: Tutar uyusmazligi / gecersiz govde
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Imza gecersiz
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "404":
          description: Saglayici/odeme referansi bulunamadi
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

  # ================================================================= #
  # USERS (personel + sakin yonetimi) — admin
  # ================================================================= #
  /users:
    get:
      tags: [users]
      summary: Kullanici listesi (admin)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: role
          in: query
          schema: { $ref: "#/components/schemas/UserRole" }
        - name: is_active
          in: query
          schema: { type: boolean }
        - name: q
          in: query
          description: Ad/email icinde arama (opsiyonel)
          schema: { type: string }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [users]
      summary: Kullanici olustur (admin)
      description: |
        Her rol (admin/yonetici/security/tesis_gorevlisi/resident) olusturulabilir. parola bcrypt ile
        hash'lenir; password_hash YANITTA donmez. email tenant icinde benzersiz.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: email bu tenant'ta zaten kayitli
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "422": { $ref: "#/components/responses/ValidationError" }

  /users/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [users]
      summary: Kullanici detay (admin)
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [users]
      summary: Kullanici guncelle (admin)
      description: |
        ad/telefon/role/is_active ve opsiyonel email/parola. parola verilirse yeniden
        hash'lenir. Kullanici SILINMEZ; pasiflestirme icin is_active=false kullanin.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: email bu tenant'ta zaten kayitli
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "422": { $ref: "#/components/responses/ValidationError" }

# =================================================================== #
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token. `Authorization: Bearer <token>`. Bkz. /contracts/auth.md"

  parameters:
    Limit:
      name: limit
      in: query
      description: Sayfa boyutu (varsayilan 50, max 200)
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    Offset:
      name: offset
      in: query
      description: Atlanan kayit sayisi
      schema: { type: integer, minimum: 0, default: 0 }
    PathId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Istemci tarafindan uretilen benzersiz anahtar (UUID onerilir)
      schema: { type: string, minLength: 8, maxLength: 200 }

  responses:
    BadRequest:
      description: Gecersiz istek
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Kimlik dogrulama gerekli / gecersiz token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Rol bu islem icin yetkili degil
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Kayit bulunamadi (tenant kapsaminda)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Cakisma (benzersizlik / iliskili kayit)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Govde dogrulama hatasi
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RateLimited:
      description: Cok fazla istek
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    # ---------------------------- ortak ---------------------------- #
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Makine-okunabilir hata kodu
              example: validation_error
            message:
              type: string
              description: Insan-okunabilir aciklama
              example: "baslangic_saat bitis_saat'ten once olmali"
            details:
              type: array
              description: Alan bazli dogrulama hatalari (opsiyonel)
              items:
                type: object
                properties:
                  field: { type: string }
                  message: { type: string }

    Page:
      type: object
      required: [meta]
      properties:
        meta: { $ref: "#/components/schemas/PageMeta" }

    PageMeta:
      type: object
      required: [limit, offset, total]
      properties:
        limit: { type: integer, example: 50 }
        offset: { type: integer, example: 0 }
        total:
          type: integer
          description: Filtreye uyan toplam kayit sayisi
          example: 137

    GunTipi:
      type: string
      enum: [her_gun, hafta_ici, hafta_sonu, resmi_tatil]

    UserRole:
      type: string
      enum: [admin, yonetici, security, tesis_gorevlisi, resident]

    # --------------------------- devices --------------------------- #
    DevicePlatform:
      type: string
      enum: [android, ios, web]
    DeviceRegister:
      type: object
      required: [fcm_token, platform]
      properties:
        fcm_token: { type: string }
        platform: { $ref: "#/components/schemas/DevicePlatform" }
    Device:
      type: object
      required: [id, user_id, fcm_token, platform, aktif, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        fcm_token: { type: string }
        platform: { $ref: "#/components/schemas/DevicePlatform" }
        aktif: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # password_hash ASLA donmez (guvenlik).
    User:
      type: object
      required: [id, ad, email, role, is_active, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string }
        email: { type: string, format: email }
        telefon: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/UserRole" }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
    UserCreate:
      type: object
      required: [ad, email, role, password]
      properties:
        ad: { type: string }
        email: { type: string, format: email }
        telefon: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/UserRole" }
        password: { type: string, format: password, minLength: 8 }
    UserUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string }
        email: { type: string, format: email }
        telefon: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/UserRole" }
        is_active: { type: boolean }
        password: { type: string, format: password, minLength: 8 }

    PatrolWindowDurum:
      type: string
      enum: [bekliyor, tamamlandi, kacirildi]

    # ----------------------------- auth ---------------------------- #
    LoginRequest:
      type: object
      required: [tenant_slug, email, password]
      properties:
        tenant_slug:
          type: string
          description: |
            Tenant kisa adi (slug). email tenant-ici benzersiz oldugu icin login
            tenant'i bu alanla belirler. Sadece kucuk harf/rakam/tire.
          example: "acme-plaza"
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [Bearer], example: Bearer }
        expires_in:
          type: integer
          description: Access token gecerlilik suresi (saniye)
          example: 900

    # ---------------------------- shift ---------------------------- #
    Shift:
      type: object
      required: [id, ad, baslangic_saat, bitis_saat, gun_tipi, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string, example: "Gece Vardiyasi" }
        baslangic_saat:
          type: string
          description: "Gun-ici saat (HH:MM, tenant.timezone'a gore)"
          example: "00:00"
        bitis_saat:
          type: string
          description: "HH:MM. bitis < baslangic ise ertesi gune sarkar"
          example: "08:00"
        gun_tipi: { $ref: "#/components/schemas/GunTipi" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ShiftCreate:
      type: object
      required: [ad, baslangic_saat, bitis_saat]
      properties:
        ad: { type: string }
        baslangic_saat: { type: string, example: "00:00" }
        bitis_saat: { type: string, example: "08:00" }
        gun_tipi: { $ref: "#/components/schemas/GunTipi" }
    ShiftUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string }
        baslangic_saat: { type: string }
        bitis_saat: { type: string }
        gun_tipi: { $ref: "#/components/schemas/GunTipi" }

    # -------------------------- checkpoint ------------------------- #
    Checkpoint:
      type: object
      required: [id, ad, nfc_tag_uid, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string, example: "A Blok Giris" }
        nfc_tag_uid: { type: string, example: "04:A3:B2:C1:90:00" }
        gps_lat: { type: number, format: double, nullable: true, example: 41.015137 }
        gps_lng: { type: number, format: double, nullable: true, example: 28.979530 }
        aktif: { type: boolean }
        sdm_aktif:
          type: boolean
          description: "NTAG424 SDM anahtari kayitli mi (anahtarin kendisi ASLA donmez)"
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CheckpointCreate:
      type: object
      required: [ad, nfc_tag_uid]
      properties:
        ad: { type: string }
        nfc_tag_uid: { type: string }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        aktif: { type: boolean, default: true }
    CheckpointUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string }
        nfc_tag_uid: { type: string }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        aktif: { type: boolean }

    # -------------------------- patrol plan ------------------------ #
    PatrolPlan:
      type: object
      required: [id, ad, baslangic_saat, bitis_saat, periyot_dakika, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string, example: "Gece Devriyesi" }
        shift_id: { type: string, format: uuid, nullable: true }
        baslangic_saat:
          type: string
          description: "HH:MM, tenant.timezone'a gore (orn 00:00)"
          example: "00:00"
        bitis_saat:
          type: string
          example: "06:00"
        periyot_dakika:
          type: integer
          minimum: 1
          description: "Pencere periyodu (orn 60 => saat basi)"
          example: 60
        aktif: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    PatrolPlanDetail:
      allOf:
        - $ref: "#/components/schemas/PatrolPlan"
        - type: object
          properties:
            checkpoints:
              type: array
              items: { $ref: "#/components/schemas/PatrolPlanCheckpoint" }
    PatrolPlanCreate:
      type: object
      required: [ad, baslangic_saat, bitis_saat, periyot_dakika]
      properties:
        ad: { type: string }
        shift_id: { type: string, format: uuid, nullable: true }
        baslangic_saat: { type: string, example: "00:00" }
        bitis_saat: { type: string, example: "06:00" }
        periyot_dakika: { type: integer, minimum: 1, example: 60 }
        aktif: { type: boolean, default: true }
    PatrolPlanUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string }
        shift_id: { type: string, format: uuid, nullable: true }
        baslangic_saat: { type: string }
        bitis_saat: { type: string }
        periyot_dakika: { type: integer, minimum: 1 }
        aktif: { type: boolean }

    PatrolPlanCheckpoint:
      type: object
      required: [checkpoint_id, sira]
      properties:
        checkpoint_id: { type: string, format: uuid }
        sira: { type: integer, minimum: 0, example: 0 }
        checkpoint:
          allOf:
            - $ref: "#/components/schemas/Checkpoint"
          nullable: true
          description: "Detay yanitlarinda genisletilmis checkpoint (opsiyonel)"
    PatrolPlanCheckpointAssign:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [checkpoint_id]
            properties:
              checkpoint_id: { type: string, format: uuid }
              sira:
                type: integer
                minimum: 0
                description: "Verilmezse dizi index'i kullanilir"

    # ---------------------------- scans ---------------------------- #
    ScanCreate:
      type: object
      required: [nfc_tag_uid, okutma_zamani]
      properties:
        nfc_tag_uid:
          type: string
          description: "Okutulan NFC etiketi; backend checkpoint'e eslestirir"
          example: "04:A3:B2:C1:90:00"
        checkpoint_id:
          type: string
          format: uuid
          nullable: true
          description: "Istemci biliyorsa; yoksa nfc_tag_uid ile cozumlenir"
        patrol_window_id:
          type: string
          format: uuid
          nullable: true
          description: "Ad-hoc okutmada bos birakilabilir; backend de eslestirebilir"
        okutma_zamani:
          type: string
          format: date-time
          description: "Cihazin okuttugu an (UTC). Offline gecikmeli gonderilebilir."
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        foto_url:
          type: string
          nullable: true
          description: "Onceden yuklenmis fotografin URL'i"
        imza_dogrulandi:
          type: boolean
          default: false
          deprecated: true
          description: >-
            DEPRECATED + YOK SAYILIR: deger artik SUNUCUDA NTAG424 SDM
            dogrulamasiyla hesaplanir; govdedeki girdi etkisizdir (eski mobil
            surumler kirilmaz). SDM icin sdm_picc_data + sdm_cmac gonderin.
        sdm_picc_data:
          type: string
          nullable: true
          minLength: 32
          maxLength: 32
          description: "NTAG424 SDM ENCPICCData (16B, hex) — etiketin NDEF ciktisindan"
          example: "EF963FF7828658A599F3041510671E88"
        sdm_cmac:
          type: string
          nullable: true
          minLength: 16
          maxLength: 16
          description: "NTAG424 SDMMAC (8B, hex) — sdm_picc_data ile BIRLIKTE gonderilir"
          example: "94EED9EE65337086"
    ScanEvent:
      type: object
      required: [id, guard_id, checkpoint_id, nfc_tag_uid, okutma_zamani, imza_dogrulandi, created_at]
      properties:
        id: { type: string, format: uuid }
        guard_id:
          type: string
          format: uuid
          description: "Token'dan turetilir (okutmayi yapan kullanici)"
        checkpoint_id: { type: string, format: uuid }
        patrol_window_id: { type: string, format: uuid, nullable: true }
        nfc_tag_uid: { type: string }
        okutma_zamani: { type: string, format: date-time }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        foto_url: { type: string, nullable: true }
        imza_dogrulandi:
          type: boolean
          description: "SUNUCU hesaplar: NTAG424 SDM dogrulamasi gecerliyse true"
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }

    # -------------------------- dashboard -------------------------- #
    DashboardLive:
      type: object
      required: [generated_at, aktif_turlar, son_alarmlar]
      properties:
        generated_at: { type: string, format: date-time }
        aktif_turlar:
          type: array
          items: { $ref: "#/components/schemas/AktifTur" }
        son_alarmlar:
          type: array
          items: { $ref: "#/components/schemas/Alarm" }
    AktifTur:
      type: object
      required: [patrol_window_id, patrol_plan_id, pencere_baslangic, pencere_bitis, durum]
      properties:
        patrol_window_id: { type: string, format: uuid }
        patrol_plan_id: { type: string, format: uuid }
        patrol_plan_ad: { type: string }
        pencere_baslangic: { type: string, format: date-time }
        pencere_bitis: { type: string, format: date-time }
        durum: { $ref: "#/components/schemas/PatrolWindowDurum" }
        beklenen_checkpoint_sayisi: { type: integer }
        okutulan_checkpoint_sayisi: { type: integer }
    # Tur penceresi gecmisi (GET /patrol-windows ogesi).
    PatrolWindowHistory:
      type: object
      required:
        [id, patrol_plan_id, pencere_baslangic, pencere_bitis, durum,
         beklenen_checkpoint_sayisi, okutulan_checkpoint_sayisi]
      properties:
        id: { type: string, format: uuid }
        patrol_plan_id: { type: string, format: uuid }
        plan_adi: { type: string, nullable: true }
        pencere_baslangic: { type: string, format: date-time }
        pencere_bitis: { type: string, format: date-time }
        durum: { $ref: "#/components/schemas/PatrolWindowDurum" }
        beklenen_checkpoint_sayisi: { type: integer }
        okutulan_checkpoint_sayisi: { type: integer }
    PatrolWindowOzet:
      type: object
      required: [toplam, tamamlandi, kacirildi, bekliyor]
      description: "Filtrelenmis TUM kume uzerinden sayilar (sayfa ile sinirli degil)."
      properties:
        toplam: { type: integer }
        tamamlandi: { type: integer }
        kacirildi: { type: integer }
        bekliyor: { type: integer }
    # GET /me/patrol-window — aktif pencere + checkpoint bazinda okutma durumu.
    MePatrolCheckpoint:
      type: object
      required: [checkpoint_id, ad, sira, okutuldu]
      properties:
        checkpoint_id: { type: string, format: uuid }
        ad: { type: string }
        sira: { type: integer }
        okutuldu:
          type: boolean
          description: "PENCERE-GENELI: herhangi bir elemanin pencere araligindaki okutmasi sayilir."
        okutma_zamani:
          type: string
          format: date-time
          nullable: true
          description: "Penceredeki ILK scan'in zamani (okutulmadiysa null)."
        okutan_user_id:
          type: string
          format: uuid
          nullable: true
          description: "Penceredeki ILK scan'i yapan kullanici (okutulmadiysa null)."
    MePatrolWindowInfo:
      type: object
      required: [id, patrol_plan_id, pencere_baslangic, pencere_bitis, durum]
      properties:
        id: { type: string, format: uuid }
        patrol_plan_id: { type: string, format: uuid }
        plan_adi: { type: string, nullable: true }
        pencere_baslangic: { type: string, format: date-time }
        pencere_bitis: { type: string, format: date-time }
        durum: { $ref: "#/components/schemas/PatrolWindowDurum" }
    MePatrolWindowItem:
      allOf:
        - $ref: "#/components/schemas/MePatrolWindowInfo"
        - type: object
          required: [checkpoints]
          properties:
            checkpoints:
              type: array
              description: "Plana atanmis AKTIF checkpoint'ler, sira ASC."
              items: { $ref: "#/components/schemas/MePatrolCheckpoint" }
    MePatrolWindowResponse:
      type: object
      required: [generated_at, window, checkpoints, windows]
      properties:
        generated_at: { type: string, format: date-time }
        window:
          nullable: true
          description: "Bitisi en yakin aktif pencere; aktif pencere yoksa null."
          allOf:
            - $ref: "#/components/schemas/MePatrolWindowInfo"
        checkpoints:
          type: array
          description: "window'un checkpoint listesi; window null ise []."
          items: { $ref: "#/components/schemas/MePatrolCheckpoint" }
        windows:
          type: array
          description: "TUM aktif pencereler (pencere_bitis ASC); genelde 0-1 eleman."
          items: { $ref: "#/components/schemas/MePatrolWindowItem" }
    Alarm:
      type: object
      required: [tip, olusma_zamani, mesaj]
      properties:
        tip:
          type: string
          enum: [kacirilan_tur, eksik_checkpoint, gecikmis_okutma, acil_durum]
          example: kacirilan_tur
        olusma_zamani: { type: string, format: date-time }
        mesaj: { type: string }
        patrol_window_id: { type: string, format: uuid, nullable: true }
        checkpoint_id: { type: string, format: uuid, nullable: true }

    # ------------------------- notifications ----------------------- #
    Announcement:
      type: object
      required: [id, baslik, govde, olusturan_user_id, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        baslik: { type: string, maxLength: 200 }
        govde: { type: string, maxLength: 5000 }
        foto_key:
          type: string
          nullable: true
          description: Opsiyonel gorsel — /uploads/presign ile alinan obje anahtari
        foto_url:
          type: string
          nullable: true
          description: Goruntuleme icin kisa omurlu presigned GET URL (foto_key varsa)
        olusturan_user_id: { type: string, format: uuid }
        olusturan_ad:
          type: string
          nullable: true
          description: Gonderen kullanicinin adi (liste/detayda join ile)
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AnnouncementCreate:
      type: object
      required: [baslik, govde]
      properties:
        baslik: { type: string, minLength: 1, maxLength: 200 }
        govde: { type: string, minLength: 1, maxLength: 5000 }
        foto_key:
          type: string
          nullable: true
          description: "Opsiyonel gorsel: once /uploads/presign ile alinan obje anahtari"
    AnnouncementUpdate:
      type: object
      properties:
        baslik: { type: string, minLength: 1, maxLength: 200 }
        govde: { type: string, minLength: 1, maxLength: 5000 }
        foto_key:
          type: string
          nullable: true
          description: Acikca null gonderilirse gorsel kaldirilir; alan yoksa dokunulmaz

    Complaint:
      type: object
      required: [id, acan_user_id, baslik, mesaj, durum, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        acan_user_id: { type: string, format: uuid }
        acan_ad:
          type: string
          nullable: true
          description: Acan sakinin adi (yonetim listesinde join ile)
        baslik: { type: string, maxLength: 200 }
        mesaj: { type: string, maxLength: 5000 }
        foto_key:
          type: string
          nullable: true
          description: Opsiyonel gorsel — /uploads/presign ile alinan obje anahtari
        foto_url:
          type: string
          nullable: true
          description: Goruntuleme icin kisa omurlu presigned GET URL (foto_key varsa)
        durum: { type: string, enum: [acik, inceleniyor, cozuldu] }
        yonetici_yaniti: { type: string, nullable: true, maxLength: 5000 }
        yanitlayan_user_id: { type: string, format: uuid, nullable: true }
        yanit_zamani: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ComplaintCreate:
      type: object
      required: [baslik, mesaj]
      properties:
        baslik: { type: string, minLength: 1, maxLength: 200 }
        mesaj: { type: string, minLength: 1, maxLength: 5000 }
        foto_key:
          type: string
          nullable: true
          description: "Opsiyonel gorsel: once /uploads/presign ile alinan obje anahtari"
    ComplaintUpdate:
      type: object
      description: En az bir alan gerekli (bos govde 422)
      properties:
        durum: { type: string, enum: [acik, inceleniyor, cozuldu] }
        yonetici_yaniti: { type: string, minLength: 1, maxLength: 5000 }

    Notification:
      type: object
      required: [id, tip, mesaj, okundu, created_at]
      properties:
        id: { type: string, format: uuid }
        tip:
          type: string
          enum: [kacirilan_tur, eksik_checkpoint, gecikmis_okutma]
          example: kacirilan_tur
        patrol_window_id: { type: string, format: uuid, nullable: true }
        patrol_plan_id: { type: string, format: uuid, nullable: true }
        checkpoint_id: { type: string, format: uuid, nullable: true }
        task_id: { type: string, format: uuid, nullable: true }
        mesaj: { type: string }
        okundu: { type: boolean }
        created_at: { type: string, format: date-time }
    NotificationUpdate:
      type: object
      required: [okundu]
      properties:
        okundu: { type: boolean }

    # ----------------------------- tasks --------------------------- #
    TaskTip:
      type: string
      enum: [temizlik, kontrol, ilaclama, bakim, peyzaj, diger]
    Task:
      type: object
      required: [id, tip, ad, foto_zorunlu, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        tip: { $ref: "#/components/schemas/TaskTip" }
        ad: { type: string, example: "Cop toplama" }
        aciklama: { type: string, nullable: true }
        atanan_user_id: { type: string, format: uuid, nullable: true }
        checkpoint_id: { type: string, format: uuid, nullable: true }
        periyot_dakika:
          type: integer
          minimum: 1
          nullable: true
          description: "Tekrar araligi (dakika); tek seferlikse null"
        sonraki_planlanan:
          type: string
          format: date-time
          nullable: true
          description: "Bir sonraki planlanan an (UTC); peyzaj takvimi. Tamamlaninca ilerler."
        foto_zorunlu:
          type: boolean
          description: "true ise completion foto_key olmadan kabul edilmez (422) — mobil §11 #2"
        aktif: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    TaskCreate:
      type: object
      required: [tip, ad]
      properties:
        tip: { $ref: "#/components/schemas/TaskTip" }
        ad: { type: string }
        aciklama: { type: string, nullable: true }
        atanan_user_id: { type: string, format: uuid, nullable: true }
        checkpoint_id: { type: string, format: uuid, nullable: true }
        periyot_dakika: { type: integer, minimum: 1, nullable: true }
        sonraki_planlanan: { type: string, format: date-time, nullable: true }
        foto_zorunlu: { type: boolean, default: false }
        aktif: { type: boolean, default: true }
    TaskUpdate:
      type: object
      minProperties: 1
      properties:
        tip: { $ref: "#/components/schemas/TaskTip" }
        ad: { type: string }
        aciklama: { type: string, nullable: true }
        atanan_user_id: { type: string, format: uuid, nullable: true }
        checkpoint_id: { type: string, format: uuid, nullable: true }
        periyot_dakika: { type: integer, minimum: 1, nullable: true }
        sonraki_planlanan: { type: string, format: date-time, nullable: true }
        foto_zorunlu: { type: boolean }
        aktif: { type: boolean }

    TaskCompletion:
      type: object
      required: [id, task_id, tamamlayan_user_id, tamamlanma_zamani, idempotency_key, created_at]
      properties:
        id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        tamamlayan_user_id:
          type: string
          format: uuid
          description: "Token'dan turetilir"
        tamamlanma_zamani: { type: string, format: date-time }
        nfc_tag_uid: { type: string, nullable: true }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        foto_key: { type: string, nullable: true }
        foto_url: { type: string, nullable: true }
        notlar: { type: string, nullable: true }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }
    # Capraz-gorev tamamlama gecmisi ogesi (GET /task-completions). foto_url/gps
    # YOK; kanit varligi foto_var/nfc_dogrulandi bool olarak yeter.
    TaskCompletionHistory:
      type: object
      required:
        [id, task_id, tip, tamamlayan_user_id, tamamlanma_zamani, foto_var, nfc_dogrulandi]
      properties:
        id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        task_adi: { type: string, nullable: true }
        tip: { $ref: "#/components/schemas/TaskTip" }
        tamamlayan_user_id: { type: string, format: uuid }
        tamamlanma_zamani: { type: string, format: date-time }
        foto_var: { type: boolean, description: "foto_key dolu mu" }
        nfc_dogrulandi: { type: boolean, description: "nfc_tag_uid okutuldu mu" }
        notlar: { type: string, nullable: true }
    TaskCompletionOzet:
      type: object
      required: [toplam, temizlik, kontrol, ilaclama, peyzaj]
      description: |
        Filtrelenmis TUM kume uzerinden. `toplam` her tipi sayar; ayrik alanlar
        ana tip dagilimidir (bakim/diger toplama dahil, ayrica kirilmaz).
      properties:
        toplam: { type: integer }
        temizlik: { type: integer }
        kontrol: { type: integer }
        ilaclama: { type: integer }
        peyzaj: { type: integer }
    TaskCompletionCreate:
      type: object
      required: [tamamlanma_zamani]
      properties:
        tamamlanma_zamani: { type: string, format: date-time }
        nfc_tag_uid:
          type: string
          nullable: true
          description: "Verilirse task.checkpoint_id'nin nfc'si ile eslesmeli"
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        foto_key:
          type: string
          nullable: true
          description: "Once /uploads/presign ile alinan obje anahtari"
        notlar: { type: string, nullable: true }

    # ---------------------------- uploads -------------------------- #
    PresignRequest:
      type: object
      required: [content_type]
      properties:
        content_type:
          type: string
          example: "image/jpeg"
          description: "Yuklenecek dosyanin MIME tipi"
        dosya_adi:
          type: string
          nullable: true
          description: "Opsiyonel; uzanti foto_key icin kullanilabilir"
    PresignResponse:
      type: object
      required: [foto_key, upload_url, method, expires_in]
      properties:
        foto_key:
          type: string
          description: "Completion'da gonderilecek obje anahtari (tenant ile namespace'li)"
        upload_url:
          type: string
          description: "Presigned PUT URL — istemci dosyayi buraya PUT eder"
        method: { type: string, enum: [PUT], example: PUT }
        expires_in:
          type: integer
          description: "URL gecerlilik suresi (saniye)"
          example: 900

    # ---------------------------- assets --------------------------- #
    AssetKategori:
      type: string
      enum: [ekipman, arac, alet, diger]
    AssetDurum:
      type: string
      enum: [musait, zimmetli, bakimda]
    Asset:
      type: object
      required: [id, ad, durum, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string, example: "Cim bicme makinesi" }
        kategori: { $ref: "#/components/schemas/AssetKategori" }
        nfc_tag_uid: { type: string, nullable: true }
        durum: { $ref: "#/components/schemas/AssetDurum" }
        aciklama: { type: string, nullable: true }
        aktif: { type: boolean }
        acik_zimmet:
          nullable: true
          allOf: [{ $ref: "#/components/schemas/AcikZimmet" }]
          description: "Acik zimmet ozeti; zimmetli degilse null (mobil §13 #2/#5)"
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AcikZimmet:
      type: object
      required: [alan_user_id, alan_user_ad, alinma_zamani]
      properties:
        alan_user_id: { type: string, format: uuid }
        alan_user_ad: { type: string, example: "Guard A" }
        alinma_zamani: { type: string, format: date-time }
    AssetCreate:
      type: object
      required: [ad]
      properties:
        ad: { type: string }
        kategori: { $ref: "#/components/schemas/AssetKategori" }
        nfc_tag_uid: { type: string, nullable: true }
        aciklama: { type: string, nullable: true }
        aktif: { type: boolean, default: true }
    AssetUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string }
        kategori: { $ref: "#/components/schemas/AssetKategori" }
        nfc_tag_uid: { type: string, nullable: true }
        durum: { $ref: "#/components/schemas/AssetDurum" }
        aciklama: { type: string, nullable: true }
        aktif: { type: boolean }

    AssetCheckout:
      type: object
      required: [id, asset_id, alan_user_id, alma_zamani, idempotency_key, created_at]
      properties:
        id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        alan_user_id:
          type: string
          format: uuid
          description: "Token'dan turetilir (alan kullanici)"
        alan_user_ad:
          type: string
          nullable: true
          description: "Alan kullanicinin adi (id + ad birlikte; mobil §13 #5)"
        birakan_user_id:
          type: string
          format: uuid
          nullable: true
          description: "Zimmeti kapatan (sahibi veya admin); acik zimmette NULL"
        birakan_user_ad:
          type: string
          nullable: true
          description: "Birakan kullanicinin adi (id + ad birlikte)"
        alma_zamani: { type: string, format: date-time }
        birakma_zamani:
          type: string
          format: date-time
          nullable: true
          description: "NULL => hala uzerinde (acik zimmet)"
        alma_nfc_tag_uid: { type: string, nullable: true }
        birakma_nfc_tag_uid: { type: string, nullable: true }
        alma_gps_lat: { type: number, format: double, nullable: true }
        alma_gps_lng: { type: number, format: double, nullable: true }
        birakma_gps_lat: { type: number, format: double, nullable: true }
        birakma_gps_lng: { type: number, format: double, nullable: true }
        notlar: { type: string, nullable: true }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }
    CheckoutRequest:
      type: object
      properties:
        nfc_tag_uid:
          type: string
          nullable: true
          description: "Okutulan etiket; verilirse asset.nfc_tag_uid ile eslesmeli"
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        notlar: { type: string, nullable: true }
    CheckinRequest:
      type: object
      properties:
        nfc_tag_uid:
          type: string
          nullable: true
          description: "Okutulan etiket; verilirse asset.nfc_tag_uid ile eslesmeli"
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        notlar: { type: string, nullable: true }

    # --------------------------- emergency ------------------------- #
    EmergencyDurum:
      type: string
      enum: [acik, cozuldu]
    EmergencyAlert:
      type: object
      required: [id, tetikleyen_user_id, tetiklenme_zamani, durum, idempotency_key, created_at]
      properties:
        id: { type: string, format: uuid }
        tetikleyen_user_id:
          type: string
          format: uuid
          description: "Token'dan turetilir (tetikleyen)"
        tetiklenme_zamani: { type: string, format: date-time }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        durum: { $ref: "#/components/schemas/EmergencyDurum" }
        cozen_user_id: { type: string, format: uuid, nullable: true }
        cozulme_zamani: { type: string, format: date-time, nullable: true }
        notlar: { type: string, nullable: true }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }
    EmergencyCreate:
      type: object
      properties:
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        notlar: { type: string, nullable: true }
    EmergencyResolve:
      type: object
      properties:
        notlar: { type: string, nullable: true }

    # ------------------------ tenant settings ---------------------- #
    TenantSettings:
      type: object
      required: [tenant_id, ad, slug, timezone]
      properties:
        tenant_id: { type: string, format: uuid }
        ad: { type: string }
        slug: { type: string }
        timezone: { type: string }
        acil_durum_telefon:
          type: string
          nullable: true
          description: "Acil durumda mobilin arayacagi yonetim numarasi (tel:)"
    TenantSettingsUpdate:
      type: object
      minProperties: 1
      properties:
        acil_durum_telefon: { type: string, nullable: true }
        timezone: { type: string }
        ad: { type: string }

    # ----------------------------- aidat --------------------------- #
    ResidentRol:
      type: string
      enum: [malik, kiraci]
    DuesYontem:
      type: string
      enum: [elden, havale, kart, diger]
    DuesDurum:
      type: string
      enum: [basarili, bekliyor, iptal]

    Unit:
      type: object
      required: [id, no, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        no: { type: string, example: "A-12" }
        blok: { type: string, nullable: true }
        metrekare: { type: number, format: double, nullable: true }
        aktif: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    UnitCreate:
      type: object
      required: [no]
      properties:
        no: { type: string }
        blok: { type: string, nullable: true }
        metrekare: { type: number, format: double, nullable: true }
        aktif: { type: boolean, default: true }
    UnitUpdate:
      type: object
      minProperties: 1
      properties:
        no: { type: string }
        blok: { type: string, nullable: true }
        metrekare: { type: number, format: double, nullable: true }
        aktif: { type: boolean }

    UnitResident:
      type: object
      required: [id, unit_id, user_id]
      properties:
        id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        rol_tipi: { $ref: "#/components/schemas/ResidentRol" }
        baslangic: { type: string, format: date-time, nullable: true }
        bitis: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    ResidentAssign:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid
          description: "role=resident bir app_user (ayni tenant)"
        rol_tipi: { $ref: "#/components/schemas/ResidentRol" }
        baslangic: { type: string, format: date-time, nullable: true }

    DuesAssessment:
      type: object
      required: [id, unit_id, donem, tutar_kurus, created_at]
      properties:
        id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid }
        donem: { type: string, example: "2026-06" }
        tutar_kurus:
          type: integer
          minimum: 1
          description: "KURUS (minor units); para asla float degil"
        son_odeme_tarihi: { type: string, format: date, nullable: true }
        aciklama: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
    DuesAssessmentCreate:
      type: object
      required: [donem, tutar_kurus]
      properties:
        unit_id:
          type: string
          format: uuid
          nullable: true
          description: "Verilirse TEK daire; yoksa toplu"
        unit_ids:
          type: array
          nullable: true
          description: "Toplu modda hedef daireler; yoksa tum aktif daireler"
          items: { type: string, format: uuid }
        donem: { type: string, example: "2026-06" }
        tutar_kurus: { type: integer, minimum: 1 }
        son_odeme_tarihi: { type: string, format: date, nullable: true }
        aciklama: { type: string, nullable: true }
    DuesAssessmentResult:
      type: object
      required: [created, atlanan]
      properties:
        created:
          type: array
          items: { $ref: "#/components/schemas/DuesAssessment" }
        atlanan:
          type: integer
          description: "Zaten var olan (donem) tahakkuk sayisi (toplu modda atlanan)"

    DuesPayment:
      type: object
      required: [id, unit_id, tutar_kurus, odeme_zamani, yontem, durum, kaydeden_user_id, idempotency_key, created_at]
      properties:
        id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid }
        assessment_id: { type: string, format: uuid, nullable: true }
        tutar_kurus: { type: integer, minimum: 1 }
        odeme_zamani: { type: string, format: date-time }
        donem:
          type: string
          nullable: true
          example: "2026-06"
          description: "Odemenin atfedildigi donem; serbest odemede NULL olabilir"
        yontem: { $ref: "#/components/schemas/DuesYontem" }
        durum: { $ref: "#/components/schemas/DuesDurum" }
        makbuz_no: { type: string, nullable: true }
        provider: { type: string, nullable: true, description: "manual|iyzico|paytr" }
        provider_ref: { type: string, nullable: true, description: "Saglayici referansi (webhook bunu kullanir)" }
        odeme_url:
          type: string
          nullable: true
          description: "Yalniz kart akisi init yanitinda: saglayici odeme sayfasi URL'i (kalici degil)"
        kaydeden_user_id: { type: string, format: uuid }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }
    DuesPaymentCreate:
      type: object
      required: [unit_id, tutar_kurus, yontem]
      properties:
        unit_id: { type: string, format: uuid }
        assessment_id: { type: string, format: uuid, nullable: true }
        tutar_kurus: { type: integer, minimum: 1 }
        yontem: { $ref: "#/components/schemas/DuesYontem" }
        makbuz_no: { type: string, nullable: true }
        odeme_zamani:
          type: string
          format: date-time
          nullable: true
          description: "Verilmezse sunucu now()"
        donem:
          type: string
          nullable: true
          example: "2026-06"
          description: "Verilmezse assessment'tan turer; o da yoksa NULL kalir"

    UnitDuesStatus:
      type: object
      required: [unit_id, no, toplam_tahakkuk_kurus, toplam_odenen_kurus, bakiye_kurus]
      properties:
        unit_id: { type: string, format: uuid }
        no: { type: string }
        toplam_tahakkuk_kurus: { type: integer }
        toplam_odenen_kurus:
          type: integer
          description: "Yalniz durum='basarili' odemeler"
        bakiye_kurus:
          type: integer
          description: "toplam_tahakkuk - toplam_odenen (pozitif = borc)"
        assessments:
          type: array
          items: { $ref: "#/components/schemas/DuesAssessment" }
        payments:
          type: array
          items: { $ref: "#/components/schemas/DuesPayment" }
