openapi: 3.0.3
info:
  title: Tesis Guvenlik & Operasyon API
  version: "0.1.0"
  description: |
    Multi-tenant tesis guvenlik & operasyon SaaS — v0 sozlesmesi.
    Backend (FastAPI) ile Mobil (Flutter) ve Panel (Next.js) gelistiricilerinin
    paralel calismasi icin tek dogruluk kaynagidir.

    Konvansiyonlar (detay: /contracts/README.md):
      * Tum zamanlar ISO8601 UTC (`...Z`). tenant.timezone ile yorumlanir.
      * Hata zarfi: `{ "error": { "code": "...", "message": "..." } }`.
      * Sayfalama: `limit` (varsayilan 50, max 200) + `offset`. Liste yanitlari
        `PageMeta` icerir.
      * Auth: JWT Bearer (bkz. /contracts/auth.md). Tenant her zaman token'dan
        cikarilir — istemci tenant_id gondermez/secemez.
      * `POST /scans` icin `Idempotency-Key` header zorunlu.

servers:
  # NOT: base path /v0 KALDIRILDI — gercek backend endpoint'leri /v0 ONEKI OLMADAN
  # sunuyor (orn. /auth/login, /scans). Base = host:port.
  - url: https://api.example.com
    description: production
  - url: http://localhost:8000
    description: yerel gelistirme

tags:
  - name: auth
  - name: shifts
  - name: checkpoints
  - name: patrol-plans
  - name: scans
  - name: dashboard

security:
  - bearerAuth: []

paths:
  # ================================================================= #
  # AUTH
  # ================================================================= #
  /auth/login:
    post:
      tags: [auth]
      summary: Email + parola ile giris
      security: []   # public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Basarili
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Hatali kimlik bilgisi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /auth/refresh:
    post:
      tags: [auth]
      summary: Refresh token ile yeni access (+rotated refresh) al
      security: []   # refresh token govdede tasinir
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Yeni token cifti
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Gecersiz / suresi dolmus / iptal edilmis refresh token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ================================================================= #
  # SHIFTS
  # ================================================================= #
  /shifts:
    get:
      tags: [shifts]
      summary: Vardiya listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: gun_tipi
          in: query
          schema: { $ref: "#/components/schemas/GunTipi" }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Shift" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [shifts]
      summary: Vardiya olustur
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ShiftCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Shift" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /shifts/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [shifts]
      summary: Vardiya detay
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Shift" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [shifts]
      summary: Vardiya guncelle (kismi)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ShiftUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Shift" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [shifts]
      summary: Vardiya sil
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  # ================================================================= #
  # CHECKPOINTS
  # ================================================================= #
  /checkpoints:
    get:
      tags: [checkpoints]
      summary: Checkpoint listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: aktif
          in: query
          schema: { type: boolean }
        - name: nfc_tag_uid
          in: query
          description: NFC etiket UID ile esleme/arama
          schema: { type: string }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Checkpoint" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [checkpoints]
      summary: Checkpoint olustur (nfc_tag_uid eslemesi dahil)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckpointCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkpoint" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: nfc_tag_uid bu tenant'ta zaten kayitli
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /checkpoints/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [checkpoints]
      summary: Checkpoint detay
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkpoint" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [checkpoints]
      summary: Checkpoint guncelle (kismi)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckpointUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkpoint" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [checkpoints]
      summary: Checkpoint sil
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  # ================================================================= #
  # PATROL PLANS
  # ================================================================= #
  /patrol-plans:
    get:
      tags: [patrol-plans]
      summary: Devriye plani listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: aktif
          in: query
          schema: { type: boolean }
        - name: shift_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/PatrolPlan" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [patrol-plans]
      summary: Devriye plani olustur
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatrolPlanCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PatrolPlan" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /patrol-plans/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [patrol-plans]
      summary: Devriye plani detay (checkpoint listesi dahil)
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PatrolPlanDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [patrol-plans]
      summary: Devriye plani guncelle (kismi)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatrolPlanUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PatrolPlan" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [patrol-plans]
      summary: Devriye plani sil
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /patrol-plans/{id}/checkpoints:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [patrol-plans]
      summary: Plana atanmis checkpoint listesi (sirali)
      responses:
        "200":
          description: Atanmis noktalar
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PatrolPlanCheckpoint" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [patrol-plans]
      summary: Plana checkpoint listesi ata (tam degisim / replace)
      description: |
        Gonderilen liste plani tamamen yeniden tanimlar (idempotent set-replace).
        Listedeki sira, gonderim sirasidir; `sira` alani opsiyoneldir, verilmezse
        dizideki index kullanilir.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatrolPlanCheckpointAssign" }
      responses:
        "200":
          description: Atama guncellendi
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PatrolPlanCheckpoint" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # SCANS  (mobil tur kaniti)
  # ================================================================= #
  /scans:
    post:
      tags: [scans]
      summary: Tur kaniti gonder (NFC okutma)
      description: |
        Mobil istemcinin checkpoint okutma kanitini gonderdigi endpoint.
        Offline kuyruktan cift gonderimi engellemek icin `Idempotency-Key`
        header'i ZORUNLUDUR. Ayni key ile ikinci istek 200 + ilk kaydi doner
        (yeni kayit olusturmaz).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScanCreate" }
      responses:
        "201":
          description: Kayit olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScanEvent" }
        "200":
          description: Idempotent tekrar — mevcut kayit donduruldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScanEvent" }
        "400":
          description: Idempotency-Key eksik veya gecersiz govde
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: nfc_tag_uid hicbir checkpoint ile eslesmedi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Ayni Idempotency-Key farkli govde ile gonderildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # DASHBOARD
  # ================================================================= #
  /dashboard/live:
    get:
      tags: [dashboard]
      summary: Canli panel — aktif turlar + son alarmlar
      description: |
        Panel (Next.js) icin ozet. Aktif/bekleyen patrol_window'lar ve son
        kacirilan turlardan turetilen alarmlar.
      parameters:
        - name: alarm_limit
          in: query
          description: Donulecek son alarm sayisi
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        "200":
          description: Canli ozet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardLive" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ================================================================= #
  # NOTIFICATIONS
  # ================================================================= #
  /notifications:
    get:
      tags: [notifications]
      summary: Bildirim listesi (kacirilan tur vb.)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: okundu
          in: query
          description: Okundu durumuna gore filtrele
          schema: { type: boolean }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Notification" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /notifications/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    patch:
      tags: [notifications]
      summary: Bildirimi okundu/okunmadi isaretle
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotificationUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Notification" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # TASKS (esnek gorev sistemi) + tamamlama + foto kanit
  # ================================================================= #
  /tasks:
    get:
      tags: [tasks]
      summary: Gorev listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: tip
          in: query
          schema: { $ref: "#/components/schemas/TaskTip" }
        - name: aktif
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Task" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [tasks]
      summary: Gorev olustur
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /tasks/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [tasks]
      summary: Gorev detay
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [tasks]
      summary: Gorev guncelle (kismi)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [tasks]
      summary: Gorev sil
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /tasks/{id}/completions:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [tasks]
      summary: Gorev tamamlama gecmisi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/TaskCompletion" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [tasks]
      summary: Gorevi tamamla (kanit gonder)
      description: |
        Idempotency-Key header ZORUNLU (offline cift gonderim korumasi, scan deseni).
        Foto icin: once POST /uploads/presign ile foto_key + PUT URL alinir, dosya
        dogrudan MinIO'ya yuklenir, sonra burada foto_key gonderilir.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCompletionCreate" }
      responses:
        "201":
          description: Tamamlama kaydedildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskCompletion" }
        "200":
          description: Idempotent tekrar — mevcut kayit
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskCompletion" }
        "400":
          description: Idempotency-Key eksik veya gecersiz govde
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Ayni Idempotency-Key farkli govde ile gonderildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /landscape/schedule:
    get:
      tags: [tasks]
      summary: Peyzaj bakim takvimi (yaklasan isler, sirali)
      description: |
        tip=peyzaj ve sonraki_planlanan dolu aktif gorevler, sonraki_planlanan'a
        gore ARTAN sirada. (Mevcut Task semasi yeniden kullanilir.)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Takvim
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Task" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /uploads/presign:
    post:
      tags: [uploads]
      summary: Foto yukleme icin presigned PUT URL uret
      description: |
        Backend foto_key uretir ve MinIO icin presigned PUT URL doner. Istemci
        dosyayi bu URL'e PUT eder, sonra foto_key'i ilgili completion'da gonderir.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PresignRequest" }
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PresignResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # ASSETS (demirbas envanteri) + zimmet (checkout/checkin)
  # ================================================================= #
  /assets:
    get:
      tags: [assets]
      summary: Demirbas listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: kategori
          in: query
          schema: { $ref: "#/components/schemas/AssetKategori" }
        - name: durum
          in: query
          schema: { $ref: "#/components/schemas/AssetDurum" }
        - name: aktif
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Asset" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [assets]
      summary: Demirbas olustur
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssetCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: nfc_tag_uid bu tenant'ta zaten kayitli
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /assets/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [assets]
      summary: Demirbas detay
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [assets]
      summary: Demirbas guncelle (kismi)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssetUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [assets]
      summary: Demirbas sil
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /assets/{id}/checkout:
    parameters:
      - $ref: "#/components/parameters/PathId"
    post:
      tags: [assets]
      summary: Demirbasi al (zimmetle)
      description: |
        Idempotency-Key ZORUNLU (scan deseni). nfc_tag_uid verilirse asset'in
        nfc'siyle eslesmeli. alan_user_id token'dan. Zaten zimmetliyse 409.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckoutRequest" }
      responses:
        "201":
          description: Zimmetlendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetCheckout" }
        "200":
          description: Idempotent tekrar — mevcut kayit
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetCheckout" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Demirbas zaten zimmetli (veya ayni key farkli govde)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /assets/{id}/checkin:
    parameters:
      - $ref: "#/components/parameters/PathId"
    post:
      tags: [assets]
      summary: Demirbasi birak (zimmeti kapat)
      description: |
        Acik zimmeti kapatir (birakma_zamani=now). Idempotency-Key ZORUNLU.
        nfc_tag_uid verilirse asset'in nfc'siyle eslesmeli. Acik zimmet yoksa 409.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckinRequest" }
      responses:
        "200":
          description: Birakildi (zimmet kapatildi / idempotent tekrar)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetCheckout" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Acik zimmet yok (demirbas zaten musait)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /assets/{id}/history:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [assets]
      summary: Demirbas zimmet gecmisi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Gecmis
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/AssetCheckout" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ================================================================= #
  # EMERGENCY (acil durum) + tenant settings (yonetim numarasi)
  # ================================================================= #
  /emergency:
    get:
      tags: [emergency]
      summary: Acil durum listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: durum
          in: query
          schema: { $ref: "#/components/schemas/EmergencyDurum" }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/EmergencyAlert" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [emergency]
      summary: Acil durum tetikle (panik butonu)
      description: |
        Idempotency-Key ZORUNLU (panik aninda mukerrer basim korumasi). tetikleyen
        token'dan. Alarm kaydi + yuksek oncelikli 'acil_durum' notification uretir.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmergencyCreate" }
      responses:
        "201":
          description: Alarm olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmergencyAlert" }
        "200":
          description: Idempotent tekrar — mevcut alarm
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmergencyAlert" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Ayni Idempotency-Key farkli govde ile gonderildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /emergency/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    patch:
      tags: [emergency]
      summary: Acil durumu coz
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmergencyResolve" }
      responses:
        "200":
          description: Cozuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmergencyAlert" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /tenant/settings:
    get:
      tags: [tenant]
      summary: Tenant ayarlari (acil durum yonetim numarasi dahil)
      description: "Mobil, acil durumda aranacak `acil_durum_telefon`'u buradan okur (tel: link)."
      responses:
        "200":
          description: Ayarlar
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantSettings" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    patch:
      tags: [tenant]
      summary: Tenant ayarlarini guncelle (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TenantSettingsUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantSettings" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # ================================================================= #
  # AIDAT — unit (daire) + sakin + tahakkuk + odeme
  # ================================================================= #
  /units:
    get:
      tags: [aidat]
      summary: Daire listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: blok
          in: query
          schema: { type: string }
        - name: aktif
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Unit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [aidat]
      summary: Daire olustur (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UnitCreate" }
      responses:
        "201":
          description: Olusturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Unit" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Daire no bu tesiste zaten kayitli
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /units/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [aidat]
      summary: Daire detay
      responses:
        "200":
          description: Detay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Unit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [aidat]
      summary: Daire guncelle (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UnitUpdate" }
      responses:
        "200":
          description: Guncellendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Unit" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [aidat]
      summary: Daire sil (admin)
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /units/{id}/residents:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [aidat]
      summary: Dairenin sakinleri
      responses:
        "200":
          description: Sakin listesi
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UnitResident" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [aidat]
      summary: Daireye sakin ata (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResidentAssign" }
      responses:
        "201":
          description: Atandi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnitResident" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /units/{id}/residents/{user_id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
      - name: user_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [aidat]
      summary: Sakini daireden cikar (bitis=now) (admin)
      responses:
        "204": { description: Cikarildi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /units/{id}/dues:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [aidat]
      summary: Dairenin borc durumu (tahakkuk - odeme = bakiye)
      responses:
        "200":
          description: Borc durumu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnitDuesStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /dues/assessments:
    get:
      tags: [aidat]
      summary: Tahakkuk listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: unit_id
          in: query
          schema: { type: string, format: uuid }
        - name: donem
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/DuesAssessment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [aidat]
      summary: Tahakkuk olustur (tek daire veya toplu donem) (admin)
      description: |
        `unit_id` verilirse TEK daire (ayni daire+donem ikinci kez → 409). `unit_id`
        yoksa TOPLU: `unit_ids` (verilmezse tum aktif daireler); mevcut donemler atlanir.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DuesAssessmentCreate" }
      responses:
        "201":
          description: "Olusturuldu (toplu modda created + atlanan)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DuesAssessmentResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Tek daire modunda ayni donem zaten var
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /dues/payments:
    get:
      tags: [aidat]
      summary: Odeme listesi
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: unit_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/DuesPayment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [aidat]
      summary: Manuel odeme kaydi (admin)
      description: |
        Gercek tahsilat YOK (soyut). Idempotency-Key ZORUNLU (cift kayit korumasi).
        kaydeden token'dan. Bakiye = toplam tahakkuk - basarili odemeler.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DuesPaymentCreate" }
      responses:
        "201":
          description: Odeme kaydedildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DuesPayment" }
        "200":
          description: Idempotent tekrar — mevcut kayit
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DuesPayment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Ayni Idempotency-Key farkli govde ile gonderildi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /me/dues:
    get:
      tags: [aidat]
      summary: Sakinin kendi dairelerinin borc durumu (resident)
      responses:
        "200":
          description: Borc durumu listesi
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/UnitDuesStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ================================================================= #
  # ODEME WEBHOOK (public ama imza-korumali)
  # ================================================================= #
  /webhooks/payments/{provider}:
    post:
      tags: [webhooks]
      summary: Saglayici odeme bildirimi (iyzico/paytr)
      description: |
        PUBLIC (token YOK) ama IMZA-KORUMALI. Saglayici ode​me sonucunu bildirir.
        Imza/hash provider secret ile dogrulanir; gecersizse 401 ve hicbir islem
        yapilmaz. provider_ref'ten tenant guvenli cozulur (SECURITY DEFINER).
        IDEMPOTENT (provider+event_id). Tutar (kurus) odeme ile karsilastirilir;
        uyusmazsa 400. Govde/imza formati saglayiciya ozeldir (iyzico: JSON +
        `x-iyz-signature` header; paytr: form-encoded + `hash` alani).
      security: []   # public; guvenlik imzayla saglanir
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string, enum: [iyzico, paytr] }
      requestBody:
        required: true
        content:
          application/json: { schema: { type: object } }
          application/x-www-form-urlencoded: { schema: { type: object } }
      responses:
        "200":
          description: Islendi (veya idempotent tekrar)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  durum: { $ref: "#/components/schemas/DuesDurum" }
        "400":
          description: Tutar uyusmazligi / gecersiz govde
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "401":
          description: Imza gecersiz
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "404":
          description: Saglayici/odeme referansi bulunamadi
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }

# =================================================================== #
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token. `Authorization: Bearer <token>`. Bkz. /contracts/auth.md"

  parameters:
    Limit:
      name: limit
      in: query
      description: Sayfa boyutu (varsayilan 50, max 200)
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    Offset:
      name: offset
      in: query
      description: Atlanan kayit sayisi
      schema: { type: integer, minimum: 0, default: 0 }
    PathId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Istemci tarafindan uretilen benzersiz anahtar (UUID onerilir)
      schema: { type: string, minLength: 8, maxLength: 200 }

  responses:
    BadRequest:
      description: Gecersiz istek
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Kimlik dogrulama gerekli / gecersiz token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Rol bu islem icin yetkili degil
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Kayit bulunamadi (tenant kapsaminda)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Cakisma (benzersizlik / iliskili kayit)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Govde dogrulama hatasi
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RateLimited:
      description: Cok fazla istek
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    # ---------------------------- ortak ---------------------------- #
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Makine-okunabilir hata kodu
              example: validation_error
            message:
              type: string
              description: Insan-okunabilir aciklama
              example: "baslangic_saat bitis_saat'ten once olmali"
            details:
              type: array
              description: Alan bazli dogrulama hatalari (opsiyonel)
              items:
                type: object
                properties:
                  field: { type: string }
                  message: { type: string }

    Page:
      type: object
      required: [meta]
      properties:
        meta: { $ref: "#/components/schemas/PageMeta" }

    PageMeta:
      type: object
      required: [limit, offset, total]
      properties:
        limit: { type: integer, example: 50 }
        offset: { type: integer, example: 0 }
        total:
          type: integer
          description: Filtreye uyan toplam kayit sayisi
          example: 137

    GunTipi:
      type: string
      enum: [her_gun, hafta_ici, hafta_sonu, resmi_tatil]

    UserRole:
      type: string
      enum: [admin, security, cleaning, resident]

    PatrolWindowDurum:
      type: string
      enum: [bekliyor, tamamlandi, kacirildi]

    # ----------------------------- auth ---------------------------- #
    LoginRequest:
      type: object
      required: [tenant_slug, email, password]
      properties:
        tenant_slug:
          type: string
          description: |
            Tenant kisa adi (slug). email tenant-ici benzersiz oldugu icin login
            tenant'i bu alanla belirler. Sadece kucuk harf/rakam/tire.
          example: "acme-plaza"
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [Bearer], example: Bearer }
        expires_in:
          type: integer
          description: Access token gecerlilik suresi (saniye)
          example: 900

    # ---------------------------- shift ---------------------------- #
    Shift:
      type: object
      required: [id, ad, baslangic_saat, bitis_saat, gun_tipi, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string, example: "Gece Vardiyasi" }
        baslangic_saat:
          type: string
          description: "Gun-ici saat (HH:MM, tenant.timezone'a gore)"
          example: "00:00"
        bitis_saat:
          type: string
          description: "HH:MM. bitis < baslangic ise ertesi gune sarkar"
          example: "08:00"
        gun_tipi: { $ref: "#/components/schemas/GunTipi" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ShiftCreate:
      type: object
      required: [ad, baslangic_saat, bitis_saat]
      properties:
        ad: { type: string }
        baslangic_saat: { type: string, example: "00:00" }
        bitis_saat: { type: string, example: "08:00" }
        gun_tipi: { $ref: "#/components/schemas/GunTipi" }
    ShiftUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string }
        baslangic_saat: { type: string }
        bitis_saat: { type: string }
        gun_tipi: { $ref: "#/components/schemas/GunTipi" }

    # -------------------------- checkpoint ------------------------- #
    Checkpoint:
      type: object
      required: [id, ad, nfc_tag_uid, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string, example: "A Blok Giris" }
        nfc_tag_uid: { type: string, example: "04:A3:B2:C1:90:00" }
        gps_lat: { type: number, format: double, nullable: true, example: 41.015137 }
        gps_lng: { type: number, format: double, nullable: true, example: 28.979530 }
        aktif: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CheckpointCreate:
      type: object
      required: [ad, nfc_tag_uid]
      properties:
        ad: { type: string }
        nfc_tag_uid: { type: string }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        aktif: { type: boolean, default: true }
    CheckpointUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string }
        nfc_tag_uid: { type: string }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        aktif: { type: boolean }

    # -------------------------- patrol plan ------------------------ #
    PatrolPlan:
      type: object
      required: [id, ad, baslangic_saat, bitis_saat, periyot_dakika, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string, example: "Gece Devriyesi" }
        shift_id: { type: string, format: uuid, nullable: true }
        baslangic_saat:
          type: string
          description: "HH:MM, tenant.timezone'a gore (orn 00:00)"
          example: "00:00"
        bitis_saat:
          type: string
          example: "06:00"
        periyot_dakika:
          type: integer
          minimum: 1
          description: "Pencere periyodu (orn 60 => saat basi)"
          example: 60
        aktif: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    PatrolPlanDetail:
      allOf:
        - $ref: "#/components/schemas/PatrolPlan"
        - type: object
          properties:
            checkpoints:
              type: array
              items: { $ref: "#/components/schemas/PatrolPlanCheckpoint" }
    PatrolPlanCreate:
      type: object
      required: [ad, baslangic_saat, bitis_saat, periyot_dakika]
      properties:
        ad: { type: string }
        shift_id: { type: string, format: uuid, nullable: true }
        baslangic_saat: { type: string, example: "00:00" }
        bitis_saat: { type: string, example: "06:00" }
        periyot_dakika: { type: integer, minimum: 1, example: 60 }
        aktif: { type: boolean, default: true }
    PatrolPlanUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string }
        shift_id: { type: string, format: uuid, nullable: true }
        baslangic_saat: { type: string }
        bitis_saat: { type: string }
        periyot_dakika: { type: integer, minimum: 1 }
        aktif: { type: boolean }

    PatrolPlanCheckpoint:
      type: object
      required: [checkpoint_id, sira]
      properties:
        checkpoint_id: { type: string, format: uuid }
        sira: { type: integer, minimum: 0, example: 0 }
        checkpoint:
          allOf:
            - $ref: "#/components/schemas/Checkpoint"
          nullable: true
          description: "Detay yanitlarinda genisletilmis checkpoint (opsiyonel)"
    PatrolPlanCheckpointAssign:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [checkpoint_id]
            properties:
              checkpoint_id: { type: string, format: uuid }
              sira:
                type: integer
                minimum: 0
                description: "Verilmezse dizi index'i kullanilir"

    # ---------------------------- scans ---------------------------- #
    ScanCreate:
      type: object
      required: [nfc_tag_uid, okutma_zamani]
      properties:
        nfc_tag_uid:
          type: string
          description: "Okutulan NFC etiketi; backend checkpoint'e eslestirir"
          example: "04:A3:B2:C1:90:00"
        checkpoint_id:
          type: string
          format: uuid
          nullable: true
          description: "Istemci biliyorsa; yoksa nfc_tag_uid ile cozumlenir"
        patrol_window_id:
          type: string
          format: uuid
          nullable: true
          description: "Ad-hoc okutmada bos birakilabilir; backend de eslestirebilir"
        okutma_zamani:
          type: string
          format: date-time
          description: "Cihazin okuttugu an (UTC). Offline gecikmeli gonderilebilir."
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        foto_url:
          type: string
          nullable: true
          description: "Onceden yuklenmis fotografin URL'i"
        imza_dogrulandi: { type: boolean, default: false }
    ScanEvent:
      type: object
      required: [id, guard_id, checkpoint_id, nfc_tag_uid, okutma_zamani, imza_dogrulandi, created_at]
      properties:
        id: { type: string, format: uuid }
        guard_id:
          type: string
          format: uuid
          description: "Token'dan turetilir (okutmayi yapan kullanici)"
        checkpoint_id: { type: string, format: uuid }
        patrol_window_id: { type: string, format: uuid, nullable: true }
        nfc_tag_uid: { type: string }
        okutma_zamani: { type: string, format: date-time }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        foto_url: { type: string, nullable: true }
        imza_dogrulandi: { type: boolean }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }

    # -------------------------- dashboard -------------------------- #
    DashboardLive:
      type: object
      required: [generated_at, aktif_turlar, son_alarmlar]
      properties:
        generated_at: { type: string, format: date-time }
        aktif_turlar:
          type: array
          items: { $ref: "#/components/schemas/AktifTur" }
        son_alarmlar:
          type: array
          items: { $ref: "#/components/schemas/Alarm" }
    AktifTur:
      type: object
      required: [patrol_window_id, patrol_plan_id, pencere_baslangic, pencere_bitis, durum]
      properties:
        patrol_window_id: { type: string, format: uuid }
        patrol_plan_id: { type: string, format: uuid }
        patrol_plan_ad: { type: string }
        pencere_baslangic: { type: string, format: date-time }
        pencere_bitis: { type: string, format: date-time }
        durum: { $ref: "#/components/schemas/PatrolWindowDurum" }
        beklenen_checkpoint_sayisi: { type: integer }
        okutulan_checkpoint_sayisi: { type: integer }
    Alarm:
      type: object
      required: [tip, olusma_zamani, mesaj]
      properties:
        tip:
          type: string
          enum: [kacirilan_tur, eksik_checkpoint, gecikmis_okutma, acil_durum]
          example: kacirilan_tur
        olusma_zamani: { type: string, format: date-time }
        mesaj: { type: string }
        patrol_window_id: { type: string, format: uuid, nullable: true }
        checkpoint_id: { type: string, format: uuid, nullable: true }

    # ------------------------- notifications ----------------------- #
    Notification:
      type: object
      required: [id, tip, mesaj, okundu, created_at]
      properties:
        id: { type: string, format: uuid }
        tip:
          type: string
          enum: [kacirilan_tur, eksik_checkpoint, gecikmis_okutma]
          example: kacirilan_tur
        patrol_window_id: { type: string, format: uuid, nullable: true }
        patrol_plan_id: { type: string, format: uuid, nullable: true }
        checkpoint_id: { type: string, format: uuid, nullable: true }
        task_id: { type: string, format: uuid, nullable: true }
        mesaj: { type: string }
        okundu: { type: boolean }
        created_at: { type: string, format: date-time }
    NotificationUpdate:
      type: object
      required: [okundu]
      properties:
        okundu: { type: boolean }

    # ----------------------------- tasks --------------------------- #
    TaskTip:
      type: string
      enum: [temizlik, kontrol, ilaclama, bakim, peyzaj, diger]
    Task:
      type: object
      required: [id, tip, ad, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        tip: { $ref: "#/components/schemas/TaskTip" }
        ad: { type: string, example: "Cop toplama" }
        aciklama: { type: string, nullable: true }
        atanan_user_id: { type: string, format: uuid, nullable: true }
        checkpoint_id: { type: string, format: uuid, nullable: true }
        periyot_dakika:
          type: integer
          minimum: 1
          nullable: true
          description: "Tekrar araligi (dakika); tek seferlikse null"
        sonraki_planlanan:
          type: string
          format: date-time
          nullable: true
          description: "Bir sonraki planlanan an (UTC); peyzaj takvimi. Tamamlaninca ilerler."
        aktif: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    TaskCreate:
      type: object
      required: [tip, ad]
      properties:
        tip: { $ref: "#/components/schemas/TaskTip" }
        ad: { type: string }
        aciklama: { type: string, nullable: true }
        atanan_user_id: { type: string, format: uuid, nullable: true }
        checkpoint_id: { type: string, format: uuid, nullable: true }
        periyot_dakika: { type: integer, minimum: 1, nullable: true }
        sonraki_planlanan: { type: string, format: date-time, nullable: true }
        aktif: { type: boolean, default: true }
    TaskUpdate:
      type: object
      minProperties: 1
      properties:
        tip: { $ref: "#/components/schemas/TaskTip" }
        ad: { type: string }
        aciklama: { type: string, nullable: true }
        atanan_user_id: { type: string, format: uuid, nullable: true }
        checkpoint_id: { type: string, format: uuid, nullable: true }
        periyot_dakika: { type: integer, minimum: 1, nullable: true }
        sonraki_planlanan: { type: string, format: date-time, nullable: true }
        aktif: { type: boolean }

    TaskCompletion:
      type: object
      required: [id, task_id, tamamlayan_user_id, tamamlanma_zamani, idempotency_key, created_at]
      properties:
        id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        tamamlayan_user_id:
          type: string
          format: uuid
          description: "Token'dan turetilir"
        tamamlanma_zamani: { type: string, format: date-time }
        nfc_tag_uid: { type: string, nullable: true }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        foto_key: { type: string, nullable: true }
        foto_url: { type: string, nullable: true }
        notlar: { type: string, nullable: true }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }
    TaskCompletionCreate:
      type: object
      required: [tamamlanma_zamani]
      properties:
        tamamlanma_zamani: { type: string, format: date-time }
        nfc_tag_uid:
          type: string
          nullable: true
          description: "Verilirse task.checkpoint_id'nin nfc'si ile eslesmeli"
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        foto_key:
          type: string
          nullable: true
          description: "Once /uploads/presign ile alinan obje anahtari"
        notlar: { type: string, nullable: true }

    # ---------------------------- uploads -------------------------- #
    PresignRequest:
      type: object
      required: [content_type]
      properties:
        content_type:
          type: string
          example: "image/jpeg"
          description: "Yuklenecek dosyanin MIME tipi"
        dosya_adi:
          type: string
          nullable: true
          description: "Opsiyonel; uzanti foto_key icin kullanilabilir"
    PresignResponse:
      type: object
      required: [foto_key, upload_url, method, expires_in]
      properties:
        foto_key:
          type: string
          description: "Completion'da gonderilecek obje anahtari (tenant ile namespace'li)"
        upload_url:
          type: string
          description: "Presigned PUT URL — istemci dosyayi buraya PUT eder"
        method: { type: string, enum: [PUT], example: PUT }
        expires_in:
          type: integer
          description: "URL gecerlilik suresi (saniye)"
          example: 900

    # ---------------------------- assets --------------------------- #
    AssetKategori:
      type: string
      enum: [ekipman, arac, alet, diger]
    AssetDurum:
      type: string
      enum: [musait, zimmetli, bakimda]
    Asset:
      type: object
      required: [id, ad, durum, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        ad: { type: string, example: "Cim bicme makinesi" }
        kategori: { $ref: "#/components/schemas/AssetKategori" }
        nfc_tag_uid: { type: string, nullable: true }
        durum: { $ref: "#/components/schemas/AssetDurum" }
        aciklama: { type: string, nullable: true }
        aktif: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AssetCreate:
      type: object
      required: [ad]
      properties:
        ad: { type: string }
        kategori: { $ref: "#/components/schemas/AssetKategori" }
        nfc_tag_uid: { type: string, nullable: true }
        aciklama: { type: string, nullable: true }
        aktif: { type: boolean, default: true }
    AssetUpdate:
      type: object
      minProperties: 1
      properties:
        ad: { type: string }
        kategori: { $ref: "#/components/schemas/AssetKategori" }
        nfc_tag_uid: { type: string, nullable: true }
        durum: { $ref: "#/components/schemas/AssetDurum" }
        aciklama: { type: string, nullable: true }
        aktif: { type: boolean }

    AssetCheckout:
      type: object
      required: [id, asset_id, alan_user_id, alma_zamani, idempotency_key, created_at]
      properties:
        id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        alan_user_id:
          type: string
          format: uuid
          description: "Token'dan turetilir (alan kullanici)"
        alma_zamani: { type: string, format: date-time }
        birakma_zamani:
          type: string
          format: date-time
          nullable: true
          description: "NULL => hala uzerinde (acik zimmet)"
        alma_nfc_tag_uid: { type: string, nullable: true }
        birakma_nfc_tag_uid: { type: string, nullable: true }
        alma_gps_lat: { type: number, format: double, nullable: true }
        alma_gps_lng: { type: number, format: double, nullable: true }
        birakma_gps_lat: { type: number, format: double, nullable: true }
        birakma_gps_lng: { type: number, format: double, nullable: true }
        notlar: { type: string, nullable: true }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }
    CheckoutRequest:
      type: object
      properties:
        nfc_tag_uid:
          type: string
          nullable: true
          description: "Okutulan etiket; verilirse asset.nfc_tag_uid ile eslesmeli"
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        notlar: { type: string, nullable: true }
    CheckinRequest:
      type: object
      properties:
        nfc_tag_uid:
          type: string
          nullable: true
          description: "Okutulan etiket; verilirse asset.nfc_tag_uid ile eslesmeli"
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        notlar: { type: string, nullable: true }

    # --------------------------- emergency ------------------------- #
    EmergencyDurum:
      type: string
      enum: [acik, cozuldu]
    EmergencyAlert:
      type: object
      required: [id, tetikleyen_user_id, tetiklenme_zamani, durum, idempotency_key, created_at]
      properties:
        id: { type: string, format: uuid }
        tetikleyen_user_id:
          type: string
          format: uuid
          description: "Token'dan turetilir (tetikleyen)"
        tetiklenme_zamani: { type: string, format: date-time }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        durum: { $ref: "#/components/schemas/EmergencyDurum" }
        cozen_user_id: { type: string, format: uuid, nullable: true }
        cozulme_zamani: { type: string, format: date-time, nullable: true }
        notlar: { type: string, nullable: true }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }
    EmergencyCreate:
      type: object
      properties:
        gps_lat: { type: number, format: double, nullable: true }
        gps_lng: { type: number, format: double, nullable: true }
        notlar: { type: string, nullable: true }
    EmergencyResolve:
      type: object
      properties:
        notlar: { type: string, nullable: true }

    # ------------------------ tenant settings ---------------------- #
    TenantSettings:
      type: object
      required: [tenant_id, ad, slug, timezone]
      properties:
        tenant_id: { type: string, format: uuid }
        ad: { type: string }
        slug: { type: string }
        timezone: { type: string }
        acil_durum_telefon:
          type: string
          nullable: true
          description: "Acil durumda mobilin arayacagi yonetim numarasi (tel:)"
    TenantSettingsUpdate:
      type: object
      minProperties: 1
      properties:
        acil_durum_telefon: { type: string, nullable: true }
        timezone: { type: string }
        ad: { type: string }

    # ----------------------------- aidat --------------------------- #
    ResidentRol:
      type: string
      enum: [malik, kiraci]
    DuesYontem:
      type: string
      enum: [elden, havale, kart, diger]
    DuesDurum:
      type: string
      enum: [basarili, bekliyor, iptal]

    Unit:
      type: object
      required: [id, no, aktif, created_at]
      properties:
        id: { type: string, format: uuid }
        no: { type: string, example: "A-12" }
        blok: { type: string, nullable: true }
        metrekare: { type: number, format: double, nullable: true }
        aktif: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    UnitCreate:
      type: object
      required: [no]
      properties:
        no: { type: string }
        blok: { type: string, nullable: true }
        metrekare: { type: number, format: double, nullable: true }
        aktif: { type: boolean, default: true }
    UnitUpdate:
      type: object
      minProperties: 1
      properties:
        no: { type: string }
        blok: { type: string, nullable: true }
        metrekare: { type: number, format: double, nullable: true }
        aktif: { type: boolean }

    UnitResident:
      type: object
      required: [id, unit_id, user_id]
      properties:
        id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        rol_tipi: { $ref: "#/components/schemas/ResidentRol" }
        baslangic: { type: string, format: date-time, nullable: true }
        bitis: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    ResidentAssign:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid
          description: "role=resident bir app_user (ayni tenant)"
        rol_tipi: { $ref: "#/components/schemas/ResidentRol" }
        baslangic: { type: string, format: date-time, nullable: true }

    DuesAssessment:
      type: object
      required: [id, unit_id, donem, tutar_kurus, created_at]
      properties:
        id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid }
        donem: { type: string, example: "2026-06" }
        tutar_kurus:
          type: integer
          minimum: 1
          description: "KURUS (minor units); para asla float degil"
        son_odeme_tarihi: { type: string, format: date, nullable: true }
        aciklama: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
    DuesAssessmentCreate:
      type: object
      required: [donem, tutar_kurus]
      properties:
        unit_id:
          type: string
          format: uuid
          nullable: true
          description: "Verilirse TEK daire; yoksa toplu"
        unit_ids:
          type: array
          nullable: true
          description: "Toplu modda hedef daireler; yoksa tum aktif daireler"
          items: { type: string, format: uuid }
        donem: { type: string, example: "2026-06" }
        tutar_kurus: { type: integer, minimum: 1 }
        son_odeme_tarihi: { type: string, format: date, nullable: true }
        aciklama: { type: string, nullable: true }
    DuesAssessmentResult:
      type: object
      required: [created, atlanan]
      properties:
        created:
          type: array
          items: { $ref: "#/components/schemas/DuesAssessment" }
        atlanan:
          type: integer
          description: "Zaten var olan (donem) tahakkuk sayisi (toplu modda atlanan)"

    DuesPayment:
      type: object
      required: [id, unit_id, tutar_kurus, odeme_zamani, yontem, durum, kaydeden_user_id, idempotency_key, created_at]
      properties:
        id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid }
        assessment_id: { type: string, format: uuid, nullable: true }
        tutar_kurus: { type: integer, minimum: 1 }
        odeme_zamani: { type: string, format: date-time }
        yontem: { $ref: "#/components/schemas/DuesYontem" }
        durum: { $ref: "#/components/schemas/DuesDurum" }
        makbuz_no: { type: string, nullable: true }
        provider: { type: string, nullable: true, description: "manual|iyzico|paytr" }
        provider_ref: { type: string, nullable: true, description: "Saglayici referansi (webhook bunu kullanir)" }
        odeme_url:
          type: string
          nullable: true
          description: "Yalniz kart akisi init yanitinda: saglayici odeme sayfasi URL'i (kalici degil)"
        kaydeden_user_id: { type: string, format: uuid }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }
    DuesPaymentCreate:
      type: object
      required: [unit_id, tutar_kurus, yontem]
      properties:
        unit_id: { type: string, format: uuid }
        assessment_id: { type: string, format: uuid, nullable: true }
        tutar_kurus: { type: integer, minimum: 1 }
        yontem: { $ref: "#/components/schemas/DuesYontem" }
        makbuz_no: { type: string, nullable: true }
        odeme_zamani:
          type: string
          format: date-time
          nullable: true
          description: "Verilmezse sunucu now()"

    UnitDuesStatus:
      type: object
      required: [unit_id, no, toplam_tahakkuk_kurus, toplam_odenen_kurus, bakiye_kurus]
      properties:
        unit_id: { type: string, format: uuid }
        no: { type: string }
        toplam_tahakkuk_kurus: { type: integer }
        toplam_odenen_kurus:
          type: integer
          description: "Yalniz durum='basarili' odemeler"
        bakiye_kurus:
          type: integer
          description: "toplam_tahakkuk - toplam_odenen (pozitif = borc)"
        assessments:
          type: array
          items: { $ref: "#/components/schemas/DuesAssessment" }
        payments:
          type: array
          items: { $ref: "#/components/schemas/DuesPayment" }
