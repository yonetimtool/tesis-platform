# Alembic config — /contracts/db (tek dogruluk kaynagi semasi).
#
# Backend gelistirici bunu kendi servisinden de calistirabilir. URL ortam
# degiskeninden okunur (env.py icinde): DATABASE_URL.
#
# Calistirma (contracts/db dizininden):
#   export DATABASE_URL=postgresql+psycopg://owner:***@localhost:5432/tesis
#   alembic upgrade head
#
# NOT: migration'i superuser veya tablo OWNER rolu ile calistirin. Bu rol
# RLS politikalarini BYPASS eder. Uygulama ise dusuk yetkili `app_rw` rolu
# ile baglanir ve RLS'e tabidir.

[alembic]
script_location = %(here)s/migrations
prepend_sys_path = .
# Zaman damgali, sirali revizyon dosyalari:
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
